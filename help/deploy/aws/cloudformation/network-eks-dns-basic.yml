  DatagrokS3:
    DeletionPolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - BucketKeyEnabled: true
          ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      BucketName:
        Fn::Sub:
        - ${AWS::StackName}${postfix}-s3-${uuid}
        - postfix:
            Ref: Postfix
          uuid:
            Fn::Select:
            - 2
            - Fn::Split:
              - /
              - Ref: AWS::StackId
      ObjectLockEnabled: false
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
      - Key: datagrok.component
        Value: datagrok
    Type: AWS::S3::Bucket
    UpdateReplacePolicy: Retain
  DatagrokS3Policy:
    Properties:
      Bucket:
        Ref: DatagrokS3
      PolicyDocument:
        Statement:
        - Action: '*'
          Condition:
            Bool:
              aws:SecureTransport: 'false'
          Effect: Deny
          Principal: '*'
          Resource:
          - Fn::GetAtt:
            - DatagrokS3
            - Arn
          - Fn::Sub:
            - ${bucket}/*
            - bucket:
                Fn::GetAtt:
                - DatagrokS3
                - Arn
        Version: '2012-10-17'
    Type: AWS::S3::BucketPolicy
  DatagrokS3VPCEndpoint:
    Properties:
      PolicyDocument:
        Statement:
        - Action:
          - s3:PutObject
          - s3:GetObject
          - s3:DeleteObject
          - s3:ListBucket
          Condition: {}
          Effect: Allow
          Principal: '*'
          Resource:
          - Fn::GetAtt:
            - DatagrokS3
            - Arn
          - Fn::Sub:
            - ${bucket}/*
            - bucket:
                Fn::GetAtt:
                - DatagrokS3
                - Arn
          - Fn::Sub: arn:aws:s3:::amazonlinux.${AWS::Region}.amazonaws.com
          - Fn::Sub: arn:aws:s3:::amazonlinux.${AWS::Region}.amazonaws.com/*
          - Fn::Sub: arn:aws:s3:::amazonlinux-2-repos-${AWS::Region}
          - Fn::Sub: arn:aws:s3:::amazonlinux-2-repos-${AWS::Region}/*
          - Fn::Sub: arn:aws:s3:::prod-${AWS::Region}-starport-layer-bucket
          - Fn::Sub: arn:aws:s3:::prod-${AWS::Region}-starport-layer-bucket/*
          - arn:aws:s3:::docker-images-prod
          - arn:aws:s3:::docker-images-prod/*
          - arn:aws:s3:::datagrok-data
          - arn:aws:s3:::datagrok-data/*
          - Fn::Sub:
            - arn:aws:s3:::cloudformation-custom-resource-response-${region}
            - region:
                Fn::Join:
                - ''
                - Fn::Split:
                  - '-'
                  - Ref: AWS::Region
          - Fn::Sub:
            - arn:aws:s3:::cloudformation-custom-resource-response-${region}/*
            - region:
                Fn::Join:
                - ''
                - Fn::Split:
                  - '-'
                  - Ref: AWS::Region
        Version: '2012-10-17'
      RouteTableIds:
      - Ref: DatagrokPrivateSubnetRouteTable
      ServiceName:
        Fn::Sub: com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      VpcId:
        Ref: DatagrokVPC
    Type: AWS::EC2::VPCEndpoint
  DatagrokSecurityGroup:
    Properties:
      GroupDescription:
        Fn::Sub: ${AWS::StackName} Datagrok cluster security group
      Tags:
      - Key: Name
        Value:
          Fn::Sub:
          - ${AWS::StackName}${postfix}-cluster-sg
          - postfix:
              Ref: Postfix
      - Key: datagrok.component
        Value: datagrok
      VpcId:
        Ref: DatagrokVPC
    Type: AWS::EC2::SecurityGroup
  DatagrokServiceAccountRole:
    DependsOn: DatagrokClusterOIDCProvider
    Properties:
      AssumeRolePolicyDocument:
        Fn::Sub:
        - "{\n  \"Version\": \"2012-10-17\",\n  \"Statement\": [{\n    \"Effect\"\
          : \"Allow\",\n    \"Principal\": {\n      \"Federated\": \"arn:aws:iam::${AWS::AccountId}:oidc-provider/${issuer}\"\
          \n    },\n    \"Action\": \"sts:AssumeRoleWithWebIdentity\",\n    \"Condition\"\
          : {\n      \"StringEquals\": {\n        \"${issuer}:aud\": \"sts.amazonaws.com\"\
          ,\n        \"${issuer}:sub\": \"system:serviceaccount:${namespace}:datagrok\"\
          \n      }\n    }\n  }]\n}\n"
        - issuer:
            Fn::Select:
            - 1
            - Fn::Split:
              - //
              - Fn::GetAtt:
                - EKSCluster
                - OpenIdConnectIssuerUrl
          namespace:
            Ref: HelmNamespace
      Policies:
      - PolicyDocument:
          Statement:
          - Action:
            - s3:ListBucket
            - s3:GetBucketLocation
            Effect: Allow
            Resource:
              Fn::GetAtt:
              - DatagrokS3
              - Arn
          - Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            Effect: Allow
            Resource:
              Fn::Sub:
              - ${bucket}/*
              - bucket:
                  Fn::GetAtt:
                  - DatagrokS3
                  - Arn
          Version: '2012-10-17'
        PolicyName: DatagrokS3Access
      - Fn::If:
        - RdsIamAuthEnabled
        - PolicyDocument:
            Statement:
            - Action: rds-db:connect
              Effect: Allow
              Resource:
              - Fn::Sub:
                - arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:${dbi}/datagrok_admin
                - dbi:
                    Fn::GetAtt:
                    - DatagrokDB
                    - DbiResourceId
              - Fn::Sub:
                - arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:${dbi}/datagrok
                - dbi:
                    Fn::GetAtt:
                    - DatagrokDB
                    - DbiResourceId
              - Fn::Sub:
                - arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:${dbi}/datagrok_reader
                - dbi:
                    Fn::GetAtt:
                    - DatagrokDB
                    - DbiResourceId
            Version: '2012-10-17'
          PolicyName: DatagrokRdsIamAccess
        - Ref: AWS::NoValue
      RoleName:
        Fn::Sub:
        - ${AWS::StackName}${postfix}-sa-role
        - postfix:
            Ref: Postfix
    Type: AWS::IAM::Role
