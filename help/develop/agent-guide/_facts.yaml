- id: DG-FACT-211
  kind: enum
  scope: show-formula-lines
  value: Per-viewer support matrix (article lines 14-25, 12 entries): scatter plot, line chart, density plot — both X and Y formula lines. Box plot — Y axis only (X is categorical). Histogram — X axis only (count is derived). Bar chart — X line when `orientation: 'horizontal'`, Y line when `orientation: 'vertical'`. Box plot, histogram, and bar chart accept ONLY constant-RHS formulas (`${value} = C`) and bands (`${value} in (a, b)`) on their value axis; the Formula Lines editor dialog narrows its popup-menu items + column picker to enforce this. JS API does not validate this at `addLine` time — the helper persists whatever JSON you pass, but unsupported viewers silently drop the line at render. Defaults apply per the dialog's runtime gating, not at `setDefaults`.
