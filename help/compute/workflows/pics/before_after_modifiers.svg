<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400" font-family="sans-serif" font-size="15">
  <style>
    text { fill: #222; }
    .sel { font-family: monospace; font-weight: 600; font-size: 15px; }
    .cell { fill: #dee7e5; stroke: #3465a4; stroke-width: 1; }
    .cell.base { fill: #ffe994; stroke: #ff4000; stroke-width: 2; }
    .cell.match { fill: #afd095; stroke: #ff4000; stroke-width: 2; }
    .head { font-size: 14px; text-anchor: middle; fill: #444; }
    .note { font-size: 13px; fill: #555; }
  </style>

  <text x="20" y="26" font-size="18" font-weight="600">Direction and cardinality: before / after</text>

  <!-- Legend -->
  <rect x="20" y="40" width="18" height="16" class="cell base"/>
  <text x="44" y="54" font-size="14">base</text>
  <rect x="100" y="40" width="18" height="16" class="cell match"/>
  <text x="124" y="54" font-size="14">matched</text>
  <rect x="210" y="40" width="18" height="16" class="cell"/>
  <text x="234" y="54" font-size="14">not matched</text>

  <!-- Header row -->
  <text x="170" y="94" class="head">prep1</text>
  <text x="250" y="94" class="head">prep2</text>
  <text x="330" y="94" class="head">prep3</text>
  <text x="410" y="94" class="head">base</text>
  <text x="490" y="94" class="head">next1</text>
  <text x="570" y="94" class="head">next2</text>
  <text x="650" y="94" class="head">next3</text>

  <!-- Row: before -->
  <text x="20" y="123" class="sel">before</text>
  <rect x="140" y="105" width="60" height="28" rx="3" class="cell"/>
  <rect x="220" y="105" width="60" height="28" rx="3" class="cell"/>
  <rect x="300" y="105" width="60" height="28" rx="3" class="cell match"/>
  <rect x="380" y="105" width="60" height="28" rx="3" class="cell base"/>
  <rect x="460" y="105" width="60" height="28" rx="3" class="cell"/>
  <rect x="540" y="105" width="60" height="28" rx="3" class="cell"/>
  <rect x="620" y="105" width="60" height="28" rx="3" class="cell"/>

  <!-- Row: before* -->
  <text x="20" y="163" class="sel">before*</text>
  <rect x="140" y="145" width="60" height="28" rx="3" class="cell match"/>
  <rect x="220" y="145" width="60" height="28" rx="3" class="cell match"/>
  <rect x="300" y="145" width="60" height="28" rx="3" class="cell match"/>
  <rect x="380" y="145" width="60" height="28" rx="3" class="cell base"/>
  <rect x="460" y="145" width="60" height="28" rx="3" class="cell"/>
  <rect x="540" y="145" width="60" height="28" rx="3" class="cell"/>
  <rect x="620" y="145" width="60" height="28" rx="3" class="cell"/>

  <!-- Row: before+ -->
  <text x="20" y="203" class="sel">before+</text>
  <rect x="140" y="185" width="60" height="28" rx="3" class="cell"/>
  <rect x="220" y="185" width="60" height="28" rx="3" class="cell"/>
  <rect x="300" y="185" width="60" height="28" rx="3" class="cell match"/>
  <rect x="380" y="185" width="60" height="28" rx="3" class="cell base"/>
  <rect x="460" y="185" width="60" height="28" rx="3" class="cell"/>
  <rect x="540" y="185" width="60" height="28" rx="3" class="cell"/>
  <rect x="620" y="185" width="60" height="28" rx="3" class="cell"/>

  <!-- Row: after -->
  <text x="20" y="243" class="sel">after</text>
  <rect x="140" y="225" width="60" height="28" rx="3" class="cell"/>
  <rect x="220" y="225" width="60" height="28" rx="3" class="cell"/>
  <rect x="300" y="225" width="60" height="28" rx="3" class="cell"/>
  <rect x="380" y="225" width="60" height="28" rx="3" class="cell base"/>
  <rect x="460" y="225" width="60" height="28" rx="3" class="cell match"/>
  <rect x="540" y="225" width="60" height="28" rx="3" class="cell"/>
  <rect x="620" y="225" width="60" height="28" rx="3" class="cell"/>

  <!-- Row: after* -->
  <text x="20" y="283" class="sel">after*</text>
  <rect x="140" y="265" width="60" height="28" rx="3" class="cell"/>
  <rect x="220" y="265" width="60" height="28" rx="3" class="cell"/>
  <rect x="300" y="265" width="60" height="28" rx="3" class="cell"/>
  <rect x="380" y="265" width="60" height="28" rx="3" class="cell base"/>
  <rect x="460" y="265" width="60" height="28" rx="3" class="cell match"/>
  <rect x="540" y="265" width="60" height="28" rx="3" class="cell match"/>
  <rect x="620" y="265" width="60" height="28" rx="3" class="cell match"/>

  <!-- Row: after+ -->
  <text x="20" y="323" class="sel">after+</text>
  <rect x="140" y="305" width="60" height="28" rx="3" class="cell"/>
  <rect x="220" y="305" width="60" height="28" rx="3" class="cell"/>
  <rect x="300" y="305" width="60" height="28" rx="3" class="cell"/>
  <rect x="380" y="305" width="60" height="28" rx="3" class="cell base"/>
  <rect x="460" y="305" width="60" height="28" rx="3" class="cell match"/>
  <rect x="540" y="305" width="60" height="28" rx="3" class="cell"/>
  <rect x="620" y="305" width="60" height="28" rx="3" class="cell"/>

  <!-- Footnote -->
  <text x="20" y="365" class="note">id-list contains every prep / next, so `before` resolves to prep3 (closest). `+` matches only if the immediately-adjacent</text>
  <text x="20" y="383" class="note">sibling is in the list; in this layout it is, so `before+` and `before` coincide. Drop prep3 from the list and `before+` no longer matches.</text>
</svg>
