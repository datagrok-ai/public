name: Python API

on:
  workflow_dispatch: { }
  push:
    paths:
      - 'python-api/**'
  pull_request:
    paths:
      - 'python-api/**'

jobs:
  test:
    runs-on: ubuntu-22.04
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            ./python-api
            ./packages/ApiTests
            ./js-api
            ./docker
            ./.github

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install test dependencies
        working-directory: python-api
        run: |
          python -m pip install --upgrade pip
          pip install .[test]

      - name: Set PYTHONPATH to include python-api
        run: echo "PYTHONPATH=$(pwd)/python-api" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install datagrok-tools
        run: npm install -g datagrok-tools@latest

      - name: Start Datagrok server
        id: datagrok
        run: |
          sed -i '/"dbServer": "database"/a\ \ \ \ \ \ \ \ \ \ "initialSetupCompleted": true,' docker/localhost.docker-compose.yaml
          sed -i '/"amqpHost": "rabbitmq"/a\ \ \ \ \ \ \ \ \ \ "useQueue": false,' docker/localhost.docker-compose.yaml
          sed -i '/"grokSpawnerHost": "grok_spawner"/a\ \ \ \ \ \ \ \ \ \ "useGrokSpawner": false,' docker/localhost.docker-compose.yaml

          DATAGROK_VERSION='latest'
          export DATAGROK_VERSION

          docker compose -p datagrok -f "docker/localhost.docker-compose.yaml" --profile datagrok --profile db up -d

          apiUrl='http://127.0.0.1:8080/api'
          echo "apiUrl=$apiUrl" >> $GITHUB_OUTPUT

      - name: Wait for Datagrok to become available
        timeout-minutes: 5
        run: |
          until .github/scripts/check-output.sh "curl -s ${{ steps.datagrok.outputs.apiUrl }}/info/server" '"Http Server"'
          do
            sleep 1
            docker compose -p datagrok logs --no-color --timestamps datagrok
            echo -e "\nRetrying..."
          done
          curl -s ${{ steps.datagrok.outputs.apiUrl }}/info/server
          curl -s ${{ steps.datagrok.outputs.apiUrl }}/admin/health

      - name: Get auth token
        id: auth
        run: |
          token=$(curl -s -X POST ${{ steps.datagrok.outputs.apiUrl }}/users/login/dev/admin | jq -r .token)
          curl -s -H "Authorization: $token" -H "Content-Type: application/json" \
            '${{ steps.datagrok.outputs.apiUrl }}/admin/plugins/admin/settings' \
            -X POST -d '{"#type":"AdminPluginSettings", "agreementDate":null}'
          echo "token=$token" >> $GITHUB_OUTPUT

      - name: Configure grok CLI
        run: |
          grok config add --default --alias ci --server '${{ steps.datagrok.outputs.apiUrl }}' --key 'admin'

      - name: Publish ApiTests package
        run: |
          npm install
          npm run build
          count=0
          retries=5
          until grok publish ci --release; do
            exit=$?
            wait=$((2 ** count))
            count=$((count + 1))
            if [ "$count" -lt "$retries" ]; then
              echo "Retry $count/$retries exited $exit, retrying in $wait seconds..."
              sleep $wait
            else
              echo "Retry $count/$retries exited $exit, no more retries left."
              exit $exit
            fi
          done
        working-directory: packages/ApiTests

      - name: Run tests and generate JUnit report
        working-directory: python-api
        run: |
          mkdir -p test-reports
          pytest tests \
            --url '${{ steps.datagrok.outputs.apiUrl }}' \
            --key '${{ steps.auth.outputs.token }}' \
            --junitxml=test-reports/results.xml -v

      - name: Publish test results as GitHub annotations
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: python-api/test-reports/results.xml

      - name: Dump Datagrok logs on failure
        if: failure()
        run: docker compose -p datagrok logs --no-color --timestamps

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v3

      - name: Install tomli
        run: pip install 'tomli>=1.2.0'
      - name: Check version change
        id: check_version
        run: |
          CURRENT_VERSION=$(python -c "import tomli; print(tomli.load(open('python-api/pyproject.toml', 'rb'))['project']['version'])")
          PYPI_VERSION=$(curl -s "https://pypi.org/pypi/datagrok-api/json" | python -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")
          if [ "$CURRENT_VERSION" != "$PYPI_VERSION" ]; then
            echo "Version changed from $PYPI_VERSION to $CURRENT_VERSION"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged: $CURRENT_VERSION"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check_version.outputs.should_publish == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install hatch

      - name: Build package
        working-directory: python-api
        if: steps.check_version.outputs.should_publish == 'true'
        run: hatch build

      - name: Publish package
        if: steps.check_version.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: python-api/dist/
