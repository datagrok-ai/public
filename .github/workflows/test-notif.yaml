name: Test Notif
on:
  workflow_dispatch: { }
  push:
    branches:
      - vhlushchenko/GROK-15351-github-notification
jobs:
  notif:
    name: Check version
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: ls
        run: ls -la
      - name: Prepare Slack Message
        if: ${{ steps.publish.outcome == 'success' && !contains(matrix.package, 'Meta') }}
        id: slack-prepare
        shell: bash
        env:
          SLACK_ID: ${{ secrets.SLACK_ID }}
        run: |
          channel_id=$(echo "$SLACK_ID" | jq -r .\"${{ github.actor }}\")
          echo "::add-mask::$channel_id"
          echo SLACK_CHANNEL=$channel_id >> $GITHUB_ENV
      - name: Slack Success
        if: always()
        uses: kpritam/slack-job-status-action@v1
        with:
          job-status: ${{ job.status }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel: ${{ env.SLACK_CHANNEL }}

