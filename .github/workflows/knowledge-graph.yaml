# Knowledge-graph rebuild pipeline.
#
# Canonical source lives in the knowledge-graph repo at ci/knowledge-graph.yaml.
# Deploy by copying to  datagrok-ai/public  →  .github/workflows/knowledge-graph.yaml
#
# Triggers:
#   * push to public touching anything the extractors read (packages/libraries/help/js-api)
#   * repository_dispatch `kg-rebuild` — fired by the knowledge-graph repo when the
#     builder itself changes (see .github/workflows/trigger-public-rebuild.yaml there)
#   * manual workflow_dispatch (optionally against a non-main knowledge-graph ref)
#
# What a run does:
#   1. check out public and knowledge-graph as SIBLINGS — graphs/public/build.py
#      resolves the source tree as <kg-root>/../public, so no overlay is needed
#   2. full clean rebuild (~3.5 min measured; see ci/README.md — no change-detection needed)
#   3. sanity-gate the graph, pack the DB into the 2.4 MB kg.kuzu.xz
#   4. push refreshed JSONL  →  datagrok-ai/knowledge-graph  (source of truth, reviewable diff)
#      push refreshed .xz     →  datagrok-ai/public/.kg        (what Claude Code consumes)
#
# Why full-rebuild, not incremental: the graph is global (cross-package imports,
# api-usage, features). Bulk COPY-FROM load made a full rebuild ~155x faster
# (22 min → 9 s), so a clean full rebuild is cheaper and more correct (no stale
# rows on deletes/renames) than maintaining incremental JSONL diffs.

name: knowledge-graph

on:
  push:
    branches: [kg-ci-validation]   # TEST COPY -- canonical uses [master]
    paths:
      # Anything the extractors read. Excludes .kg/** so the artifact commit
      # below never re-triggers this workflow.
      - 'packages/**'
      - 'libraries/**'
      - 'help/**'
      - 'js-api/**'
  repository_dispatch:
    types: [kg-rebuild]
  workflow_dispatch:
    inputs:
      kg_ref:
        description: 'knowledge-graph ref to build from and push JSONL back to (default: main)'
        required: false
        default: 'main'

# Serialize: each run pushes to two repos — never let two overlap.
concurrency:
  group: knowledge-graph
  cancel-in-progress: false

permissions:
  contents: write          # push kg.kuzu.xz back to public (uses GITHUB_TOKEN)

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Which knowledge-graph branch to build from AND push JSONL back to.
      # push events → main; dispatch events may override (PoC / validation runs).
      KG_REF: ${{ github.event.inputs.kg_ref || github.event.client_payload.kg_ref || 'kg-ci-test' }}   # TEST COPY -- canonical falls back to 'main'
    steps:
      - name: Checkout public (the source tree to analyze)
        uses: actions/checkout@v4
        with:
          path: public
        # Working tree only; a single fast-forward commit pushes fine from depth 1.

      - name: Checkout knowledge-graph builder (sibling of public)
        # graphs/public/build.py hardcodes REPO_ROOT = <kg-root>/../public and
        # DATA_DIR = graphs/public/data — the sibling layout below satisfies both,
        # and the refreshed JSONL lands directly in this checkout, ready to commit.
        uses: actions/checkout@v4
        with:
          repository: datagrok-ai/knowledge-graph
          path: knowledge-graph
          ref: ${{ env.KG_REF }}
          token: ${{ secrets.KG_PUSH_TOKEN }}   # PAT with write access to knowledge-graph

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: knowledge-graph/requirements-build.txt

      - name: Install builder dependencies
        run: pip install -r knowledge-graph/requirements-build.txt

      - name: Build graph (clean full rebuild, bulk COPY loader)
        run: |
          set -euo pipefail
          # Pass 1: --clean regenerates every JSONL slice from current source,
          #         dropping rows for deleted/renamed entities (merge is additive,
          #         so only --clean removes stale rows). data/enrichment is preserved.
          python knowledge-graph/build.py --clean --no-db
          # Pass 2: re-extract so any extractor that reads a sibling's JSONL now sees
          #         it, then bulk-load Kuzu via COPY FROM (loader=copy is the default).
          python knowledge-graph/build.py

      - name: Sanity gate (refuse to publish a degenerate graph)
        run: |
          set -euo pipefail
          python - <<'PY'
          import kuzu
          db = kuzu.Database("knowledge-graph/kg.kuzu"); conn = kuzu.Connection(db)
          n = conn.execute("MATCH (n) RETURN count(n)").get_next()[0]
          e = conn.execute("MATCH ()-[r]->() RETURN count(r)").get_next()[0]
          print(f"graph: {n} nodes, {e} edges")
          assert n > 25000 and e > 70000, f"degenerate graph (n={n}, e={e}) — refusing to publish"
          PY

      - name: Run query tests (advisory)
        # ADVISORY, not a gate: the suite includes content-quality thresholds (e.g. doc
        # coverage) that depend on LLM-enrichment freshness, not on build integrity — they
        # must not block publishing the artifact. The sanity gate above is the hard gate.
        continue-on-error: true
        run: python knowledge-graph/graphs/public/tests/test_kg_queries.py

      - name: Pack -> kg.kuzu.xz
        run: python knowledge-graph/engine/scripts/pack.py

      - name: Push refreshed JSONL to knowledge-graph
        working-directory: knowledge-graph
        run: |
          set -euo pipefail
          git config user.name  "datagrok-kg-bot"
          git config user.email "kg-bot@datagrok.ai"
          # build.py wrote straight into this checkout; `git add` stages deletions
          # of stale slices too. Enrichment is LLM-derived — build.py never rewrites
          # it, so it stays untouched.
          git add graphs/public/data/nodes graphs/public/data/edges
          if git diff --cached --quiet; then
            echo "no JSONL changes"; exit 0
          fi
          echo "pushing JSONL to knowledge-graph branch: $KG_REF"
          git commit -m "KG: refresh JSONL from public@${GITHUB_SHA::12}"
          for i in 1 2 3; do
            git pull --rebase --autostash origin "$KG_REF" || true
            git push origin "HEAD:$KG_REF" && break
            echo "push retry $i"; sleep 3
          done

      - name: Commit kg.kuzu.xz to public
        working-directory: public
        run: |
          set -euo pipefail
          cp ../knowledge-graph/kg.kuzu.xz .kg/kg.kuzu.xz
          git config user.name  "datagrok-kg-bot"
          git config user.email "kg-bot@datagrok.ai"
          git add .kg/kg.kuzu.xz
          if git diff --cached --quiet; then
            echo "artifact unchanged"; exit 0
          fi
          # Always the triggering branch — a PoC run on a validation branch writes the
          # binary there, never to master. repository_dispatch runs land on the default branch.
          git commit -m "KG: refresh kg.kuzu.xz from ${GITHUB_SHA::12} [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}" && break
            echo "push retry $i"; sleep 3
          done
