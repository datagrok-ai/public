- id: DG-FACT-378
  kind: naming
  scope: write-demo-script
  value: 'The step `delay` option is consumed ONLY in automatic mode (`isAutomatic=true`). The branch that awaits `_countdown(...)` + `DG.delay(stepDelay)` lives behind `if (this._isAutomatic) { ... }`; in manual scripts the user clicks "Next step" to advance and `delay` is ignored. Article example at lines 36-43 sets `delay: 2000` on a manual script ŌĆö visually harmless but inert.'
