  value: '`DemoScript.DEMO_PATH = "apps/Tutorials/Demo"` (instance field). The constructor `options.path` is appended (with spaces replaced by `-`) to form `view.path` for every step: `grok.shell.v.path = ` `${this.DEMO_PATH}/${(this._path ?? "").replaceAll(" ", "-")}`. So `path: "Curves/Demo"` produces `apps/Tutorials/Demo/Curves/Demo`. The same `path` value drives the in-view breadcrumb labels (`["Home", "Demo", ...path.split("/")]`).'
