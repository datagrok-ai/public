- id: DG-FACT-380
  kind: naming
  scope: write-demo-script
  value: 'A demo function is registered in `package.ts` (or `package.g.ts` from decorators) with the header comment `//meta.demoPath: <Group> | <Sub>` to be discovered by the Demo app, and `//meta.isDemoScript: true` to be rendered as a `DemoScript` (sidebar with step list and play controls). Without `meta.demoPath` the function will not appear in the demo gallery. The constant `DG.FUNC_OPTIONS.DEMO_PATH` confirms `meta.demoPath` is a first-class function option. Optional `//meta.isDemoDashboard: true` (orthogonal) renders a static dashboard instead of a stepwise script.'
