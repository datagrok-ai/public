- id: DG-FACT-247
  kind: namespace
  scope: docking
  value: |-
    The grid-cache the article describes ("first run for a target ... about a minute ... subsequent runs much faster") is implemented as a server-side function cache, not an in-memory Dart cache. `Docking:dockLigandCached` declares `meta: { cache: 'all', 'cache.invalidateOn': '0 0 1 * *' }` (`packages/Docking/src/package.ts:64-68`) — every dock call (jsonForm + containerId tuple) is cached server-side, with cron `0 0 1 * *` invalidating monthly. So "same target, subsequent runs faster" is true at the per-(receptor+gpf+ligand) granularity, not per-target — repeating the SAME ligand against the same target is instant; a NEW ligand against a previously-warmed target still pays the full docking cost (only the AutoDock-side grid cache helps, which is internal to the container).
  derives_from:
    - article: help/develop/domains/chem/docking.md:47-49
    - code: packages/Docking/src/package.ts:64-85
