  value: |-
    AutoDock execution runs in a Docker container named `docking-autodock` (`${_package.name.toLowerCase()}-autodock`, `auto-dock-service.ts:77`). The platform-wide entry point is `getAutoDockService()` from `@datagrok-libraries/bio/src/pdb/auto-dock-service.ts:73-81` — it locates the Docking package's `getAutoDockService` registered function via `DG.Func.find({package: 'Docking', name: 'getAutoDockService'})` and throws `Package 'Docking' must be installed for AutoDock service.` when the package is absent. Container readiness gating: callers `await adSvc.awaitStatus('started', 30000)` before issuing requests; default timeout 30s. The interface surface (`IAutoDockService`) is `ready` / `awaitStatus` / `checkOpenCl` / `dockLigand(receptor, ligand, autodockGpf, poseCount?, posColName?)` / `dockLigandColumn(...)` / `terminate`.
