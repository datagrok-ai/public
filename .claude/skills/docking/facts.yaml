- id: DG-FACT-243
  kind: enum
  scope: docking
  value: |-
    Atomic map types `A C HD N NA OA SA CL` (article's recommendation for "big ligand dataset" coverage) match the `ligand_types` line in the shipped `BACE1.gpf` exactly (`packages/Docking/files/targets/BACE1/BACE1.gpf:5`). The default GPF generated by `buildDefaultAutodockGpf` (used when no per-target gpf is supplied) uses a different but overlapping set — `A C N F NA OA HD SA` — i.e. adds `F` (fluorine) and drops `CL` (chlorine). Choosing atomic maps is per-target: ligand sets that include chlorinated compounds need `CL` explicitly in the gpf or AutoDock fails for those ligands at runtime.
