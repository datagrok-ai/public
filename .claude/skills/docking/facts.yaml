  value: |-
    The Docking package's "target" is a folder under `System:AppData/Docking/targets/` containing exactly two files — a `.gpf` AutoDock grid-parameter file and a receptor structure in `.pdbqt` (preferred) or `.pdb` format. The folder name surfaces verbatim as the target choice in the AutoDock dialog. `prepareAutoDockData` resolves the receptor by `extension ∈ {'pdbqt','pdb'}` and the gpf by `extension === 'gpf'`; if either is missing the call surfaces `grok.shell.warning('Missing .gpf or .pdbqt/.pdb file in the target folder.')` and returns `null`. Public reference targets live at `packages/Docking/files/targets/{BACE1,kras,nmdar1}/`.
