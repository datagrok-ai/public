- id: DG-FACT-158
  kind: enum
  scope: python-functions
  value: |-
    Function metadata is the same Datagrok header-comment grammar used by every script — `#name:`, `#description:`, `#language: python`, `#input: <type> <name>[=<default>] [{options}]`, `#output: <type> <name>`, plus `#meta.*` keys. Production reference uses `dataframe`, `string`, `int`, `bool`, `blob` types and per-input options like `category`, `choices: ["a","b"]`, `range: 1-2`. Inputs without options accept a free-text label in square brackets after the name (e.g., `#input: string nameskeys [Original features' names]`).
  derives_from:
