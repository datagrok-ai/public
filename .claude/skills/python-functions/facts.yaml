- id: DG-FACT-164
  kind: namespace
  scope: python-functions
  value: |-
    Once registered, a Python function is invoked from JS via the standard function dispatcher — `await grok.functions.call('<Package>:<HeaderName>', { paramA, paramB })` returns a `Promise<result>`. `<HeaderName>` is the value from the function's `#name:` header (NOT the Python `def` name nor the Celery `@app.task(name=...)` name). Article example shows `Plugin:add` — read `Plugin` as a placeholder for the actual package name.
  derives_from:
    - article: help/develop/how-to/packages/python-functions.md:114-118
    - code: packages/Samples/dockerfiles/app.py:18,32,47,57
  contradicts: []
