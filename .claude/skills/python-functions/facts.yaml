- id: DG-FACT-159
  kind: namespace
  scope: python-functions
  value: |-
    Each annotated function in production is wrapped with `@app.task(name='<celery_task_name>', bind=True, base=DatagrokTask)` where `app = Celery(settings.celery_name, broker=settings.broker_url)`. `Settings`, `DatagrokTask`, and `get_logger` are imported from `datagrok-celery-task`. The Celery task `name=` argument is the queue-routing identifier and is independent of the Datagrok function `#name:` header. The Datagrok function dispatcher resolves `<Package>:<HeaderName>` to the underlying Celery task at registration time.
