- id: DG-FACT-162
  kind: namespace
  scope: python-functions
  value: |-
    The Dockerfile must run a Celery worker bound to the platform-injected queue. Canonical ENTRYPOINT — `celery -A app worker --loglevel=info --hostname=$CELERY_HOSTNAME --concurrency=1 -Q $TASK_QUEUE_NAME`. `$CELERY_HOSTNAME` and `$TASK_QUEUE_NAME` are runtime env vars set by the Datagrok platform (grok_spawner) when the container starts. `-A app` means the Celery app object lives in `app.py` at module-level — so `app.py` is the de facto entrypoint filename.
  derives_from:
    - code: packages/Samples/dockerfiles/Dockerfile:27-31
  contradicts: []
  confidence: high

