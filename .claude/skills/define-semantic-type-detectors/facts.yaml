- id: DG-FACT-261
  kind: enum
  scope: define-semantic-type-detectors
  value: |-
    Three header tags govern the platform's auto-test for a detector — (1) `//meta.skipTest: <reason>` skips the auto-test entirely (reason string is free-form, conventionally a ticket reference like `#2596, Fix for test data in the utils library`); (2) `//meta.testData: <csv-path>` points at a fixture CSV shipped with the package — there must be exactly one column in that CSV that the detector should match; (3) `//meta.testDataColumnName: <name>` — together with `meta.testData`, asserts that the detector picks that specific column out of the fixture (catches false positives on sibling columns). All three are tags only — they do not change the detector's runtime behavior; they only configure the auto-test that fires per-detector in CI.
  derives_from:
