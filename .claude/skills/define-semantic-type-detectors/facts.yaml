- id: DG-FACT-257
  kind: enum
  scope: define-semantic-type-detectors
  value: |-
    A semantic-type detector is a regular package function tagged with the `semTypeDetector` role, signature `(col: Column) => string | null`. Header form (canonical for `detectors.js`, since `.js` files have no decorators) — `//meta.role: semTypeDetector` + `//input: column col` + `//output: string semType`. The role string is the value of `DG.FUNC_TYPES.SEM_TYPE_DETECTOR = 'semTypeDetector'`. The platform invokes every registered detector on every column each time a new dataframe is imported (article line 53 — "Datagrok calls detectors each time the user opens a table"), so detectors must be lightweight — typical body is a `col.type` + `col.name`-regex check, optionally followed by `DG.Detector.sampleCategories` (DG-FACT-258).
