- id: DG-FACT-256
  kind: naming
  scope: define-semantic-type-detectors
  value: |-
    The detectors-class name is mechanically derived from the package name — `<PackageName>PackageDetectors extends DG.Package`. The naming convention is load-bearing — the platform's detector loader resolves the class by appending the literal `PackageDetectors` suffix to the camel-cased package name. The boilerplate header in the template explicitly warns "Follow this naming convention to ensure that your detectors are properly loaded." The class extends `DG.Package` so detector methods can reach `this.logger` and other package-scoped APIs.
