  value: |-
    A package's data-shape semantic-type detectors live in a single fixed-name file at the package root — `<PackageRoot>/detectors.js`. The file is uploaded to the platform separately from the rest of the package bundle, so webpack syntax errors in `detectors.js` do not surface as build warnings — failures only manifest at runtime when the detector class fails to load. Distinct from `package.json` `meta.semanticTypes` (DG-FACT-094), which registers regex-based string-content detectors declaratively; `detectors.js` is for shape/statistics-driven detection that needs JS logic.
