- id: DG-FACT-264
  kind: namespace
  scope: define-semantic-type-detectors
  value: |-
    `col.meta.units = '<unit>'` writes the `units` tag on the column (`DG.TAGS.UNITS = 'units'`, getter/setter at `js-api/src/dataframe/column-helpers.ts:232-234`). Canonical pairing inside a detector — when a single semType covers multiple physical formats (e.g., `Molecule3D` for both `pdb` and `pdbqt`), set `col.meta.units` to disambiguate alongside the returned semType. Renderers and viewers downstream branch on the units tag to pick the right parser (BiostructureViewer's `detectPdb` writes `col.meta.units = 'pdb'` vs `'pdbqt'` for the same `Molecule3D` semType). Setting `units = null` removes the tag (`setNonNullTag` short-circuits via `grok_Column_Remove_Tag`).
  derives_from:
