- id: DG-FACT-258
  kind: namespace
  scope: define-semantic-type-detectors
  value: |-
    `DG.Detector.sampleCategories(column: Column, check: (s: string) => boolean, min: number = 5, max: number = 10, ratio: number = 1, minStringLength: number = 1): boolean` — runs `check` against a sampled subset of the column's distinct categories, returns `true` only if at least `ratio * max` of `max` checks pass. SILENT FAIL-CLOSED: if `column.type !== TYPE.STRING` it returns `false` immediately (no exception, no warning). Also returns `false` if `categories.length < min`, or if no category meets `minStringLength`. The implementation samples every `categories.length / max`-th category — order-deterministic, not random despite the method name. Use this for SMILES/PDB/sequence-shape detection where checking every value would be O(N) on huge columns.
