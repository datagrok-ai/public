- id: DG-FACT-262
  kind: naming
  scope: define-semantic-type-detectors
  value: |-
    A column has at most ONE semType — when several detectors match, the FIRST detector to return non-null wins (article line 46-47 — "its semantic type depends on the order in which the detectors were triggered"). Standard platform detectors do NOT get preference over package detectors — the iteration order is package-load order plus declaration order within each `<Pkg>PackageDetectors` class. Practical consequence: a too-loose package detector can shadow a stricter platform detector. Mitigations — (a) add the strictest checks first inside the detector (data type, name pattern, regex shape) before reaching for `DG.Detector.sampleCategories`, and (b) if the detector aliases a known platform semType, return `null` and let the platform detector handle it.
  derives_from:
    - article: help/develop/how-to/functions/define-semantic-type-detectors.md:46-47
    - code: js-api/src/const.ts:367-370  # platform invokes each detector once per column on import
  contradicts: []
  confidence: high

- id: DG-FACT-263
  kind: naming
  scope: define-semantic-type-detectors
  value: |-
    Empty / null values must be excluded from detector match logic — empty strings should NOT match the detector's regex (article line 84-86 — "Otherwise, this type might be assigned to a column consisting solely of nulls, which won't add any helpful insights to the data profile"). `DG.Detector.sampleCategories` already enforces a `minStringLength: number = 1` floor (DG-FACT-258) which blocks empty-string categories, but if the detector iterates `col.categories` or `col.toList()` directly, it must `if (!s) continue;` or its regex must include a non-empty assertion (e.g., `^.+$`). All-null columns are common in joined data; an over-eager detector pollutes the data profile across the whole platform session.
  derives_from:
    - article: help/develop/how-to/functions/define-semantic-type-detectors.md:84-86
    - code: js-api/src/data.ts:298-299  # !categories.some(cat => cat.length >= minStringLength) -> false
  contradicts: []
