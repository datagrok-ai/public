- id: DG-FACT-074
  kind: naming
  scope: file-viewers
  value: |-
    Supported file extensions are declared via `//meta.fileViewer: <ext>[,<ext>…]` — comma-separated list, optional whitespace tolerated. Single-extension form (`mol`, `eps`, `pdf`) and multi-extension form (`mol,sdf,cif`, `kmz,kml`, `mp3, wav, flac, ogg, oga, opus, m4a, aac, weba`) both work. Multiple `fileViewer` functions in the same package may register the same extension when each one declares a `meta.fileViewerCheck` to disambiguate.
