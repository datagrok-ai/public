- id: DG-FACT-075
  kind: naming
  scope: file-viewers
  value: |-
    `//meta.fileViewerCheck: <Package>:<Function>` is the optional content-disambiguation hook. The platform calls the named function with the file's content (input is `string` for text payloads, `blob` / `Uint8Array` for binary) and expects a `bool` return; truthy means "this viewer is applicable". Used to register multiple viewers for the same extension or to gate a viewer on file-content patterns. `FileViewerOptions.fileViewerCheck` is the decorator-form key.
  derives_from:
    - code: js-api/src/decorators/functions.ts:220-223,342-348
    - code: packages/Plates/src/package.ts:56,176                        # @grok.decorators.fileViewer({fileViewer, fileViewerCheck})
    - code: packages/Chem/src/package.ts:2850-2853                       # Chem:checkJsonMpoProfile
    - code: packages/MetabolicGraph/src/package.ts:79,103-108            # checks string content < 1e7 chars
    - code: packages/Plates/src/package.ts:226                           # checkFileIsPlate(content: string): boolean
    - code: packages/Plates/src/package.ts:120-132                       # checkExcelIsPlate(content: Uint8Array): Promise<boolean>
  contradicts:
