  value: |-
    A custom file viewer is a function with `//meta.role: fileViewer`, `//input: file file` (a `FileInfo`), and `//output: view v` (a `DG.View`, possibly Promise-wrapped). The platform invokes it from the file-share browser when the user opens a file with a registered extension. The `fileViewer` role token is canonicalized in `js-api/src/const.ts` as `FILE_VIEWER: 'fileViewer'`.
