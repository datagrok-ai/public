- id: DG-FACT-077
  kind: namespace
  scope: file-viewers
  value: |-
    A file viewer function may be SYNCHRONOUS or ASYNCHRONOUS. Sync — return the `DG.View` immediately and chain `file.readAsBytes().then(...)` to mutate the view's DOM after the read settles (article example, EpsViewer.previewEps). Async — declare `async` and `return view` after `await file.readAsString()` (FileEditors.previewPdf, MetabolicGraph.escherFileViewer). Both reach the same end state; sync wins when the user-visible view should appear before the bytes load.
  derives_from:
    - article: help/develop/how-to/files/create-custom-file-viewers.md:20-31
    - code: packages/EpsViewer/src/package.ts:124-145                    # sync: returns view, then file.readAsBytes().then(...)
    - code: packages/Plates/src/package.ts:57-66                         # sync: returns view immediately
    - code: packages/FileEditors/src/package.g.ts:13-15                  # async function previewPdf(...): Promise<any>
    - code: packages/MetabolicGraph/src/package.ts:82-101                # async, awaits file.readAsString()
  contradicts: []
  confidence: high

- id: DG-FACT-078
  kind: namespace
  scope: file-viewers
  value: |-
    Inside the viewer, `DG.View.create(options?)` mints a fresh view; `options` is `string | ElementOptions | null` (CSS class name or `_options` payload). Common patterns — `DG.View.create()` (no args, default panel), `DG.View.create('d4-escher-container')` (CSS class). Mount custom DOM with `view.append(host)` (where `host` is built via `ui.div(...)`); set `view.name = file.name` so the tab caption reflects the file. The `FileInfo` input exposes `readAsString(): Promise<string>` and `readAsBytes(): Promise<Uint8Array>` for content access.
