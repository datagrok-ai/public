  value: |-
    Universal viewer-attach API is `TableView.addViewer(v: ViewerType | string | Viewer, options?: any): Viewer` (`js-api/src/views/view.ts:418-427`). When `v` is a string the platform looks up the type by name and dispatches asynchronously for non-core viewers; when `v` is a `Viewer` instance the platform attaches it directly. Optional `options` is applied via `setOptions` after attach. Use this for ALL viewers (native and custom). Wrapper methods on `View` (`view.histogram(opts)`, `view.scatterPlot(opts)`, `view.barChart(opts)`, etc., lines 444-587) are JSDoc-marked `deprecated: use addViewer(Viewer.<type>(options))` and slated for removal in 1.21.
