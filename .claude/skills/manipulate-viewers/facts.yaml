  value: |-
    Two factory paths for creating a `Viewer` BEFORE attaching it. (a) `DG.Viewer.fromType(viewerType, table, options=null): Viewer` — SYNCHRONOUS; reserved for the 25 CORE viewers (`Viewer.getViewerTypes({core: true})`) whose code is already loaded in the shell. (b) `dataFrame.plot.fromType(viewerType, options=null): Promise<Widget>` — ASYNC; the caller must `await` because the owning package may need to load. Article line 71-77 names this difference but doesn't show the return-type contrast (sync `Viewer` vs async `Promise<Widget>`). For sync-only-attach scenarios, `view.addViewer('CustomTypeName')` works but property writes via `setOptions` are not guaranteed to take effect.
  derives_from:
