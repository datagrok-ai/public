  value: |-
    `initializationFunction: string` is a built-in viewer property on every `IBaseSettings`-derived interface (`js-api/src/interfaces/d4.d.ts:77,231,261,278,306,331,380,410,437,540`, etc.). Value is a registered Datagrok function NAME (`<Package>:<funcName>` or a runtime-registered name). The function MUST take a single `viewer` input typed as the appropriate viewer subclass; it RUNS every time the viewer is constructed — including restore from saved layouts and projects. Production canonical: `Chem` package's `activityCliffsInitFunction` (`packages/Chem/src/package.ts:1238-1242` — `@grok.decorators.func({name: 'activityCliffsInitFunction'})` over `static async activityCliffsInitFunction(@grok.decorators.param({type: 'viewer'}) sp: DG.ScatterPlotViewer)`). Pass via options at creation: `viewer.setOptions({initializationFunction: 'Pkg:initFunc'})` or `view.scatterPlot({initializationFunction: 'initScatterSquare'})`.
