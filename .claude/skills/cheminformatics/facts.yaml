  value: |-
    `grok.chem.findSimilar(column, molecule, settings?)` returns `Promise<DataFrame | null>` (null when `molecule` is empty ŌĆö i.e. cache-priming mode). The DataFrame has THREE columns ŌĆö `molecule` (original strings from input column), `score` (Tanimoto similarity, range 0.0ŌĆō1.0, the DataFrame is sorted descending by this), and `index` (positions in original column). Default settings are `{ limit: Number.MAX_VALUE, cutoff: 0.0 }` ŌĆö i.e. by default returns ALL molecules ranked.
  derives_from:
    - article: help/develop/domains/chem/cheminformatics.md:67-78
    - code: js-api/src/chem.ts:726-737
  contradicts: []
  confidence: high

- id: DG-FACT-240
  kind: namespace
  scope: cheminformatics
  value: |-
    `grok.chem.getSimilarities(column, molecule, settings?)` returns `Promise<Column | null>` ŌĆö a SINGLE Column (not a DataFrame, despite the article's phrasing) of similarity scores aligned 1:1 with the input column. Pass `molecule = ''` to prime the fingerprint cache without scoring; in that branch the function returns `null`. Output Column length always equals input Column length; molecules that fail to parse get null fingerprints (and thus null scores) but the row count is preserved.
  derives_from:
    - article: help/develop/domains/chem/cheminformatics.md:82-95
    - code: js-api/src/chem.ts:699-708
  contradicts:
    - DG-FACT-DRIFT-094  # article phrases the return as a DataFrame "with a single Column" and shows settings={sorted:false}
  confidence: high

- id: DG-FACT-241
  kind: namespace
  scope: cheminformatics
  value: |-
    Datagrok ships TWO molecule renderers with different engines and different sync/async profiles. `grok.chem.svgMol(smiles, width=300, height=200, options?): HTMLDivElement` is SYNC (returns the div immediately, fills its `innerHTML` after a dynamic `import('openchemlib/full.js')`); engine is OpenChemLib JS. `grok.chem.canvasMol(x, y, w, h, canvas, molString, scaffoldMolString=null, options={normalizeDepiction:true,straightenDepiction:true}): Promise<void>` is ASYNC (delegates to `Chem:canvasMol` server function); engine is RDKit. Scaffold highlighting is done via SMARTS passed as `scaffoldMolString`. The article notes canvasMol "will be made synchronous in the future" ŌĆö still async as of current code (TODO comment in source).
  derives_from:
