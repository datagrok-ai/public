- id: DG-FACT-237
  kind: namespace
  scope: cheminformatics
  value: |-
    Similarity scoring (`findSimilar`, `getSimilarities`) uses Morgan (circular) fingerprints + Tanimoto/Jaccard similarity. Substructure search (`searchSubstructure`) uses RDKit Pattern fingerprints for preliminary filtration, then graph-based `get_substruct_match` on Mol objects. Both maintain a per-column cache: encountering a new `Column` builds the cache; subsequent calls on the same `Column` reuse it. Mol objects are computed only for the first N molecules (memory cap), fingerprints for all.
  derives_from:
    - article: help/develop/domains/chem/cheminformatics.md:50,57-58,89-90
  contradicts: []
  confidence: medium  # algorithm description from article; cache lives Dart-side, not directly verifiable from chem.ts

- id: DG-FACT-238
  kind: namespace
  scope: cheminformatics
  value: |-
    `grok.chem.searchSubstructure(column, pattern, settings?)` returns a `BitSet` whose length always equals `column.length`. The i-th bit is 1 iff the i-th molecule contains the pattern's substructure. Molecules that fail to parse (invalid SMILES, unsupported notation) leave the corresponding bit as 0 ŌĆö they are silently skipped during indexing, NOT raised as errors. Settings shape per the TS type is `{ molBlockFailover?: string }` only ŌĆö the `molBlockFailover` is the SMARTS used as the substructure when `pattern` itself is invalid.
  derives_from:
    - article: help/develop/domains/chem/cheminformatics.md:38-52
    - code: js-api/src/chem.ts:766-775
  contradicts:
    - DG-FACT-DRIFT-093  # article also lists `substructLibrary: true` which is not in the TS settings type
  confidence: high

