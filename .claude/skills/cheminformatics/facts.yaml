    The cheminformatics JS-API surface lives under `grok.chem` (re-exported `chem.*` namespace from `js-api/src/chem.ts`). Most methods are async and route through `grok.functions.call('Chem:<dartName>', ...)` ŌĆö i.e., they delegate to the Chem package's server-side / Web Worker functions. The wrapper-to-Dart-name mapping is not 1:1 (e.g. `diversitySearch` ŌåÆ `Chem:getDiversities`, `mcs` ŌåÆ `Chem:FindMCS`, `rGroup` ŌåÆ `Chem:FindRGroups`, `descriptors` ŌåÆ `Chem:chemDescriptors`).
