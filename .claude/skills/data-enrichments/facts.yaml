- id: DG-FACT-127
  kind: enum
  scope: data-enrichments
  value: |-
    PowerPack restricts which COLUMN types can be enriched. Allowed — `STRING`, `BIG_INT`, `INT`, `FLOAT` (the `DG.COLUMN_TYPE` constants). Disallowed — `BOOL` and `DATE_TIME`; the column context panel renders an inline message ("Cannot use column of <type> type for enrichment") instead of the enrichment editor. Source — `packages/PowerPack/src/db-explorer.ts:396-398`.
  derives_from:
    - code: packages/PowerPack/src/db-explorer.ts:396-398
    - code: js-api/src/const.ts (COLUMN_TYPE enum)
  contradicts: []
  confidence: high

- id: DG-FACT-448
  kind: namespace
  scope: data-enrichments
  value: |
    The enrichments feature is owned by the PowerPack plugin
    (`packages/PowerPack/src/db-explorer.ts`). The function
    `PowerPack:runEnrichment` (located via
    `DG.Func.find({package: 'PowerPack', name: 'runEnrichment'})`)
    materializes an enrichment JSON into a `DG.TableQuery`:
    `query.table = "<keySchema>.<keyTable>"`,
    `query.fields = e.fields`, `query.joins = e.joins`. Without
    PowerPack installed, plugin-bundled enrichment JSON has no consumer.
  derives_from:
