- id: DG-FACT-122
  kind: naming
  scope: data-enrichments
  value: |-
    A package ships data enrichments as JSON files placed under `<PackageRoot>/enrichments/`. One enrichment per file. The Datagrok platform loads them automatically when the plugin is published. Production packages use this layout — `packages/Chembl/enrichments/` (17 files) and `packages/DBTests/enrichments/` (3 files). PowerPack must be installed in the target Datagrok instance for the feature to surface in the column context panel.
