- id: DG-FACT-123
  kind: enum
  scope: data-enrichments
  value: |-
    A bundled enrichment JSON has six required keys plus one array. Required — `name` (display label), `connection` (target connection nqName, e.g. `Chembl:Chembl` or `Dbtests:PostgresTest`), `keySchema` (always `public` in the canonical examples), `keyTable` (the table the key column lives on), `keyColumn` (the column whose value drives the lookup), `fields` (string[] of fully-qualified `schema.table.column` selectors). One required array — `joins` (one or more join descriptors). Every shipping enrichment in `packages/Chembl/enrichments/` and `packages/DBTests/enrichments/` carries exactly these keys.
  derives_from:
    - article: help/develop/how-to/packages/data-enrichments.md:29-50,54-62
    - code: packages/DBTests/enrichments/company_info.json
    - code: packages/Chembl/enrichments/activities_assays.json
  contradicts: []
  confidence: high

- id: DG-FACT-124
  kind: naming
  scope: data-enrichments
  value: |-
    A `joins[]` entry has five keys — `leftTableName` (fully-qualified `schema.table`), `rightTableName` (fully-qualified `schema.table`), `joinType` (string), `leftTableKeys` (string[]), `rightTableKeys` (string[]). The two key arrays must be the same length; positional pairs form the join condition. Every shipping enrichment uses single-element key arrays (no production composite-key example seen).
