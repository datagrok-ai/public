- id: DG-FACT-126
  kind: naming
  scope: data-enrichments
  value: |-
    Every entry in `fields[]` is a 3-segment dot-qualified string `<schema>.<table>.<column>` (e.g. `public.customers.companyname`). Both the source table's columns AND the joined table's columns may appear; the `keyTable.keyColumn` itself is typically included so the result row carries the lookup key. There is no per-field rename / alias syntax.
