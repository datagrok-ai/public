- id: DG-FACT-091
  kind: namespace
  scope: folder-content-preview
  value: |-
    A folderViewer returns `DG.Widget | undefined` (or `Promise<...>`). Returning `undefined` (or omitting the return) signals "no preview applies" — the platform falls back to the default folder view. This is the article's stated contract ("returns a widget if a custom preview could be provided, or undefined otherwise") and matches both production examples — `clinicalCaseFolderLauncher` falls through with no return when no `dm.csv` is found; `platesFolderPreview` returns `undefined` when the folder name does not include `'plate'`.
  derives_from:
