  value: |-
    Widening the output type — use `outputs: [{name: 'result', type: 'dynamic'}]` in the decorator config when the function returns `DG.Widget | DG.ViewBase | undefined` (instead of just `Widget`). The codegen default is `{name: 'result', type: 'widget'}` (`tools/bin/utils/func-generation.ts:424`); Plates overrides it (`@grok.decorators.folderViewer({outputs: [{'name': 'result', 'type': 'dynamic'}]})` at `packages/Plates/src/package.ts:48`) so its preview can return either a `Widget` or a `ViewBase`. The auto-generated `package.g.ts` reflects this — `//output: dynamic result` instead of `//output: widget result`.
