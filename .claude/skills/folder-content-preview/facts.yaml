- id: DG-FACT-093
  kind: namespace
  scope: folder-content-preview
  value: |-
    The `folder` input is a `DG.FileInfo` for the folder itself — use `folder.name`, `folder.fullPath` (e.g. to read child files via `grok.dapi.files.readAsText(`${folder.fullPath}/dm.csv`)`). The `files` input is `DG.FileInfo[]` listing the folder's entries — iterate to detect sentinel filenames (e.g. `files.some((f) => f.fileName.toLowerCase() === 'dm.csv')`). The article example detects `dm.csv` via the `files` scan (`folder-content-preview.md:20`). ClinicalCase scans `files` AND uses `folder.fullPath` for reads; Plates scans `folder.name?.toLowerCase()` only.
  derives_from:
    - article: help/develop/how-to/files/folder-content-preview.md:17-20
    - code: packages/ClinicalCase/src/package.ts:204-220
