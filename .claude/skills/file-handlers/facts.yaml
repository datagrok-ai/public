- id: DG-FACT-084
  kind: naming
  scope: file-handlers
  value: |-
    The set of extensions a handler claims is declared in `meta.ext` as a single comma-separated string. Whitespace around commas is tolerated. One handler entry, many extensions — `meta.ext: fasta, fna, ffn, faa, frn, fa, fst` (Bio FASTA), `meta.ext: sdf,mol` (Chem SDF), `meta.ext: bam, bai` (Bio BAM). Decorator form uses the same shape via the `ext: string` key — `@grok.decorators.fileHandler({ext: 'jdx'})`. Repeating `//meta.ext:` lines is NOT supported (the parser keeps only the last). Per-extension dispatch into a single body is the canonical pattern: register one decorator per extension when bodies differ (BiostructureViewer NGL pattern), or one comma-list when they share.
  derives_from:
