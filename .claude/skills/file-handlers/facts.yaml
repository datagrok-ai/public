- id: DG-FACT-086
  kind: enum
  scope: file-handlers
  value: |-
    The three "open this file" roles are distinct registrations, NOT interchangeable. `fileHandler` — `(content: string | Uint8Array) => DataFrame[]`; the platform IMPORTS the file as one-or-more tables and opens them as TableViews. `fileViewer` — `(file: DG.FileInfo) => DG.View | Promise<DG.View>`; the platform builds a custom view WITHOUT importing as a table (used for things that aren't tabular: 3D structures, audio, NMR spectra). `fileExporter` — `() => void`; goes the other way (write the active table out). When a file's extension is registered for both a viewer and a handler, the handler does the import and the viewer adds the dedicated visualization — they coexist (e.g., nmrium registers both `fileHandler` and `fileViewer` for `nmrium`).
  derives_from:
    - code: js-api/src/const.ts:372-395                            # FILE_VIEWER, FILE_EXPORTER, FILE_IMPORTER signatures
    - code: js-api/src/decorators/functions.ts:220-228             # FileViewerOptions vs FileHandlerOptions (separate types)
    - code: packages/nmrium/src/package.ts:20-55                   # both fileHandler + fileViewer for nmrium
  contradicts: []
  confidence: high

