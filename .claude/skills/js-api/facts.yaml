  value: |-
    `grok.events` (class `Events`) and per-instance event getters (e.g., `dataFrame.onValuesChanged`, `grok.events.onCurrentProjectChanged`) return RxJS `Observable<T>` produced by `__obs(eventId, object?)` from `js-api/src/events.ts:45`. The platform bridges Dart event streams via `rxjs.fromEventPattern`. Subscribe with `.subscribe(handler)`; compose with `rxjs/operators` (e.g., `debounce(observable, ms)` is a thin re-export of `debounceTime`).
  derives_from:
