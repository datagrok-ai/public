- id: DG-FACT-119
  kind: namespace
  scope: package-settings-editor
  value: |-
    The settings-editor function returns `DG.Widget` (or `Promise<DG.Widget>` for async). The widget is rendered inside the "Settings" pane of the context panel (right side) when the user opens the package's properties view. `DG.Widget` is the same base class used for dashboard widgets and tooltip widgets — subclass it (`extends DG.Widget`) and pass an `HTMLElement` to the `super(...)` constructor as the root node. The article's minimal example uses `super(ui.divText('...'))`; PowerPack uses `super(ui.div())` and appends to `this.root` (`packages/PowerPack/src/settings-editor.ts:11-40`); HitTriage builds inputs from `DG.Property[]` and pushes them into a `ui.div(inputs)` (`packages/HitTriage/src/packageSettingsEditor.ts:66-...`).
  derives_from:
