  value: |-
    A custom package-settings editor is a function annotated with role `packageSettingsEditor`. The role string is canonical — `FUNC_TYPES.PACKAGE_SETTINGS_EDITOR = 'packageSettingsEditor'` (`js-api/src/const.ts:394`), `SETTINGS_EDITOR = 'packageSettingsEditor'` enum in the codegen (`tools/bin/utils/func-generation.ts:95`), and the function-role descriptor lists `header: 'tags'`, `signature: 'packageSettingsEditor(): Widget'` (`js-api/src/const.ts:502-507`). Three annotation surfaces all work — `//meta.role: packageSettingsEditor` (header), `tags: ['packageSettingsEditor']` + `meta: {role: 'packageSettingsEditor'}` (decorator), or both together (HitTriage uses both — `packages/HitTriage/src/package.ts:350-358`). Skill output should prefer the decorator form on a `static` inside `PackageFunctions`; the codegen emits matching `package.g.ts`.
