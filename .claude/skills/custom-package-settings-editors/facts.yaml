- id: DG-FACT-121
  kind: enum
  scope: package-settings-editor
  value: |-
    The settings-editor function complements `package.json`-declared properties — it does NOT replace them. The platform reads property metadata from `package.json` (or the codegen-defined `properties` block), then passes the resulting `DG.Property[]` to the editor. The editor's job is to provide a custom UI for those properties; the default UI is auto-generated. This is the same `DG.Property` array surfaced to the column-tooltip / function-input infrastructure — each entry has `.name`, `.category`, `.get(scope)`, `.set(scope, value)`. HitTriage filters by `.category` (`p.category === defaultSharingGroupCategoryName`) to render only a subset of properties (`packages/HitTriage/src/packageSettingsEditor.ts:67`). Persistence — call `prop.set(null, stringValue)` to stage; the platform writes to backend on the user's "save" click.
  derives_from:
