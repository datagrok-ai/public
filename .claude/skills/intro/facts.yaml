- id: DG-FACT-254
  kind: numeric
  scope: cheminformatics
  value: |-
    Datagrok's de-facto SMILES-length guard before RDKit calls is 5000 characters (no central constant ‚Äî the threshold is duplicated as a literal in each call site). Pattern: `if (!grok.chem.isMolBlock(molecule) && molecule?.length > 5000) return;` ‚Äî molblocks are exempt because their atom count is encoded in headers, not in line length. Used by `Chem/src/widgets/scaffold-tree.ts:2770`, `Chem/src/widgets/pharmacophore-features.ts:76`, `Chem/src/widgets/structural-alerts.ts:27`, and `Chembl/src/package.ts:177`. `SureChembl/src/package.ts:193` declares the same threshold via a named constant `MAX_SMILES_LENGTH = 5000`. The threshold is a practical "is this still a small molecule" filter ‚Äî peptide chains and macromolecule SMILES routinely exceed it and crash RDKit's parser.
  derives_from:
