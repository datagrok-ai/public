- id: DG-FACT-251
  kind: enum
  scope: cheminformatics
  value: |-
    Storage-format taxonomy mapped to `DG.chem.Notation` (`js-api/src/chem.ts:51-59`). The enum's seven members and their roles are ‚Äî `Smiles` (compact one-line graph string, used as the default column type), `CxSmiles` (extended SMILES with stereo/coord annotations), `Smarts` (substructure *query* language with logical atom/bond operators ‚Äî patterns, not molecules), `CxSmarts` (extended SMARTS), `MolBlock` (MOL V2000 ‚Äî atoms+bonds with 2D/3D coordinates and per-atom/bond properties; recognized by the `M  END` marker), `V3KMolBlock` (MOL V3000 for >999 atoms, enhanced stereo, R-group templates), `Unknown` (sentinel for "let the converter detect"). SDF is NOT a `Notation` value ‚Äî it's a *file* of concatenated `M  END\n$$$$\n` MOL records (loaded as a `DataFrame` by `grok.data.loadTable`, one row per record). SMIRKS (reaction transformations) is not a `Notation` either; it rides on the SMARTS surface. The smaller `UNITS.Molecule` set (`smiles`, `molblock`, `v3Kmolblock`, `inchi`, `const.ts:248-255`) is what semantic-type renderers consume ‚Äî note that `inchi` is a UNIT but NOT a `Notation`.
