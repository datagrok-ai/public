- id: DG-FACT-253
  kind: namespace
  scope: cheminformatics
  value: |-
    Format detection + conversion API surface (`js-api/src/chem.ts:68,888-913`). All four are *synchronously* callable from JS (no `await`) but three of them route through the Chem package via `Func.find` and `funcCall.callSync()` ‚Äî they only work when the Chem package is installed. `chem.isMolBlock(s)`: pure JS marker check (`s.includes('M  END')`); never throws. `chem.checkSmiles(s)`: calls `Chem:isSmiles` ‚Äî returns `false` for empty/null/SMARTS/molblock and for malformed SMILES. `chem.isSmarts(s)`: calls `Chem:isSmarts`; returns `false` if the Chem function is missing (graceful degrade). `chem.convert(s, sourceFormat: Notation, targetFormat: Notation): string`: calls `Chem:convertMolNotation`; pass `Notation.Unknown` as source when the input format is uncertain and let RDKit detect. SMARTS ‚Üí SMILES is meaningless and warns via `chem.smilesFromSmartsWarning()` (line 915-918, just a balloon ‚Äî does not throw).
