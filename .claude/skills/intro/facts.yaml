- id: DG-FACT-252
  kind: namespace
  scope: cheminformatics
  value: |-
    Cheminformatics applicability is bounded ‚Äî `grok.chem.*` operates on small molecules and short peptides only. Datagrok separates the surface at the semantic-type layer (`js-api/src/const.ts:227-229`) ‚Äî `SEMTYPE.MOLECULE = 'Molecule'` is the trigger for `grok.chem.*` (substructure, similarity, descriptors, R-group, MCS, `svgMol`/`canvasMol`). `SEMTYPE.MACROMOLECULE = 'Macromolecule'` (proteins, oligonucleotides, peptide chains, HELM-encoded sequences) is handled by the `Bio` package (`@datagrok-libraries/bio`); macromolecule columns are silently no-op for `grok.chem` calls ‚Äî they pre-fail format detection. `SEMTYPE.MOLECULE3D = 'Molecule3D'` is for 3D pose strings (the AutoDock pose column, PDB/PDBQT). For peptides expressible as SMILES, the Bio package provides atomic-level expansion (`bio/src/widgets/to-atomic-level-widget.ts`) into a `Molecule` column before passing to `grok.chem`.
