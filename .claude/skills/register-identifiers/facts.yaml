- id: DG-FACT-059
  kind: namespace
  scope: register-identifiers
  value: |-
    `DG.ObjectHandler` is the base class extended for custom semantic-type rendering. Override `get type()` (returns the semType string), `isApplicable(x)` (returns boolean — typically `x instanceof DG.SemanticValue && x.semType === '<type>'`), and any of `renderTooltip(x, context?)`, `renderCard(x, context?)`, `renderProperties(x, context?)`, `renderMarkup(x, context?)`, `renderIcon(x, context?)`, `renderView(x, context?)`. All renderers return `HTMLElement`. Defaults render `divText(getCaption(x))`.
  derives_from:
