  value: |-
    The init function that registers handlers must be marked as autostart. Two equivalent forms — header annotation `//meta.role: init, autostart` (or just `autostart`), or the decorator `@grok.decorators.autostart()` on a `static init()` method inside `PackageFunctions`. Canonical reference uses the decorator form.
