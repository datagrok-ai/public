- id: DG-FACT-058
  kind: naming
  scope: register-identifiers
  value: |-
    A package declares identifier patterns by adding a `meta.semanticTypes` array to `package.json`. Each entry takes `semType` (string), `description` (string), and `parsers` — an ARRAY of objects, each with a `regexp` field. Multiple parsers may apply to the same semantic type. After deploy, the platform auto-detects matches in any text/cell on the platform and tags them with the semantic type.
