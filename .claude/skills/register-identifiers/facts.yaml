  value: |-
    For identifiers tied to database tables, the recommended approach is the `@datagrok-libraries/db-explorer` library (config-driven). Entry point — `DBExplorer.initFromConfig(config)` returns a `DBExplorer` instance OR `null` (skill authors must null-check; on null, the schema couldn't be loaded or the connection wasn't found). Alternative — `DBExplorer.initFromConfigPath(_package, configPath?)` reads a JSON config from package files (default path `db-explorer/db-explorer-config.json`).
