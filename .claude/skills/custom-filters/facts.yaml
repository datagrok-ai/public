  value: |-
    `attach(dataFrame: DataFrame)` is the lifecycle hook called when a filter is bound to a dataframe — subclasses MUST call `super.attach(dataFrame)` first (the base subscribes to `onRowsFiltering` and pushes the subscription to `this.subs`). After the super call, subclasses assign `this.column` and `this.columnName`, then build their UI (typically via a `render()` method). Default column resolution — when `columnName` is unset, the subclass picks a sensible default (RadioButton picks `DG.Utils.firstOrNull(this.dataFrame!.columns.categorical)`; MultiValue picks `this.dataFrame!.columns.byIndex(0)`).
