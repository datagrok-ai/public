  value: |-
    When the filter is hosted by a different package than the caller, the filter function must be loaded BEFORE the synchronous `view.filters({...})` call. The canonical pattern is `await grok.functions.call('<Package>:<filterFunc>')` first, then `view.filters({filters: [{type: '<Package>:<filterFunc>', ...}]})`. ApiSamples uses this pattern for Chem's substructure filter on a non-Chem view.
