- id: DG-FACT-274
  kind: namespace
  scope: custom-filters
  value: |-
    Override `get isFiltering(): boolean` to declare whether the filter currently filters anything. Returning `true` unconditionally (as `RadioButtonFilter` does — line 22) tells the platform a filter is always active; returning a computed value (as `MultiValueFilter` does — line 18-20: combines `super.isFiltering` with "any checkbox unchecked") lets the platform short-circuit redundant work when nothing is selected. The base getter checks for the CSS classes `d4-filter-disabled` / `d4-filters-disabled` set by FilterGroup when the user toggles the filter via the panel checkbox (`js-api/src/widgets/filter.ts:60-63`). Subclasses that want the user-disable behavior should chain through `super.isFiltering`.
