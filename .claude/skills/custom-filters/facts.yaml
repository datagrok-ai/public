  value: |-
    When the filter's UI selection changes, it must call `this.dataFrame!.rows.requestFilter()` — this is what triggers the platform's `onRowsFiltering` event, which in turn invokes `applyFilter()` on every filter in the group. Direct calls to `applyFilter()` bypass the chain and produce wrong results when multiple filters are active. Both reference filters wire this on every input change handler (`radio-button-filter.ts:73`, `multi-value-filter.ts:88`).
