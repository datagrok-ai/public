- id: DG-FACT-270
  kind: namespace
  scope: custom-filters
  value: |-
    Collaborative filtering contract — every custom filter participates in a multi-filter chain by writing the dataframe filter mask additively (only flip bits to FALSE; never set TRUE). Inside `applyFilter()` the filter reads `this.column!.getRawData()` (or `.get(i)`), iterates `this.dataFrame!.rowCount`, and calls `filter.set(i, false, false)` for each row that fails its own predicate. The `false` second-argument-to-`set` semantic combines with already-filtered rows. Finish with `this.dataFrame!.filter.fireChanged()`. The Filter base class JSDoc on `applyFilter` states this verbatim: "should disregard false values (these are filtered out already by other filters), and should filter out corresponding indexes" (`js-api/src/widgets/filter.ts:71-75`).
  derives_from:
    - code: js-api/src/widgets/filter.ts:71-75
    - code: packages/Widgets/src/filters/radio-button-filter.ts:53-63
    - code: packages/Widgets/src/filters/multi-value-filter.ts:50-68
  contradicts: []
