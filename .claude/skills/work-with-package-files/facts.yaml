    - code: packages/Bio/files
    - code: packages/HitTriage/files
    - code: packages/ClinicalCase/tables
  contradicts: []
  confidence: high

- id: DG-FACT-166
  kind: naming
  scope: package-files
  value: |-
    The conventional package entrypoint exports a module-level `_package` symbol — `export const _package = new DG.Package();` (Chem) or `export const _package = new <Subclass>();` for custom subclasses (Bio's `BioPackage`, HitTriage's `HTPackage`). All `_package.webRoot` / `_package.files.*` examples in the public repo dereference this exported symbol; subclassing is supported via `class X extends DG.Package`.
