- id: DG-FACT-165
  kind: naming
  scope: package-files
  value: |-
    Two package-root directories are reserved by Datagrok for bundled data — `files/` (any binary/text/JSON/CSV) and `tables/` (specifically tabular). Both allow arbitrary subdirectories. Convention is honored by 25+ shipping packages (`Bio/files`, `HitTriage/files`, `EDA/files`, `Chem/files`, `ClinicalCase/tables`, …); arbitrary other folders are also legal, but `files/` is the only one wired to `_package.files` (the AppData FilesDataSource).
  derives_from:
