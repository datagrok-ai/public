- id: DG-FACT-167
  kind: namespace
  scope: package-files
  value: |-
    `_package.webRoot` is a string getter (settable) that returns the URL prefix under which the package's static assets are served by the platform. Implementation calls `api.grok_Package_Get_WebRoot(this.dart)` when the package was loaded from dart, otherwise returns the locally-set value. Trailing slash IS included in the value, so usage is `_package.webRoot + 'images/foo.png'` (no leading slash on the suffix). Anything physically in the package source tree (README, images/, even files/, tables/) is fetchable via this URL — it's literally an HTTP GET against the package's web root.
  derives_from:
    - article: help/develop/how-to/packages/work-with-package-files.md:34-48
    - code: js-api/src/entities/misc.ts:79-88
    - code: packages/HitTriage/src/app/pep-triage-views/info-view.ts:22,32
  contradicts: []
