    FilesDataSource read methods — `readAsText(path): Promise<string>` (text/CSV/JSON), `readAsBytes(path): Promise<Uint8Array>` (binary), `readBinaryDataFrames(path): Promise<DataFrame[]>` (`.d42` archive of one-or-more dataframes; index `[0]` for the first), `readCsv(path, options?): Promise<DataFrame>` (convenience that wraps `DataFrame.fromCsv(await readAsText(path))`). For JSON, callers do `JSON.parse(await _package.files.readAsText('x.json'))` (no built-in `readAsJson` for individual files; folder-bulk variants `readFilesAsJson` / `readFilesAsString` / `readFilesAsBlobs` exist but are not in the article).
