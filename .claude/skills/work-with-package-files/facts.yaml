- id: DG-FACT-171
  kind: namespace
  scope: package-files
  value: |-
    `grok.data.loadTable(csvUrl: string): Promise<DataFrame>` loads a CSV from any URL into a DataFrame — the canonical pairing for `_package.webRoot` + a CSV path inside `tables/`. Article example: `grok.data.loadTable(\`${_package.webRoot}tables/test.csv\`).then((t) => grok.shell.addTableView(t))`. Backed by `api.grok_LoadDataFrame(csvUrl)`. For files inside `files/`, prefer `_package.files.readCsv` (DG-FACT-170) — both work, but `loadTable`'s URL form is right when the file is webRoot-served (e.g., from the source `tables/` dir).
  derives_from:
