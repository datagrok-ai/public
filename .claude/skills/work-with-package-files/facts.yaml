- id: DG-FACT-168
  kind: namespace
  scope: package-files
  value: |-
    `_package.files` is a getter that returns a fresh `FilesDataSource` rooted at `System:AppData/<PackageName>` (the AppData connection — see `Package.files` getter, `js-api/src/entities/misc.ts:193-195`). When a package is published, the contents of its source-tree `files/` directory are uploaded to the storage backend specified by `GROK_PARAMETERS` (e.g., S3) and surfaced under `Files | App Data | <Package>` in the UI. Therefore `_package.files.readAsText('templates/x.json')` resolves to `System:AppData/<PackageName>/templates/x.json` — paths passed to FilesDataSource methods are relative to the package's `files/` subtree, NOT to the package source root.
  derives_from:
