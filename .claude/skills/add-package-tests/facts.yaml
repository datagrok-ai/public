- id: DG-FACT-292
  kind: enum
  scope: add-package-tests
  value: |-
    `//test:` line supports inline sub-options after the expression, comma-separated â€” `skip: <reason>`, `wait: <ms>`, `cat: <category>`, `timeout: <ms>`. Parsed by the regex `/skip:\s*([^,\s]+)|wait:\s*(\d+)|cat:\s*([^,\s]+)|timeout:\s*(\d+)/g` in `initAutoTests`. Tests with no `cat:` register under `'Auto Tests'`; with `cat:` they register under that custom category. `wait: N` inserts `await delay(N)` AFTER the expression evaluates. `skip:` maps to `TestOptions.skipReason`. In demo functions (separate path), the `//test:` line takes the `demo` runner shape `demoFunc() //wait: N, timeout: M` rather than a boolean expression â€” see `packages/BiostructureViewer/src/package.g.ts:274,283`.
