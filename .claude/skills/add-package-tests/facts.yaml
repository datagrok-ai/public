- id: DG-FACT-287
  kind: namespace
  scope: add-package-tests
  value: |-
    `expect(actual, expected = true, error?)` uses STRICT inequality (`!==`) and throws `Error('${error}Expected "${expected}", got "${actual}"')` on mismatch. Article example `expect(1, 1)` passes; `expect(1, 11)` fails. The default `expected = true` means `expect(someBool)` asserts truthy via `someBool !== true`, NOT a JS-style truthiness check (so `expect(1)` fails because `1 !== true`). Use `expectFloat(actual, expected, tolerance = 0.001, error?)` for floats â€” tolerance compare via `Math.abs(actual - expected) < tolerance`. `expectTable(actual, expected)` walks columns row-by-row (`TYPE.FLOAT` â†’ `expectFloat` with tol `0.0001`; `TYPE.DATE_TIME` â†’ `isSame`; otherwise `expect`). `expectObject` / `expectArray` recurse and route float-valued leaves through `expectFloat`.
  derives_from:
    - code: libraries/test/src/test.ts:214-291
    - article: help/develop/how-to/tests/add-package-tests.md:42-50,67-75
