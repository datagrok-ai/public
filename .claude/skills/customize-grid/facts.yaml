    `grid.sort(columns, orders?)` (`js-api/src/grid.ts:1019-1025`) accepts `string[] | Column[]` for columns and an optional same-length `boolean[]` for direction (`true` ASC, `false` DESC). Default — ASC for every column when `orders` is null. The two arrays must align — `grid.sort(['disease', 'weight'], [true, false])` sorts `disease` ASC and `weight` DESC. Calling `grid.sort([], [])` clears the active sort (production reference — `packages/Chem/src/package.ts:2001`). The method returns `Grid` for chaining.
