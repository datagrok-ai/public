- id: DG-FACT-429
  kind: threshold
  scope: customize-grid
  value: |-
    The `format` tag applies ONLY to numeric and datetime columns. String / boolean / other types silently ignore the tag — `gridColumn.format = 'scientific'` on a string column is a no-op (not an error). Underlying cell values are never mutated by `format`; sorting and filtering use the raw value, so two grids with different `format` strings sort identically. Setter exists on both `GridColumn` (`grid.ts:723-724`, per-grid override) and on the dataframe `Column.meta.format` (`column-helpers.ts:221-223`, propagates to every view); pick by scope.
  derives_from:
