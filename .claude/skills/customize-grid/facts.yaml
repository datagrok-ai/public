    `column.meta.colors` returns a `ColumnColorHelper` (`js-api/src/dataframe/column-helpers.ts:48-135`). Methods — `setLinear(range?: number[], options?: {min?, max?, belowMinColor?, aboveMaxColor?})`, `setLinearAbsolute(valueColors, options?)`, `setCategorical(map?, options?: {fallbackColor, matchType?})`, `setConditional(rules?: {[range: string]: number | string})`, `setDisabled()`, `getType()`, `getColor(i)`, `getColors()`. EVERY `set*` call sets the `COLOR_CODING_TYPE` tag implicitly — skill code does NOT need to write the tag manually. Calling a setter with no/null arg writes the type tag only and the platform applies default colors (e.g. `setLinear()` → linear with default palette; `setCategorical()` → auto-categorical). `setConditional` auto-converts numeric color values to HTML strings via `DG.Color.toHtml` (`column-helpers.ts:117-119`).
