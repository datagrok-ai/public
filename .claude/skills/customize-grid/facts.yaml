  value: |-
    `grid.setRowOrder(indexes: number[])` (`js-api/src/grid.ts:1042-1048`) DISPLAYS ONLY the listed indexes — non-listed rows are hidden from the grid. `grid.sortIndexes((a, b) => …)` (`js-api/src/grid.ts:1027-1035`) preserves all rows: it builds a full identity `Int32Array` of size `table.rowCount`, sorts that array via the comparer, then calls `setRowOrder` with the result. Skill authors picking "I want to keep all rows but reorder them" must use `sortIndexes`; "I want to filter to a subset, in this order" is `setRowOrder`. Confused use of `setRowOrder` with a partial index list silently drops rows from view.
  derives_from:
