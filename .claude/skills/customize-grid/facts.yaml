- id: DG-FACT-430
  kind: naming
  scope: customize-grid
  value: |-
    Renaming a dataframe column to a name with a leading tilde — `data.columns.byName('age').name = '~age'` — hides it from every Grid/TableView built from that DataFrame. The platform treats the `~` prefix as a "hidden" marker at the dataframe level (different blast radius from `grid.columns.setVisible([...])`, which only affects one grid). To re-show, you must rename back; `grid.columns.setVisible(['~age'])` does NOT undo the rename because the column's actual name now contains the tilde. The rename affects all derived views, including downstream layouts and saved projects.
  derives_from:
