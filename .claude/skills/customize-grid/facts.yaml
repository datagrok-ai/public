  value: |-
    Column ordering exists at TWO levels with different blast radius. `df.columns.setOrder([names])` (`js-api/src/dataframe/column-list.ts:121-126`) reorders columns inside the DataFrame — affects every TableView/Grid built over that frame and the on-disk projection. `view.grid.columns.setOrder([names])` (`js-api/src/grid.ts:840-845`) reorders only the visual layout of one Grid, leaves the DataFrame's column order untouched. Article uses the Grid-level form. Pick the level that matches the desired scope; do not mix them in the same code path.
