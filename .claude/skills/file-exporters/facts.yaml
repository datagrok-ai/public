- id: DG-FACT-082
  kind: namespace
  scope: file-exporters
  value: |-
    Unlike file viewers, file exporters have NO extension-specific annotation — there is no `meta.fileExporter: <ext>` companion key, and there is no `FileExporterOptions` type. The decorator's options bag is the generic `FunctionOptions` (see `js-api/src/decorators/functions.ts:350`), so any function-level metadata (`description`, `name`, `tags`, `meta.icon`, etc.) is carried through, but extension routing is NOT a registration concern: every exporter appears in the global Export menu and decides at runtime what filename/extension to emit via `DG.Utils.download(...)`.
  derives_from:
