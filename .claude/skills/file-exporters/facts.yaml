- id: DG-FACT-080
  kind: naming
  scope: file-exporters
  value: |-
    A file-exporter function MUST declare a non-empty `description`. The `tools/bin/commands/check.ts:358` linter errors with "File exporters should have a description parameter" when description is missing or empty. The description string becomes the visible label of the export menu entry (e.g., `description: 'As SDF...'` → menu item `As SDF...`). Header form `//description: <text>`; decorator form `@grok.decorators.fileExporter({description: '<text>'})`. Naming convention across the canonical packages — `As <FORMAT>...` (Chem `As SDF...`, Bio `As FASTA...`) when the exporter pops a follow-up dialog; `Save as <FORMAT>` (Arrow `Save as Parquet`, `Save as Feather`) when it downloads directly.
