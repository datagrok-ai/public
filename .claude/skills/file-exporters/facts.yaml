- id: DG-FACT-081
  kind: namespace
  scope: file-exporters
  value: |-
    Inside the exporter, obtain the active table via `grok.shell.t` (returns the current `DG.DataFrame` or `null` when no table is open — guard before use). The function MUST NOT return anything (`void`). To trigger the browser download, call `DG.Utils.download(filename, content, contentType?)` (`js-api/src/utils.ts:230-237`) — the canonical helper that wraps `Blob` + `URL.createObjectURL` + anchor click. `content: BlobPart` accepts string, `Uint8Array`, `ArrayBuffer`, `Blob`. `contentType` defaults to `'application/octet-stream'`. Prefer `DG.Utils.download` over the older `data:` URI + hand-rolled `<a>.click()` form for binary payloads (Parquet, Feather, XLSX); the article notes the `data:` form silently corrupts non-text content beyond ~2 MB in most browsers. After autonomous drift-fix `c36c5d6dfa`, the article example itself uses `DG.Utils.download` (resolves DRIFT-029).
  derives_from:
