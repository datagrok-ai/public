- id: DG-FACT-461
  kind: namespace
  scope: develop-custom-viewer
  value: |-
    Filter-respecting aggregation inside a viewer's `render()` — chain `this.dataFrame.groupBy([splitCol]).whereRowMask(this.dataFrame.filter).add(aggType, valueCol, 'result').aggregate()`. `whereRowMask(bitset)` is on `GroupByBuilder` (`js-api/src/dataframe/stats.ts:350-354`) and takes any `BitSet` — passing `dataFrame.filter` restricts the aggregation to currently-filtered rows; passing `dataFrame.selection` restricts to selected rows. Skipping the call aggregates over the FULL frame regardless of what users have filtered out — a viewer that does this silently shows stale data when filters change. Re-aggregate inside `render(computeData=true)` and cache the resulting frame; gate on the `computeData` flag so resize-only re-renders skip the work.
  derives_from:
