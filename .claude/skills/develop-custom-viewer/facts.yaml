- id: DG-FACT-193
  kind: namespace
  scope: develop-custom-viewer
  value: |-
    Two viewer-registration paths. (a) Annotated factory function in `package.ts` — `//name: <ClassName>` + `//tags: viewer` (or `//meta.role: viewer`) + `//output: viewer result`, returning `new MyViewer()`. Resolution is asynchronous on the client (the package has to load first), so callers using `view.addViewer('Name')` get the viewer back via async dispatch. (b) Runtime registration via `grok.shell.registerViewer(typeName, description, factory)` (`js-api/src/shell.ts:295`) — synchronous, but only useful when called from a `//meta.role: autostart` function so the viewer is available before any user code asks for it. Decorator form `@grok.decorators.viewer({...})` is sugar for path (a): the FuncGeneratorPlugin webpack plugin reads the decorator and emits the matching `//name:`/`//tags: viewer`/`//output: viewer result` block into `package.g.ts` (the generated file is committed — not gitignored).
  derives_from:
    - article: help/develop/how-to/viewers/develop-custom-viewer.md:43-53,484-561
    - code: js-api/src/shell.ts:295, js-api/src/decorators/functions.ts:36-45, packages/Charts/src/viewers/sankey/sankey.ts:53-58
