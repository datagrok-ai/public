    JsViewer lifecycle hooks — `onTableAttached()` (no-op default) is called when a DataFrame is attached; do data-dependent init and event subscriptions here. `detach()` is called on viewer close; default impl is `this.subs.forEach(s => s.unsubscribe())` — DO NOT override unless you super-call it. `onPropertyChanged(property)` is called when any property value changes; the parameter is the changed `Property` (not a name); always `super.onPropertyChanged(property)` first if overridden. `getProperty(name)` / `getProperties()` retrieve registered properties. `onSourceRowsChanged()` fires when filtered/source rows change.
