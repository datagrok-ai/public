- id: DG-FACT-191
  kind: namespace
  scope: develop-custom-viewer
  value: |-
    `subs: Subscription[]` is the stream-subscription bag on JsViewer (initialized to `[]` in the constructor). Push every `dataFrame.selection.onChanged` / `dataFrame.filter.onChanged` / `ui.onSizeChanged(this.root)` subscription into `this.subs`, and the default `detach()` will unsubscribe all of them automatically. Wrap noisy event streams with `DG.debounce(observable, 50)` to coalesce re-renders. NOT pushing a subscription into `subs` causes a memory leak when the viewer is closed.
