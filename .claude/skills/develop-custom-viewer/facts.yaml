    Interactivity primitives a custom viewer uses to bridge mouse events back into platform-wide state. `ui.tooltip.showRowGroup(dataFrame, indexPredicate, x, y): void` (`js-api/ui.ts:1606-1608`) — pop the standard row-group tooltip; `indexPredicate: (i: number) => boolean` selects the rows the tooltip should describe. `ui.tooltip.hide()` clears it. `dataFrame.selection.handleClick(rowIndexPredicate, mouseEvent, modifiedSelectOnly=false): void` (`js-api/src/dataframe/bit-set.ts:220-222`) — extends/replaces the dataframe selection per the click's modifier keys (`ctrl`, `shift`, `meta`); always pass the raw `MouseEvent` so the platform interprets Ctrl/Shift/Meta correctly. Reading direction is `BitSet.getSelectedIndexes(): Int32Array` (`bit-set.ts:188-190`); applied to `dataFrame.filter` it yields the currently-filtered row indexes (article line 393 uses this idiom on `dataFrame.filter`).
