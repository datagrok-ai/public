    - code: js-api/src/const.ts:318
    - code: js-api/src/const.ts:206-246    # SEMTYPE enum (Text, Molecule, Macromolecule, …)
    - code: js-api/src/api/ddt.api.g.ts:77 # static Quality = 'quality'
