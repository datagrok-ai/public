- id: DG-FACT-097
  kind: namespace
  scope: column-tooltip
  value: |-
    There is NO specialized `@grok.decorators.tooltip()` decorator (unlike `fileViewer`, `fileHandler`, `folderViewer`). Production packages use the generic `@grok.decorators.func({meta: {role: 'tooltip'}})` on a static method inside `PackageFunctions`, with the column input typed via `@grok.decorators.param({options: {semType: '<Type>'}}) col: DG.Column`. Bio additionally adds `tags: ['tooltip']` (which auto-emits `//tags: tooltip`); Chem omits the explicit `tags` and relies on `meta.role` alone — both produce a working tooltip registration.
