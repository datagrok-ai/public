- id: DG-FACT-098
  kind: namespace
  scope: column-tooltip
  value: |-
    A column tooltip returns `DG.Widget` (or `Promise<DG.Widget | undefined>`). Returning `undefined` (or omitting the return) signals "no tooltip applies for this column value" — the platform falls back to the default tooltip. Chem uses this — `chemTooltip` returns `undefined` early when any of the first 100 categories is a SMARTS pattern (`packages/Chem/src/package.ts:267-277`).
