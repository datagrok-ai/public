- id: DG-FACT-427
  kind: naming
  scope: column-tooltip
  value: |-
    Inside a column tooltip function, build the widget from the column's OWN parent dataframe — `col.dataFrame` — NOT from `grok.shell.tv.dataFrame`. The tooltipped column may belong to a different table than the currently active view, so referencing `grok.shell.tv.dataFrame` (or `grok.shell.t`) silently resolves to the wrong table, and any `columnName`-typed option (e.g. `sequenceColumnName: col.name`) will then look up the name on a table that does not contain that column. Article makes this rule explicit in prose (`column-tooltip.md:13-16`). Article's worked example uses `await col.dataFrame.plot.fromType('WebLogo', {sequenceColumnName: col.name}) as unknown as DG.Widget` (`column-tooltip.md:24`). Production Bio implementation also operates only off `col` — `new MacromoleculeColumnWidget(col, _package.seqHelper)` (`packages/Bio/src/package.ts:152`). Same trap applies to cell renderers (DG-FACT-CELLR — use `gridCell.grid.dataFrame`).
  derives_from:
    - article: help/develop/how-to/grid/column-tooltip.md:13-16
    - article: help/develop/how-to/grid/column-tooltip.md:24
    - code: packages/Bio/src/package.ts:150-159
    - code: packages/Chem/src/package.ts:267-277  # iterates col.categories — no grok.shell.tv
  contradicts: []
  confidence: high

