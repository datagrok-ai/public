- id: DG-FACT-096
  kind: namespace
  scope: column-tooltip
  value: |-
    A custom column tooltip is a function with header annotations `//meta.role: tooltip` + `//input: column col { semType: <Type> }` + `//output: widget result`. The `semType` constraint on the `column` input is what binds the tooltip to columns of a given semantic type — the platform calls the function only for columns whose `semType` matches. Auto-emitted `package.g.ts` examples: `packages/Bio/src/package.g.ts:16-22` (`semType: Macromolecule`) and `packages/Chem/src/package.g.ts:38-44` (`semType: Molecule`).
  derives_from:
