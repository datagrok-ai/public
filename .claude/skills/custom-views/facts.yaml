- id: DG-FACT-224
  kind: namespace
  scope: js-api
  value: |-
    The JS API has THREE entry points — `grok` (discoverable functionality, IntelliSense-driven), `ui` (UI building helpers + visual classes like `Widget`, `Dialog`, `InputBase`), and `DG` (raw class namespace for instantiating types directly). Imports — `import * as grok from 'datagrok-api/grok'`, `import * as ui from 'datagrok-api/ui'`, `import * as DG from 'datagrok-api/dg'`. `DG` re-exports from `js-api/dg.ts`; `grok` exports from `js-api/grok.ts`; `ui` is the legacy single-file `js-api/ui.ts`.
  derives_from:
