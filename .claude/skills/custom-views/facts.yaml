- id: DG-FACT-214
  kind: namespace
  scope: custom-views
  value: |-
    `DG.ViewBase` extends `Widget` (`js-api/src/views/view.ts:45`). Subclasses receive `(params: object|null = null, path: string = '', createHost: boolean = true)` — the `createHost` third arg (article never mentions it) lets internal subclasses like `View` skip the JS host wrapper by passing `false` and assigning `this.dart` from a Dart-side handle (see `View.constructor` at `view.ts:217-221`). Package code that subclasses `ViewBase` should NEVER pass `false` — the Dart wrapper is what makes routing/serialization work.
  derives_from:
    - article: help/develop/how-to/views/custom-views.md:29-33
    - code: js-api/src/views/view.ts:45-68, 217-221
  contradicts: []
  confidence: high

- id: DG-FACT-215
