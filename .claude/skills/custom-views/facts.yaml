    `ViewBase` overridable surface (defaults in `js-api/src/views/view.ts:70-204`). Getters intended for override — `type` (default `'js-view-base'`), `helpUrl` (default `null`, also has setter), `name` (default `'New View'`, also has setter), `path` (Dart-backed getter — override is what enables URL routing), `description` (default `''`), `entity` (default `null`), `box`, `parentCall`, `parentView`, `toolbox`, `ribbonMenu`, `statusBarPanels`, `closing`, `root`. Methods intended for override — `getIcon(): HTMLElement|null` (default `null`), `setIcon(icon)`, `saveStateMap(): object|null` (default `null`), `loadStateMap(stateMap)` (default no-op), `handlePath(urlPath)` (default no-op), `acceptsPath(urlPath): boolean` (default `false`), `setRibbonPanels(panels, clear=true)`, `getRibbonPanels()`, `append(item)`, `appendAll(items)`, `detach()`, `close()`. The article (lines 36-63) shows only seven of these — `type`, `helpUrl`, `name`, `path`, `getIcon`, `saveStateMap`, `loadStateMap`, `handlePath`, `acceptsPath` — but the contract surface is wider.
