    To register a `ViewBase` subclass-producing function with the platform, the canonical function annotation is `//tags: view`, `//input: map params`, `//input: string path`, `//output: view result` (article lines 80-85). Backing typesToAnnotation map at `tools/bin/utils/func-generation.ts:128-131` maps both `DG.ViewBase` and `ViewBase` (and `DG.View`/`View`) to the annotation type `'view'`; `FUNC_PARAMS.VIEW = 'view'` constant at `func-generation.ts:76`. Notebooks is the ONLY production package that ships a function with the `view` tag (`packages/Notebooks/src/package.js:528-535`); most apps construct views inline inside `meta.role: app` functions instead.
