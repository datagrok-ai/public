  value: |-
    `grok.shell.newView(name='view', children?: object[], options?: string|{}|null): View` is the one-liner ad-hoc view constructor. Implementation: `let view = View.create(options); view.name = name; ui.appendAll(view.root, children ?? []); this.addView(view); return view;` (`js-api/src/shell.ts:234-242`). Returns a fully docked, registered `View` instance — NOT a `ViewBase`. Article (lines 16-17) presents this as the "simplest example" but stops short of saying it is "ad-hoc only" — it is fine for production code; the "from a package, extend ViewBase" guidance (lines 24-26) applies only when you need URL-dispatch / state-serialization / icon overrides.
  derives_from:
