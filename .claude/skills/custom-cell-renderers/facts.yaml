- id: DG-FACT-105
  kind: naming
  scope: custom-cell-renderers
  value: |-
    `meta.virtual: true` marks a renderer that produces values for a SUMMARY/VIRTUAL column (a column that has no underlying data and is computed from other columns at render time, e.g. sparkline / piechart that aggregates several numeric inputs). Required for chart-style renderers; OMIT for pure semantic-type renderers that just visualise an existing cell value. Reference distinction — `packages/PowerGrid/src/package.g.ts:121` (`piechart` virtual) vs `packages/PowerGrid/src/cell-types/svg-cell-renderer.ts:6-12` (`SVG`, NOT virtual).
