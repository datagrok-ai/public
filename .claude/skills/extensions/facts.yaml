- id: DG-FACT-074
  kind: naming
  scope: file-viewers
  value: |-
    Supported file extensions are declared via `//meta.fileViewer: <ext>[,<ext>…]` — comma-separated list, optional whitespace tolerated. Single-extension form (`mol`, `eps`, `pdf`) and multi-extension form (`mol,sdf,cif`, `kmz,kml`, `mp3, wav, flac, ogg, oga, opus, m4a, aac, weba`) both work. Multiple `fileViewer` functions in the same package may register the same extension when each one declares a `meta.fileViewerCheck` to disambiguate.
  derives_from:
    - article: help/develop/how-to/files/create-custom-file-viewers.md:7,16
    - code: packages/BiostructureViewer/src/package.g.ts:89,97,105,113   # multi-ext, no spaces
    - code: packages/Media/src/package.ts:73,83                          # multi-ext, with spaces
    - code: packages/EpsViewer/src/package.g.ts:7                        # single-ext
    - code: packages/Plates/src/package.g.ts:28,38,53,62                 # same ext (txt, xlsx) reused with different fileViewerCheck
  contradicts: []
  confidence: high

