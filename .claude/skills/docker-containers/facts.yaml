  value: |-
    `grok.dapi.docker.dockerContainers.fetchProxy(containerId, path, params?: RequestInit): Promise<Response>` ŌĆö same shape as the standard `fetch` API (`params` is `RequestInit`). The implementation prefixes a leading `/` if `path` lacks one, defaults `params.method` to `'GET'`, and forces `params.credentials = 'include'`. Calls route through `${api.grok_Dapi_Root()}/docker/containers/proxy/<containerId><path>`. Server-side errors come back as a JSON body with a `datagrok-error` field; bad container status returns HTTP 400; server-workflow errors return HTTP 500.
