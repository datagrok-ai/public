    `DG.DockerContainer.status` carries one of a small set of strings; the runtime production check is `container.status !== 'started' && container.status !== 'checking'` before issuing requests, and `dockerContainers.run(id, awaitStart=true)` is called when status is anything else. Other observed states: `stopped` (no status dot in UI), `error` (red dot), and a pending state (blinking grey dot ŌĆö starting / stopping / rebuilding).
