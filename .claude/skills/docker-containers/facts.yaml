- id: DG-FACT-133
  kind: naming
  scope: docker-containers
  value: |-
    Pass package entities into a container's environment via the `#{x.<Package>:<Entity>}` template syntax inside the env-vars map, e.g. `"DATA_CONNECTION": "#{x.todo}"` (`packages/NodeJSDemo/dockerfiles/todo-app/container.json`) or `"db": "#{x.moltrack}"` (`packages/MolTrack/dockerfiles/container.json`). The platform JSON-serializes the resolved entity at container-start time and injects it as the env-var value. Only entities from the SAME package are reachable ŌĆö credentials in cross-package connections are NOT injected.
  derives_from:
