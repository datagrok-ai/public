- id: DG-FACT-131
  kind: namespace
  scope: docker-containers
  value: |-
    `grok.dapi.docker.dockerContainers.webSocketProxy(containerId, path, timeout=60000): Promise<WebSocket>` ŌĆö opens a WebSocket through the platform proxy and resolves only after the server emits a literal `"CONNECTED"` text message (the readiness handshake). On timeout the socket is closed with code 4001 and the promise rejects. `timeout` is milliseconds; default 60000ms (60s); raise it for `on_demand: true` containers because cold-start adds latency. A synchronous variant `webSocketProxySync(...)` returns the socket immediately (not yet ready to send) ŌĆö use only when you can't await.
  derives_from:
