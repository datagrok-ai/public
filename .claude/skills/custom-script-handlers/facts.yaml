- id: DG-FACT-175
  kind: enum
  scope: custom-script-handlers
  value: |-
    Mandatory script-handler annotations (all four required for registration to succeed) — `meta.role: scriptHandler`, `meta.scriptHandler.language: <name>`, `meta.scriptHandler.extensions: <ext1,ext2,...>` (comma-separated, no leading dot — e.g. `py`, `clj,cljs,cljr`), and the single `funccall scriptCall` input. The platform extracts `language` and splits `extensions` on `,` at startup (`grok_shared.dart.js:121486-121487`). The startup loop only registers a function as a handler if the `scriptHandler` tag is present AND `scriptHandler.language` is non-empty (`grok_shared.dart.js:137559-137563`).
