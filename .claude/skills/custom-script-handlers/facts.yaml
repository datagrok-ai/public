- id: DG-FACT-174
  kind: enum
  scope: custom-script-handlers
  value: |-
    A script-handler function MUST take exactly one input of type `funccall` named `scriptCall` (header form `//input: funccall scriptCall`; decorator form `@grok.decorators.param({type: 'funccall'}) scriptCall: DG.FuncCall`) and return `Promise<void>`. The platform passes a populated `DG.FuncCall` whose declared inputs/outputs come from the script's own `#name/#input/#output` header — the handler runs the script's code and writes results back via `scriptCall.outputs[<name>] = <value>` (or `scriptCall.setParamValue(name, value)`). The article's example uses the parameter name `call`, but every shipping handler in the public repo uses `scriptCall`; codegen (`package.g.ts`) emits `scriptCall`.
