- id: DG-FACT-179
  kind: naming
  scope: custom-script-handlers
  value: |-
    Codegen (`package.g.ts`) is the canonical surface for handler declaration. The Pyodide reference shows the generated form — header comment block (`//input: funccall scriptCall`, `//meta.scriptHandler.*`, `//meta.role: scriptHandler`) directly above an `async function <name>(scriptCall: DG.FuncCall): Promise<void>` that delegates into a static `PackageFunctions.<name>(scriptCall)`. Author the decorator form (`@grok.decorators.func({meta: {role: 'scriptHandler', 'scriptHandler.language': 'x', ...}})`) on a static method inside `PackageFunctions` in `package.ts`; let codegen emit `package.g.ts`. Do NOT hand-write the comment-header form in `package.ts` — production packages don't, and the codegen will overwrite it.
