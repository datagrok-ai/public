- id: DG-FACT-178
  kind: namespace
  scope: custom-script-handlers
  value: |-
    At runtime the platform recognises a script as belonging to a custom handler by matching the script's `#language:` header annotation against each registered handler's `meta.scriptHandler.language`. Once matched, the platform invokes the handler with a `DG.FuncCall` whose declared inputs/outputs derive from the script's own header — meaning the script header (not the handler header) is the source of truth for parameters. Handlers therefore implement: parse `scriptCall.func.script` (the user-authored body), execute it (in-process / WebAssembly / Docker container), then write each output via `scriptCall.outputs`.
  derives_from:
