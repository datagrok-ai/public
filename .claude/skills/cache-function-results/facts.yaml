    Connection-level caching is set in the `parameters` block of a `connections/<name>.json` file via three keys defined on `DataConnectionCacheProperties` (`js-api/src/entities/types.ts:33-40`) — `cacheResults?: boolean`, `cacheSchema?: boolean`, `cacheInvalidateSchedule?: string` (cron). The article example (`cache-function-results.md:69-82`) shows only `cacheResults` + `cacheSchema` and never demonstrates `cacheInvalidateSchedule` even though the UI's "Invalidate On" field maps to it (`packages/DBTests/connections/cached-postgresql-test.json:9-10` is the canonical production reference). Setting `cacheResults: true` activates BOTH client and server side caches for every query under that connection (article asserts; not toggleable per-side at the connection level).
