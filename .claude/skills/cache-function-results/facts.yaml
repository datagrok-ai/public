    Client-side cache exposes a runtime control surface via `grok.functions.clientCache` (`js-api/src/functions.ts:134`) — an instance of `ClientCache` (`functions.ts:193-212`). Methods: `clear(metaId?: string): Promise<void>` (drop all entries, or just entries for one function id), `start(): Promise<void>` / `stop(): void` (toggle the IndexedDB-backed service — same as the Settings UI "Client-side cache" switch), `cleanup(): Promise<void>` (remove expired records — runtime does this automatically as needed), `getRecordCount(): Promise<number>`, `isRunning: boolean` (getter). The article documents only the UI path (Settings > Cache > "Clear client cache" button) and never names this API surface — useful escape hatch for skills that want to invalidate after a known event.
