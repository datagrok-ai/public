- id: DG-FACT-341
  kind: threshold
  scope: cache
  value: |-
    Client-side cache is backed by IndexedDB and has THREE hard limits (article-asserted; not surfaced as JS-API constants): (a) per-function total size ≤ 100 MB across all input-parameter variants of one function, (b) total records across all cached functions ≤ 100,000, (c) cacheable output parameter types restricted to scalar (int / float / string), `dataframe`, `graphics`, and `datetime` (any other output type must use server-side cache). Server-side cache has NO documented limits on size or parameter type. Both caches can be active simultaneously and stack (a client-cache miss falls through to server cache).
  derives_from:
    - article: help/develop/how-to/functions/cache-function-results.md:7-13,23-26
  contradicts: []
  confidence: medium  # numeric thresholds enforced by Dart runtime; no JS-API constants to grep

- id: DG-FACT-342
  kind: naming
  scope: cache
  value: |-
    The `meta.cache.invalidateOn` header (and its decorator-meta camelCase alias `cacheInvalidateOn`) accepts a standard 5-field unix cron expression (minute / hour / day-of-month / month / day-of-week) — same syntax as `crontab`. Validated by `utils.isValidCron(...)` in the CLI checker (`tools/bin/commands/check.ts:450-451`). If omitted, the cache never auto-invalidates and the entry only ages out under the size/record-count limits. Production examples: `0 * * * *` (hourly — Chem `synthonSearchFunc`, BioNeMo, CddVaultLink legacy), `0 0 * * *` (daily — CddVaultLink production), `0 0 1 * *` (monthly — Reinvent4, MolTrack). USING `meta.invalidateOn` WITHOUT the `cache.` segment IS A VALIDATOR ERROR (`check.ts:446-447`: "Can't use invalidateOn without cache") — the only correct form is `meta.cache.invalidateOn`.
