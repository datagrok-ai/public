- id: DG-FACT-343
  kind: namespace
  scope: cache
  value: |-
    The `meta.cache` / `meta.cache.invalidateOn` header annotations have THREE equivalent emission paths into a function's metadata. (1) Script-header form — comment line `//meta.cache: client` / `//meta.cache.invalidateOn: 0 * * * *` directly in the script body (only documented form in the article; works for `.py`, `.js`, `.sql`, etc.). (2) Decorator-`meta` form — `@grok.decorators.func({meta: {cache: 'client', cacheInvalidateOn: '0 * * * *'}})` (e.g. Chem `synthonSearchFunc`, `packages/Chem/src/package.ts:1669-1675`). (3) Decorator-top-level form — `@grok.decorators.func({cache: 'all', cacheInvalidateOn: '0 0 1 * *'})` WITHOUT the `meta:` wrapper (e.g. MolTrack `fetchCompoundProperties`, `packages/MolTrack/src/package.ts:155-161`). Codegen routes (2) to `//meta.cache: ...` and (3) to `//cache: ...` in `package.g.ts` — both forms are accepted by the runtime. Both `cacheInvalidateOn` (camelCase, canonical) and `['cache.invalidateOn']` (string-keyed dotted) are declared on `Meta` AND `FunctionOptions` (`js-api/src/decorators/functions.ts:118-120,178-180`).
