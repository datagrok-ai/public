    `awaitCheck(checkHandler: () => boolean, error?: string, wait?: number, interval?: number): Promise<any>` â€” polls `checkHandler()` every `interval` ms (default `50`) until it returns true OR `wait` ms (default `500`) elapses; on timeout rejects with `Error(error)` (default `'Timeout exceeded'`). Cleared via `clearInterval`/`clearTimeout` on either branch. Standard async-test idiom is to wait for a DOM node â€” e.g., `await awaitCheck(() => document.querySelector('canvas') !== null, 'cannot load table', 3000)` (article line 59). The defaults are deceptive â€” 500ms is rarely enough; production callers pass an explicit `wait` (1000-30000 ms typical).
