    `delay(ms: number): Promise<void>` â€” thin wrapper over `new Promise(r => setTimeout(r, ms))`. Use for fixed pauses that DON'T depend on a checkable condition (animations, debounce settle, transition completion). Prefer `awaitCheck` whenever the wait has an observable end state â€” `delay` is opaque to the runner and burns wall-clock unconditionally.
