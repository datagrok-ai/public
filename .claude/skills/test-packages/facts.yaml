    `expectExceptionAsync(action: () => Promise<void>, check?: (exception: any) => boolean): Promise<void>` â€” asserts that `action()` rejects. Without `check` any throw passes; with `check`, the thrown value is passed in and the function must return truthy. On no-throw: `Error('An exception is expected but not thrown')`. On wrong throw: `Error('An expected exception is thrown, but it does not satisfy the condition')`. There is NO synchronous counterpart â€” for sync code wrap in `async () => { syncCall() }`.
