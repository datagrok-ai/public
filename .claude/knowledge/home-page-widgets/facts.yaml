- id: DG-FACT-140
  kind: naming
  scope: home-page-widgets
  value: |-
    Widget placement on the home page is controlled by a function-level `order` option on the decorator (`@grok.decorators.dashboard({order: '6'})`) — emitted as `//meta.order: 6` in `package.g.ts`. Lower numbers (including negatives) sort first; `order: '-1'` puts Spotlight at the top, `order: '6'` puts Community further down. The current article (rewritten — `home-page-widgets.md:18-25`) demonstrates exactly this decorator-level usage with `order: '6'` on `communityWidget`. Per-widget settings declared via `super.addProperty('order', ...)` would be a runtime-tunable field on the widget instance (gear-icon panel), NOT the placement control — the previous draft of the article confused these two surfaces; the upstream rewrite removed that misleading example.
  derives_from:
