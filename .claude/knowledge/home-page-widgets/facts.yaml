- id: DG-FACT-141
  kind: naming
  scope: home-page-widgets
  value: |-
    A custom widget is a class extending `DG.Widget` with a constructor that calls `super(rootElement: HTMLElement)` — the argument becomes `this.root` (`js-api/src/widgets/base.ts:231,250-257,322-325`). Article uses `super(ui.panel())`. Production `RecentProjectsWidget` uses `super(ui.panel([], {style: {display: 'flex'}}))` (`packages/PowerPack/src/widgets/recent-projects-widget.ts:16`); `CommunityWidget` uses `super(ui.panel([], 'welcome-community-widget'))` (`packages/PowerPack/src/widgets/community-widget.ts:14`); `SpotlightWidget` uses an empty `super(ui.div())` and appends children later. `ui.panel(items, options)` (`js-api/ui.ts:2149-2153`) is just a `div` with class `ui-panel`.
