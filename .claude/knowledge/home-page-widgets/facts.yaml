- id: DG-FACT-143
  kind: naming
  scope: home-page-widgets
  value: |-
    Widget subclasses should override `get type(): string` to return a stable identifier — used for serialization and for the platform's widget registry (`js-api/src/widgets/base.ts:233`, default `'Unknown'`). Production canonical — `RecentProjectsWidget` returns `'RecentProjectsWidget'` (`recent-projects-widget.ts:9-11`), `CommunityWidget` returns `'CommunityWidget'` (`community-widget.ts:7-9`), `SpotlightWidget` returns `'SpotlightWidget'`. The current article example (`home-page-widgets.md:35-43`) STILL omits this override; a widget built strictly from the article would default to `type: 'Unknown'`. Article rewrite resolved the misleading `order`-via-addProperty pattern (see DG-FACT-140) but did not add the `get type()` override to the example. See DG-FACT-DRIFT-HPW-001.
