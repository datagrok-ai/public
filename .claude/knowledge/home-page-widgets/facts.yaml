    Tunable widget settings (rendered in the widget's gear-icon settings panel) are declared via `super.addProperty(name: string, type: Type, defaultValue: any, options?: IProperty): any` inside the widget's constructor — the call returns the default value, allowing the field to be initialized in one line: `this.caption = super.addProperty('caption', DG.TYPE.STRING, 'Recent projects')`. Defined at `js-api/src/widgets/base.ts:345-365`. Production canonical — `RecentProjectsWidget` declares `caption` (`recent-projects-widget.ts:17`), `CommunityWidget` declares `caption` (`community-widget.ts:26`).
