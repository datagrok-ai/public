- id: DG-FACT-156
  kind: enum
  scope: publish-packages
  value: |-
    `grok publish` accepts the flags `--release` (release-mode build; default is debug-mode), `--rebuild`, `--build`, `--key <KEY>` (developer key; falls back to `~/.grok/config.yaml`), `--suffix <s>` (auto-derived from short git SHA when omitted), `--debug`, `--dropDb`, `--link`, `--refresh`, `--rebuild-docker`, `--skip-docker-rebuild`. `--debug` and `--release` are mutually exclusive — combining them errors out with "Incompatible options: --debug and --release".
  derives_from:
