- id: DG-FACT-280
  kind: enum
  scope: add-info-panel
  value: |-
    An info panel accepts EXACTLY ONE primary input parameter, whose type narrows the context the panel binds to — `column <name>` (binds to the active column; condition can use `<name>.isnumerical`, `<name>.semType`, `<name>.stats.*`), `dataframe <name>` (binds to the active table; condition uses `<name>.name`, `<name>.columns.containsAll([...])`), `row <name>` (binds to the active row; condition uses `<name>.table.name`), `cell` (active cell), `string` / `int` / `file` / `object` (any context object), or `semantic_value <name> {semType: <SemType>}` (JS-only — receives a `DG.SemanticValue` wrapper carrying `.value`, `.cell`, `.gridCell`, `.column`, `.semType`, `.units` properties). The `semantic_value` type literal is enum `INPUT.SEM_VALUE = 'semantic_value'` at `js-api/src/const.ts:109` and class `SemanticValue` at `js-api/src/grid.ts:1349`. Extra user-context / dataset-context filters MUST be expressed in `condition`, not as additional inputs.
