- id: DG-FACT-283
  kind: enum
  scope: add-info-panel
  value: |-
    A panel script's `condition` evaluates BEFORE the script runs; an expensive condition (e.g., a cross-package function call) gates execution. Two canonical condition patterns from production — (a) static semantic-type gate: `condition: <inputName>.semType == "Molecule"` (re-evaluated cheaply at the platform level); (b) cross-package function call: `condition: <Pkg>:<predicateFunc>(<input>)` — `Boltz1:isApplicableBoltz(molecule)` and `Docking:isApplicableAutodock(molecule)` are real examples. The predicate function must be registered (typically as a `//input: string molecule //output: bool result` helper in the same package) so the platform can resolve and call it during condition evaluation.
  derives_from:
    - article: help/develop/how-to/ui/add-info-panel.md:50-54
    - code: packages/Boltz1/src/package.g.ts:49,54-58    # condition + isApplicableBoltz
    - code: packages/Docking/src/package.g.ts:66         # condition: Docking:isApplicableAutodock(molecule)
  contradicts: []
