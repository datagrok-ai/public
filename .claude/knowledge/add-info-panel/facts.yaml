- id: DG-FACT-278
  kind: enum
  scope: add-info-panel
  value: |-
    A panel script (server-side) may declare any of these output types — `widget` (returns a `DG.Widget`-equivalent), `viewer` (returns a Datagrok viewer instance, e.g. `table.ScatterPlot(...)`), `graphics` (returns a server-rendered image, e.g. R/Python plot), `dataframe` (returns a `DG.DataFrame`, typically paired with `{action: join(<input-table>)}` to merge columns into the source frame as virtual columns), or `string` with `{action: markup}` (returns Grok-script markup such as `#{button("Label", "expression")}` rendered as inline action buttons in the panel). `widget` and `viewer` are platform enum members at `js-api/src/const.ts:107` (`VIEWER = 'viewer'`) and the Dart-side type list at `grok_shared.dart.js:139623`.
