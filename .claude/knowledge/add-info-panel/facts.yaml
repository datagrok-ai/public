  value: |-
    A client-side JS info panel function MUST declare a `widget` output (`//output: widget result`) and return a `DG.Widget` instance (constructed via `new DG.Widget(htmlElement)` or `DG.Widget.fromRoot(el)`, or a subclass). `DG.Widget` is defined at `js-api/src/widgets/base.ts:231` and stores its visual root in `_root` (settable via constructor argument). 16 panel functions across the public packages (`grep -c '//meta.role: panel' packages/*/src/package.g.ts` → 16) all use `//output: widget result`.
  derives_from:
