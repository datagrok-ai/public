  value: |-
    An info panel is a Datagrok package function distinguished by the role `panel` on its `meta.role` annotation. Two implementation paths exist — server-side scripts (any supported language; written with header annotations like `# meta.role: panel`) and client-side JavaScript/TypeScript package functions (`//meta.role: panel` header or `@grok.decorators.panel({...})` class decorator). Scripts run on the server; JS panel functions run on the client. Both paths are equivalent in registration and visibility-condition handling.
