- id: DG-FACT-281
  kind: naming
  scope: add-info-panel
  value: |-
    When `@grok.decorators.panel({meta: {role: '<x>', ...}})` is applied with a non-`panel` role string (e.g., `'widgets'`), `datagrok-tools` codegen automatically APPENDS `,panel` to the emitted `//meta.role:` line so the function is still indexed as a panel. Verified — `packages/Admetica/src/package.ts:33` declares `meta: {role: 'widgets', domain: 'chem'}`; the generated `packages/Admetica/src/package.g.ts:13` emits `//meta.role: widgets,panel`. Skill authors using the decorator form should NOT manually include `panel` in `meta.role` — let the generator add it. (For multi-role declared in source — e.g., `meta.role: panel, widgets` in the article line 98 — the generator emits comma-joined with no space; do not depend on the exact string ordering, only on the presence of `panel`.)
  derives_from:
