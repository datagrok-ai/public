    To get the source column from a `semantic_value` input inside a JS info-panel function, use `value.cell.column` (the cell-side getter on `SemanticValue` — `js-api/src/grid.ts:1393`). The column gives you `.name`, `.semType`, the parent `.dataFrame`, etc. Pattern from the article (`add-info-panel.md:117-120`): `function valueWidget(value) { return value ? new DG.Widget(ui.divText('column - ' + value.cell.column.name)) : new DG.Widget(ui.divText('value is empty')); }`. Always null-check the input — `semantic_value` can be empty when no cell is selected.
