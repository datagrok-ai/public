- id: DG-FACT-279
  kind: namespace
  scope: add-info-panel
  value: |-
    The `condition` header annotation is a Grok-script boolean expression that the platform re-evaluates on every context change to decide whether the panel is visible. The expression references variables by name — input parameters by their declared name (e.g., `signal`, `smiles`, `x`), plus three platform-supplied identifiers — `user` (current user; methods `user.name`, `user.hasrole(<roleName>)`, `user.inteam(<teamName>)`), `table` (active dataframe; method `table.gettag(<key>)`), and any input's `.semType` / `.name` / `.stats.*` member access. Operators include `&&`, `||`, `==`, `<`, `>`, and method-style invocations (`column.isnumerical`, `file.path.contains(<substr>)`, `file.name.endsWith(<suffix>)`, `column.stats.missingvaluecount`). Conditions are written in Grok-script syntax REGARDLESS of the panel implementation language (`add-info-panel.md:88`). `condition?: string` is declared on `FunctionOptions` at `js-api/src/decorators/functions.ts:183`.
  derives_from:
    - article: help/develop/how-to/ui/add-info-panel.md:53-54,78,88,137-141,156-158,172-176
