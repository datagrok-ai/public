- id: DG-FACT-181
  kind: naming
  scope: context-actions
  value: |-
    A context-action function MUST declare exactly one input, and that input MUST carry a `{semType: <SemanticType>}` annotation. The semantic type is the dispatch key — the action is offered only when the right-clicked item is detected as that semantic type (e.g., `semType: Molecule` → action shows on cells / columns whose semantic type is `Molecule`). No `semType` → no dispatch surface → the function is registered but never offered as a context action.
  derives_from:
    - article: help/develop/how-to/ui/context-actions.md:9
    - code: packages/Chem/src/package.g.ts:843-849, packages/Bio/src/package.g.ts:391-396, packages/Helm/src/package.g.ts (openEditor)
  contradicts: []
  confidence: high

- id: DG-FACT-182
  kind: enum
  scope: context-actions
  value: |-
    Recognised input parameter types for context actions, by invocation surface — (a) `semantic_value <name> { semType: <T> }` → bound as `DG.SemanticValue`; action surfaces on the CELL right-click menu and the per-row Actions pane; gives the handler full cell context (`value.value`, `value.cell.column`, `value.cell.column.meta.units`, `value.cell.rowIndex`). Production canonical for cell-level actions (Chem `Use as filter`, `Sort by similarity`, `Copy as ...`; Bio `Edit Helm...`). (b) `column <name> { semType: <T> }` → bound as `DG.Column`; action surfaces on the column-HEADER right-click menu and the Actions pane when a column is selected (Chem `Convert Notation...`, Bio `To Atomic Level...`). (c) `list <name> { type: numerical }` (or unannotated) → bound as `DG.Column[]`; action surfaces on multi-column selection (PowerGrid `Sparklines...`, `Smart form...`). (d) `string <name> { semType: <T> }` → article example; works but loses cell/column context — production never uses this form for context actions.
  derives_from:
