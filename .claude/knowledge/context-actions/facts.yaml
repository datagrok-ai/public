- id: DG-FACT-183
  kind: namespace
  scope: context-actions
  value: |-
    Optional sibling toggles that scope WHERE a context action surfaces — `meta.exclude-actions-panel: true` (`DG.FuncOptions.ExcludeActionsPanel = 'exclude-actions-panel'`, `js-api/src/api/ddt.api.g.ts:434`) hides the action from the Actions accordion pane while keeping it in the cell right-click menu; `meta.exclude-current-value-menu: true` (`DG.FuncOptions.ExcludeCurrentValueMenu = 'exclude-current-value-menu'`, `js-api/src/api/ddt.api.g.ts:436`) does the inverse — hides from cell right-click but keeps the Actions pane. Default (neither set) shows in both. Chem uses `exclude-actions-panel: true` on every `Copy as <format>` sub-action so the panel only shows the parent `Copy as...` chooser, not the nine format variants.
