- id: DG-FACT-180
  kind: naming
  scope: context-actions
  value: |-
    A context-action is registered by adding `meta.action: <Display Text>` to a function's header annotations (or `meta: {action: '<Display Text>'}` in the `@grok.decorators.func({...})` form). The text becomes the menu item label shown in (a) right-click context menus on cells / column headers and (b) the Actions accordion pane of the property panel. The platform indexes registered functions by `meta.action` and offers them whenever the right-clicked item's semantic type matches the function's `input` `semType`.
  derives_from:
