- id: DG-FACT-184
  kind: namespace
  scope: context-actions
  value: |-
    Decorator-form for context actions — `@grok.decorators.func({name: '<Action Name>', description: '<...>', meta: {action: '<Display Text>'}}) static <handler>(@grok.decorators.param({options: {semType: '<T>'}}) value: DG.SemanticValue): void` over a method inside `PackageFunctions`. Codegen emits the matching `//name:`, `//description:`, `//input: semantic_value value { semType: <T> }`, `//meta.action: <Display Text>` block in `package.g.ts`. Both header and decorator forms are valid; production Chem (post-decorator migration) uses the decorator form in `package.ts` and codegen-emits the header form in `package.g.ts`.
  derives_from:
