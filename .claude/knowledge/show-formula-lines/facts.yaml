- id: DG-FACT-210
  kind: namespace
  scope: show-formula-lines
  value: |-
    Two viewer-level toggles control formula-line VISIBILITY without touching the storage: `showDataframeFormulaLines: boolean` and `showViewerFormulaLines: boolean`. Both default to `true`. Declared on every viewer-options interface that supports formula lines ‚Äî concretely on `IScatterPlotSettings` (`d4.ts:597,602`), `ILineChartSettings` (`d4.ts:909,914`), `IDensityPlotSettings` (`d4.ts:1199,1204`), `IBoxPlotSettings` (`d4.ts:1605,1610`), `IHistogramSettings` (`d4.ts:1932,1937`), `IBarChartSettings` (`d4.ts:2331,2336`). These two booleans are the canonical "hide ALL lines" switch ‚Äî set them at viewer construction (`view.scatterPlot({showDataframeFormulaLines:false, ...})`) or via `viewer.setOptions({...})`; clearing the storage is destructive, this is reversible. Per-line `visible: boolean` (default `true`) controls a single line.
  derives_from:
    - article: help/develop/how-to/viewers/show-formula-lines.md:91-96, 130, 152
    - code: js-api/src/interfaces/d4.ts:597,602,909,914,1199,1204,1605,1610,1932,1937,2331,2336
