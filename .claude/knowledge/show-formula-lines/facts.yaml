- id: DG-FACT-207
  kind: namespace
  scope: show-formula-lines
  value: |-
    Formula-line storage is a JSON string parked in two places, and the `meta.formulaLines` accessor is a typed view over that JSON. (a) DataFrame side ‚Äî JSON sits in the `.formula-lines` tag (`DG.TAGS.FORMULA_LINES = '.formula-lines'`, `js-api/src/const.ts:309`); `df.meta.formulaLines` returns a `DataFrameFormulaLinesHelper` whose `storage` getter/setter wrap `df.getTag('.formula-lines')` / `df.setTag(...)` (`js-api/src/dataframe/formula-helpers.ts:11-21`). (b) Viewer side ‚Äî JSON sits in the viewer's `formulaLines` property (`viewer.props['formulaLines']`); `viewer.meta.formulaLines` returns a `ViewerFormulaLinesHelper` (`js-api/src/viewer.ts:835-857`). Trellis Plot is special-cased ‚Äî its `storage` reads/writes `viewer.props['innerViewerLook']`'s `formulaLines` via `grok_PropMixin_GetPropertyValue/SetPropertyValue` rather than the outer viewer's own property (`viewer.ts:838-851`). Lines saved to the dataframe render on every viewer of that frame; lines saved to the viewer render only on that viewer.
  derives_from:
