  value: |-
    Per-line / per-band defaults stamped by `FormulaLinesHelper.setDefaults` (Dart-side; observable from article columns `Default`): line color `'#838383'` (dark gray), band color `'#F0F0F0'` (light gray), `zIndex: 100`, `opacity: 100`, `visible: true`, `width: 1` (line), `spline: 0.9` (line), `style: 'solid'` (line), `min`/`max` unbounded. Color is HEX string (no rgba). `opacity` is a number on `[0..100]` (not the CSS `[0..1]` convention ‚Äî easy bug source). `zIndex` 0 is the chart itself; negatives render UNDER the chart, positives OVER; ties broken by insertion order.
