- id: DG-FACT-231
  kind: naming
  scope: rest-api
  value: |-
    All public REST endpoints live under the `/public/v1/` prefix (e.g. `/public/v1/files/...`, `/public/v1/tables/...`, `/public/v1/dashboards/...`, `/public/v1/functions/...`). The Python client confirms additional prefixes that the article does not document — `/public/v1/connections`, `/public/v1/users`, `/public/v1/entities/{id}/shares`, `/public/v1/groups`.
