- id: DG-FACT-229
  kind: naming
  scope: rest-api
  value: |-
    REST API authentication uses an `Authorization` header whose value is the API key prefixed with `Bearer ` (note the trailing space). The API key is copied from the user profile → "API Key" link. The Python client passes whatever string the caller supplies into `Authorization` verbatim — i.e. the caller (not the client) must include the `Bearer ` prefix.
