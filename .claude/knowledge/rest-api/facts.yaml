  value: |-
    REST API base URL is the Datagrok deployment URL with `/api` appended. Canonical example for the public instance is `https://public.datagrok.ai/api`. The base URL is what the Python client takes as its `base_url` argument — endpoint paths like `/public/v1/...` are appended to it.
