- id: DG-FACT-232
  kind: naming
  scope: rest-api
  value: |-
    Datagrok Grok names use `:` as the separator (e.g. `Demo:Files:cars.csv`), but the REST API requires `.` instead (e.g. `Demo.Files.cars.csv`). Callers must replace colons with periods before sending the request — the Python client does this automatically with `id.replace(':', '.')` on every resource that takes a name (files, tables, dashboards, functions, connections, groups, shares). Sending raw colons is the #1 REST API gotcha.
  derives_from:
    - article: help/develop/packages/rest-api.md:58-62
    - code: python-api/datagrok_api/resources/files.py:39,62,118
    - code: python-api/datagrok_api/resources/tables.py:30,51,74-75
