- id: DG-FACT-233
  kind: enum
  scope: rest-api
  value: |-
    REST API supported entity surfaces (per the article) are files, tables, dashboards, and functions. Files are identified by `{connector}/{path}` and uploaded/downloaded as binary; tables are identified by name (or `project.table`) and exchanged as CSV; dashboards take `{name}/{table_ids}` on create and a `{id}/shares?groups=...&access=...` query for sharing; functions are invoked via POST with parameters in the JSON body.
