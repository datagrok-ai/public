- id: DG-FACT-349
  kind: naming
  scope: manage-credentials
  value: |-
    The REST endpoint for writing credentials is `POST ${GROK_HOST}/api/credentials/for/${ENTITY_NAME}` where `ENTITY_NAME` is either (a) the package name alone (sets package credentials, e.g. `for/Nlp`) or (b) the dotted form `${PACKAGE_NAME}.${CONNECTION_NAME}` (sets credentials of a connection declared in that package, e.g. `for/Chembl.chembl`). Required headers — `Authorization: <API_KEY>` (the raw key from the user profile page `/u`; NO `Bearer ` prefix) and `Content-Type: application/json`. Body is a flat JSON object of key→string pairs (`{"login":"...","password":"..."}` for a database; `{"accessKeyId":"...","secretAccessKey":"..."}` for AWS — keys are entity-specific and arbitrary). Canonical Python reference: `packages/NLP/aws/nlp-user.py:47-53`.
