- id: DG-FACT-346
  kind: namespace
  scope: manage-credentials
  value: |-
    Datagrok has TWO entity types that own credentials in the secured credentials store — packages and data connections. Both route through the same `/api/credentials/for/<ENTITY_NAME>` REST surface, but the read APIs differ. Package credentials are read from JS via `_package.getCredentials()` (`Package.getCredentials(): Promise<Credentials>`, `js-api/src/entities/misc.ts:163-166`). Connection credentials are not surfaced directly to package JS — they are consumed implicitly when the connection is executed, OR retrieved via `grok.dapi.credentials.forEntity(conn)` (`CredentialsDataSource.forEntity`, `js-api/src/dapi.ts:631-633`). The Credentials entity itself is defined at `js-api/src/entities/data-connection.ts:396-415`.
