- id: DG-FACT-351
  kind: namespace
  scope: manage-credentials
  value: |-
    The connection JSON `credentials.parameters` block (`packages/<Pkg>/connections/<name>.json`) is the file-side counterpart to the REST endpoint — at deploy time the platform reads this block, removes it from the connection record, and stores it in the secured credentials store under the entity `<PackageName>.<ConnectionName>`. Canonical shape — `{"credentials": {"parameters": {"login": "datagrok", "password": "..."}}}` (literal example: `packages/DBTests/connections/postgresql-test.json:10-15`, `packages/DBTests/connections/postgres-db-tests.json:10-15`). Production connection JSONs in `packages/DBTests/connections/` hard-code real login/password values; there is NO `${VAR_NAME}` env-var substitution syntax supported at deploy time — the file is either checked in with literal values (and access-controlled at the repo level) or the `credentials.parameters` block is omitted entirely and credentials are POSTed after deploy via the REST endpoint (FACT-349 path b).
  derives_from:
