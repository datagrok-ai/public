  scope: manage-credentials
  value: |-
    `Credentials` exposes TWO parameter accessors with different visibility semantics — `parameters: any` (MapProxy over the real values, hidden from non-owners; for owners returns the real secrets) and `openParameters: Record<string, string>` (the redacted/display form shown in edit forms). Class doc at `js-api/src/entities/data-connection.ts:397-414`. The article uses `parameters` everywhere (lines 53-66) because the use case is OWN-package code reading its own secrets. The API sample (`packages/ApiSamples/scripts/misc/package-credentials.js:8`) uses `openParameters` because it's a public listing demo. Rule of thumb: when the package reads its own credentials to use them, `parameters`; when surfacing what's stored to a user dialog, `openParameters`.
