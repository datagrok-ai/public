- id: DG-FACT-350
  kind: namespace
  scope: manage-credentials
  value: |-
    Package credentials are owner-scoped — the `Credentials owner` field on the package's `Credentials...` dialog (Packages view → right-click → Credentials...) is a `Group` reference. Only members of that group can READ the credentials back via `_package.getCredentials()`; non-members get `null`. Examples of allowed owners: a single user (the current user), a named group, the special `All users` group (= the default, makes credentials readable by any authenticated user). For automated/programmatic credential rotation, the article prescribes a SERVICE USER created at `Manage | Users | Actions | Add Service User` — service users have their own API key that the rotation script (e.g., `packages/NLP/aws/nlp-user.py:51`) embeds in the `Authorization` header.
  derives_from:
