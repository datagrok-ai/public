  value: |-
    `_package.getCredentials()` returns `Promise<Credentials | null>` — null when no credentials are set for the package OR the caller is not in the credentials owner group. Production read pattern (canonical reference `packages/NLP/src/package.ts:104-115`) is `const c = await _package.getCredentials(); if (c == null) { /* not set */ } else { use c.parameters[key]; }`. The `==`-null check (lenient) matches the NLP reference; the article uses `=== null` (strict) at `manage-credentials.md:54-58` — both are correct because the Dart bridge returns `null` not `undefined`. Single-parameter access form: `c.parameters['login']` (string key, MapProxy-backed at `data-connection.ts:406`).
