- id: DG-FACT-004
  kind: naming
  scope: routing
  value: |-
    The default function base URL prefix is `/apps/<PackageName>` or `/browse/apps/<PackageName>`. If the package has more than one app, the app name is appended: `/apps/<PackageName>/<AppName>`.
  derives_from:
    - article: help/develop/how-to/apps/routing.md:68-82
  contradicts: []
  confidence: medium  # server-side prefix; no JS-API symbol to verify directly

- id: DG-FACT-005
  kind: naming
  scope: routing
  value: |-
    A package can override its URL segment by adding `meta.url` to `package.json`. Example seen in production packages — `UsageAnalysis` uses `"url": "/usage"`, `Compute2` uses `"url": "/Modelhub"`.
  derives_from:
    - article: help/develop/how-to/apps/routing.md:84-103
    - code: packages/UsageAnalysis/package.json   # "meta": { "url": "/usage" }
    - code: packages/Compute2/package.json        # "meta": { "url": "/Modelhub" }
  contradicts: []
  confidence: high

- id: DG-FACT-006
  kind: naming
  scope: routing
  value: |-
    A specific app function can override its URL alias with the function-level header annotation `//meta.url: /<alias>`. NodeJSDemo uses `//meta.url: /todo`.
  derives_from:
