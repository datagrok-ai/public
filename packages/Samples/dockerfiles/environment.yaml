name: myenv
channels:
  - conda-forge
  - defaults
dependencies:
  # 3.10 (min) so the VEX floors below are installable: urllib3>=2.7 and
  # pyarrow>=23 require py>=3.10; numpy 1.24 / pandas 1.5 / scikit-learn 1.2
  # all support 3.10.
  - python=3.10
  - pip
  - numpy=1.24.*
  - pandas=1.5.*
  - scikit-learn=1.2.*
  - pip:
    - datagrok-celery-task==0.1.8
    - celery
    # VEX security floors (setuptools/wheel are floored in the Dockerfile upgrade)
    - urllib3>=2.7
    - pyarrow>=23.0.1
    - jaraco.context>=6.1
    - brotli>=1.2
