<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b2cff"/>
      <stop offset="1" stop-color="#1a7cff"/>
    </linearGradient>
    <linearGradient id="playBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6efff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- waveform bars -->
  <g fill="#ffffff" opacity="0.22">
    <rect x="60"  y="236" width="14" height="40"  rx="7"/>
    <rect x="88"  y="214" width="14" height="84"  rx="7"/>
    <rect x="116" y="186" width="14" height="140" rx="7"/>
    <rect x="144" y="160" width="14" height="192" rx="7"/>
    <rect x="172" y="134" width="14" height="244" rx="7"/>
    <rect x="326" y="134" width="14" height="244" rx="7"/>
    <rect x="354" y="160" width="14" height="192" rx="7"/>
    <rect x="382" y="186" width="14" height="140" rx="7"/>
    <rect x="410" y="214" width="14" height="84"  rx="7"/>
    <rect x="438" y="236" width="14" height="40"  rx="7"/>
  </g>

  <!-- play triangle -->
  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="112" fill="url(#playBtn)"/>
    <path d="M222 196 L326 256 L222 316 Z" fill="#1a7cff"/>
  </g>
</svg>
