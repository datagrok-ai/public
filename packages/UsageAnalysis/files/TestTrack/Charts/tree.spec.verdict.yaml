authoring_note: |
  Canonical isolated-context Critic E subagent verdict (2026-05-09).
  Round 3 review of post-ui-only-extraction tree-spec.ts.

  Predecessor (review_round 2, revision 3, charts-remediate-2026-05-09)
  PASSed after the round-1 layer-compliance refactor: DOM-driveable flows
  (Add Viewer ribbon, gallery tile, gear icon, Hierarchy "..." button,
  Select Columns Cancel, Filters toolbox-section + ribbon icon) were
  pulled out of page.evaluate() into real page.locator(...).click().
  AMBIGUOUS-marked canvas-rendered flows (Tree branches Shift+Click,
  categorical-filter checkboxes) legitimately remained on JS API per
  charts.md / filters.md authority.

  Round 3 follow-up: per user directive, the canvas-gesture concerns
  were extracted to a dedicated ui-only manual scenario (charts-ui.md,
  pyramid_layer: ui-only). The two AMBIGUOUS softSteps that proxied the
  Tree Shift+Click gestures via df.selection bitset (round 2: Step 1
  branches multi-select, Step 3 extend Shift+Click) have been REMOVED
  from this spec. The selection-∧-filter intersection contract — which
  required a canvas selection seed to assert overlap counts (count=0,
  count=2, count=176) — is no longer asserted at the playwright layer.
  Spec body now covers Filter Panel control flow + filter cardinality
  coordination only:
    - Setup (open demog.csv, add Tree, set Hierarchy CONTROL/SEX/RACE)
    - Step 1 (renumbered from Step 2): Filter Panel open via page.locator;
      apply CONTROL=true filter via JS API; assert
      expect(result.filtered).toBe(39).
    - Step 2 (renumbered from Step 4): clear filter via JS API; assert
      expect(result.filtered).toBe(5850).
  charts-ui.md (pyramid_layer: ui-only) carries the canvas Shift+Click
  scenarios as authoritative manual catalog with the original count=0,
  count=2, count=176 cardinality contract preserved for human QA.

  Spec header comment updated: ui_coverage_delegated_to includes
  tree-shift-click-multi-select and tree-shift-click-extend-selection
  → charts-ui.md. The structural relationship is clean: every softStep
  in the spec body traces to a numbered scenario step in tree.md, and
  every numbered scenario step in tree.md is covered by ≥1 softStep.
