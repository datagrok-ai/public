scope_reduction_proposal: |
  selector-pending defensive substitution + canvas-synthesis defensive
  fallback (acceptable SR class — analogous to env-pending defensive skip
  per orchestrator SKILL.md "Acceptable SR classes (Edit 10)" section).

  Reason: Tree branches are canvas-rendered (ECharts); Shift+Click at
  canvas-coord branch positions is not reliably synthesizable in Playwright
  (per scenario .md Notes: "current spec authoritative behavior is the
  bitset fallback with [AMBIGUOUS] warning"). Spec uses df.selection
  programmatic bitset for branch selection (Steps 1, 3 — AMBIGUOUS
  warnings logged), and df.filter bitset for Filter Panel CONTROL toggle
  (Steps 2, 4) — equivalent to the UI gestures' net dataframe state but
  not the DOM event path.

  Additionally: references/charts.md UI flow registry is DEFERRED per
  orchestrator cycle directive. Without registry, Tree's UI flows
  (add-viewer-tree, tree-hierarchy-config, tree-shift-click-multi-select,
  filter-panel-control) lack documented selectors for DOM driving.

  Remediation path: when references/charts.md lands AND a canvas-coord
  Shift+Click synthesis pattern is established (e.g. via Datagrok-internal
  hit-testing API exposed for tests), replace df.selection bitset fallback
  with real DOM gestures. Filter Panel CONTROL toggle could be DOM-driven
  earlier if filter-panel selectors land first (independent of tree
  hierarchy DOM).
