    NEW (sunburst-spec.ts L9 / sunburst.md L19-21) — formal
    delegation route to the ui-only companion.
  - Spec header comment L17-21 UPDATED to reflect the move
    ("sunburst-multi-selection + sunburst-empty-category-click
    MOVED to charts-ui.md (ui-only manual scenarios) per
    charts-remediate-2026-05-09 user directive — canvas
    Click/Ctrl+Click/Ctrl+Shift+Click and null-segment hit-test
    have no automatable equivalent that exercises the actual UI
    invariant; df.selection.set bitset proxies were removed").
  - E-LAYER-COMPLIANCE-01 STILL DEFERRED to
    charts-evaluate-extract-2026-05-09 — same routing as round 2.
    Body still uses page.evaluate + dispatchEvent exclusively for
    DOM driving (zero direct page.click/page.locator/page.fill/
    page.hover/page.press/page.keyboard/page.mouse/dlg.locator/
    dlg.click/dlg.fill matches). Spec header L32-35 + scenario
    Notes L249-260 + migration report L110-128 cite the deferral
    with cross-reference to decision-log
    `charts-evaluate-extract-2026-05-09` and tree-spec.ts canonical
    pattern reference. NOT a new failure — carries forward unchanged.

  ui-only extraction is structurally clean:
  - E-STRUCT-MECH-06 STILL PASS — sub_features_covered shrank
    from 6 to 5 IDs but remains non-empty and all 5 resolve to atlas.
  - E-TRACE-02 STILL PASS — the moved scenario sections retain
