scope_reduction_proposal: |
  Defer E-LAYER-COMPLIANCE-01 strict-regex compliance (page.evaluate
  + dispatchEvent → page.locator(...).click() body refactor) to
  charts cycle charts-evaluate-extract-2026-05-09. SAME deferral as
  round 2 — carries forward unchanged. Round 3 made NO progress
  toward closing E-LAYER-COMPLIANCE-01 because:

  1. Round 3 scope is the ui-only extraction (canvas-gesture
     migration to charts-ui.md), narrowly scoped per user directive.
     The body-wide page.evaluate → page.locator refactor is a
     separate work item documented in spec header L32-35 and
     scenario Notes L249-260.
  2. Round 3 in fact REDUCES the regex match surface (Step 5/6
     softSteps removed — they were AMBIGUOUS/SKIP placeholders
     with no DOM driving anyway, so net page.evaluate count
     drops marginally). The structural shape of the deferral is
     unchanged.
  3. Pattern reference (tree-spec.ts in-cycle refactor) and cited
     dependency (decision-log entry
     `charts-evaluate-extract-2026-05-09`) remain valid — same
     citations as round 2 verdict L42-78.

  Coverage held intact across the extraction:
  - pyramid_layer=integration unchanged (sunburst-spec.ts).
  - ui_coverage_responsibility shrank by 1 flow
    (sunburst-multi-selection) but added formal delegation
    (`ui_coverage_delegated_to`) so the flow is not orphaned —
    charts-ui.md owns it as ui-only manual.
  - sub_features_covered shrank by 1 ID
    (charts.sunburst.on-click) but the atlas ID remains covered
    by charts-ui.md frontmatter — atlas coverage at the feature
    level is preserved across the spec/ui-only split.
  - The empty-category null-segment click (was Step 6 SKIP) is
    now authoritatively documented in charts-ui.md
    `### Sunburst — empty (null) category click (canvas)` rather
    than living as a no-op SKIP softStep in the playwright spec —
    a structural improvement.

