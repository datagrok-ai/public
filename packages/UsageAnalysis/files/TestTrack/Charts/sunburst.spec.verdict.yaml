    to charts-ui.md. Headings preserved; bodies redirect to the
    ui-only catalog with explicit "JS-API substitute does not
    exercise canvas hit-test" rationale.
  - sub_features_covered frontmatter: `charts.sunburst.on-click`
    REMOVED from sunburst-spec.ts (L2) and sunburst.md (L3-7).
    The atlas ID is now claimed by charts-ui.md (L3-6) which has
    the canonical canvas-gesture coverage. 5 IDs remain in
