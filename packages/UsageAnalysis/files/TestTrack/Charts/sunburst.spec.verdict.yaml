       - Step 5 Multi-selection (canvas-based Click / Ctrl+Click /
         Ctrl+Shift+Click)
       - Step 6 Select/filter on empty (null) category (canvas-based)
       - Step 7 Project save / close-all / reopen
       - Step 8 Old layout compatibility (issue #2979 — also blocked by
         missing layout fixture per scenario .md NOTE)
       - Step 9 Collaborative filtering (internal viewer ∧ panel filter
         intersection)

  2. Dataset SPGI_v2.csv (declared by scenario .md) not present on dev env;
     spec falls back to System:DemoFiles/SPGI.csv (line 7 comment). Defensive
     dataset substitution acknowledged in spec; scenario coverage adapts to
     available data shape.

  Remediation path: when references/charts.md lands AND SPGI_v2.csv is
  provisioned on dev / qa-pw, replace test.skip blocks with DOM-driven
  sequences and revert the SPGI fallback to SPGI_v2 per scenario.

  Issue #2979 layout fixture: separately tracked under
  scenario-chains/charts.yaml unresolved_ambiguities[].step "Step 8: Open
  the layout from issue #2979" (priority: medium, recommended fixture-builder).
