scope_reduction_proposal: |
  Accept the file with sub_features_covered scoped to the 6 listed
  Timelines sub-features (charts.timelines, charts.timelines.legend-visibility,
  charts.timelines.split-by-column, charts.timelines.color-column,
  charts.timelines.start-column, charts.timelines.end-column).

  Atlas charts.timelines.* surface declares 13 sub-features (parent +
  12 properties). The scenario covers 6/13 = ~46%, below the
  A-STRUCT-05 70% threshold. The remaining 7 sub-features
  (show-open-intervals, event-tooltip, marker, line-width,
  date-format, axis-pointer, show-zoom-sliders) are NOT covered and
  are NOT yet listed in atlas `manual_only` / `coverage_exceptions`,
  so a strict literal A-STRUCT-05 read fails.

  Real cited dependency for the reduction:
  (a) `pyramid_layer: bug-focused` with `related_bugs: [GROK-19033]`
      — this artifact is the orchestrator's Edit-4 SR-routing fallback
      block specifically for the GROK-19033 legend-filtering
      reproduction, NOT the smoke/regression slot for the Timelines
      viewer's full property surface. Bug-focused scenarios are
      explicitly narrow by pyramid-layer design.
  (b) The 6 chosen sub-features are exactly those required by
      bug-library/charts.yaml GROK-19033 `affects` (3 sub-features:
      charts.timelines, legend-visibility, split-by-column) plus the
      3 sub-features that any reproducible Timelines render requires
      on the SDTM ae.csv shape (start-column=AESTDY, end-column=AEENDY,
      color-column=AESOC for legend categories). The Notes section
      "sub_features_covered scope rationale" documents this
      derivation explicitly.
  (c) The Charts section already has full-property-surface coverage
      pending in sibling scenarios (radar.md, sunburst.md, tree.md);
      the Timelines viewer's broader smoke/regression slot is
      acknowledged as deferred (Notes: "Smoke slot deferred") with
      Lattice-Rule-13-compliant cited dependency
      ("orchestrator SR dispatch routes this fallback to
      bug_focused_candidates slot only; smoke-slot scenario authoring
      is a separate Phase 1 routing decision").

  This matches the pattern applied to the existing migrated Charts
  scenarios where bug-focused or narrowly-scoped artifacts are
  accepted under SCOPE_REDUCTION rather than blocked on full
  coverage. No new authoring is required to satisfy the reduction;
  the verdict simply registers the narrowed scope as authorized.

