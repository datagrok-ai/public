scope_reduction_proposal: |
  selector-pending defensive skip (acceptable SR class — canonical
  Edit 10 env-pending defensive-skip pattern by analogy: the spec
  contains test.skip() blocks with logged warnings citing the missing
  references/charts.md UI registry).

  Reason: GROK-19033 reproduction class is intrinsically DOM-event-driven
  (ECharts legend item DOM click). Without references/charts.md ECharts
  legend selectors, the click-to-filter gesture cannot be exercised at the
  DOM layer. Spec degrades by:
    1. Skipping the actual click-to-filter gesture (Scenario 1 Steps 5-7,
       Scenario 2 Step 5, Scenario 3 Step 3) via test.skip() with logged
       warning.
    2. Covering the bug-class invariants that CAN be exercised via
       property surface deterministically:
         - legendVisibility transitions Auto → Always → Never → Auto
           (Scenario 2 Steps 2-4) with visual stability assertions
           (root non-empty, non-zero size, no console error).
         - splitByColumnName rebind USUBJID → AESEV → USUBJID
           (Scenario 3 Steps 2, 4) with same invariant.
         - colorColumnName binding (Scenario 1 Step 4).
    3. Capturing console errors throughout via page.on('console') and
       page.on('pageerror'), asserted empty after each transition —
       the GROK-19033 invariant carrier.

  Remediation path: when references/charts.md lands with ECharts legend
  selectors, replace test.skip blocks with real DOM legend item clicks
  (e.g. page.locator(...).click()). Critic E re-invocation will surface
  SR as resolvable; bug-focused coverage tightens from "property-driven
  invariant assertion" to "real DOM legend click + invariant assertion".

  Smoke slot for Timelines viewer remains DEFERRED (per scenario .md
  Notes section + chain unresolved_ambiguities). This bug-focused spec
  does NOT cover the canonical Add-Viewer → Timelines smoke surface; a
  separate timelines-smoke.md / charts-ui-smoke.md is a follow-up.
