scope_reduction_proposal: |
  Test Designer extension review required for 5 strict-subset
  consolidation_proposals[] entries surfaced by F-REDUNDANCY-01
  mechanical check. All 5 are bug-focused-vs-canonical (or
  canonical-vs-bug-focused for tree.md) shape pairs where the
  mechanical subset relation does NOT correspond to test-coverage
  redundancy:

  - 3 bug-focused scenarios subset their canonical sister
    (radar-save-reopen-bug ⊂ radar; sunburst-date-column-bug ⊂
    sunburst; sunburst-scatterplot-color-pollution-bug ⊂
    sunburst). Each carries a distinct bug-class invariant
    (project save/reopen path, date-column type validation,
    cross-viewer color isolation) that the canonical scenario
    does NOT exercise.
  - tree.md is subset of TWO bug-focused supersets
    (tree-rowsource-onclick-state-bug, tree-enhancements-bundle-
    bug). The canonical tree.md carries the Tree × Filter Panel
    collaborative filtering coordination invariant
    (pyramid_layer: integration) that neither bug-focused
    scenario replicates.

  Expected Test Designer disposition: REJECT-AS-NONREDUNDANT for
  all 5 entries. The mechanical subset relation surfaces because
  coverage-mode.md F-REDUNDANCY-01 operates on
  sub_features_covered list-as-set without considering
  related_bugs / pyramid_layer / cross-subsystem coupling. The
  5 surface entries are "noted-but-rejected" consolidation
  candidates — F is mechanically required to emit per the gate's
  contract, downstream disposition is governed by bug-class +
  integration-layer preservation rather than mechanical subset.

  No chain YAML updates are required for the rejection path. If
  Test Designer extension instead accepts any drop, chain rev 4
  must remove the dropped scenario from `order_from_files`,
  `dependency_graph`, `output_plan`, and update the corresponding
  `bug_match_attempts_skipped` records (re-add skip records for
  bugs that lose dedicated scenario coverage).

  Audit-only side-finding (NOT in scope for SR dispatch but
  documented for retro): coverage-mode.md F-UI-COVERAGE-01 UI
  flow taxonomy (Source-1 H2-table walk + Source-2 verb-form
  regex) does not generalize to viewer-flow registries that use
  inline `(<flow-id>)` annotation. The
  references/viewers/charts.md registry yields zero raw flow-id
  candidates under strict mechanical extraction, even though it
  documents 14+ inline-annotated viewer flows. Cross-validation
  via ui_coverage_responsibility shows complete ownership;
  PASS-by-vacuity is substantively correct but the audit
  affordance (extracted_ui_flows[]) is empty. Retro suggestion:
  extend coverage-mode.md taxonomy with Source-3 inline
  annotation pattern OR amend grok-browser registry convention
  to project-lifecycle taxonomy alignment. Decision deferred to
  orchestrator + grok-browser maintainer.
