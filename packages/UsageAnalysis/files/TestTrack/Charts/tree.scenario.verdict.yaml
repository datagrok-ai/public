scope_reduction_proposal: |
  Accept the migrated scenario as a single integration-layer scenario covering only
  charts.tree base + filter-panel coordination, with the following real-dependency
  reduction stated:

  1. Pilot variant A requires preserving original scenario wording verbatim during
     migration; the original "Collaborative filtering" scenario in the source
     TestTrack/Charts/tree.md exercises only the base viewer attached to a hierarchy
     and the selection × filter intersection — not the 16 charts.tree property
     sub-features (layout, orient, initialTreeDepth, symbol, symbolSize, fontSize,
     moleculeSize, labelRotate, showCounts, color-palette, showMouseOverLine,
     size-aggregation, color-aggregation, on-click, includeNulls). The migrator
     cannot synthesise property-exercising steps that were not in the original
     without violating preservation.
  2. The chain YAML carries this scenario at pyramid_layer: integration (collaborative
     selection ∧ filter coupling); per the section's pyramid plan, property-coverage
     responsibility belongs to bug-focused scenarios for github-3221 (8-enhancement
     bundle) and github-3245 (Row Source × On Click state machine) — both already
     declared in related_bugs and surfaced in the migration report's atlas-curator
     gap-flag.
  3. Therefore A-STRUCT-01 (3+ sub-features in interaction), A-STRUCT-02
     (edge/perf scenario), A-STRUCT-05 (>=70% sub-feature coverage), and A-STRUCT-06
     (avg >=2) are not satisfiable inside this single migrated artifact and are
     deferred to: (a) the bug-focused candidates (github-3221, github-3245) declared
     in chain YAML bug_focused_candidates, and (b) any property-matrix or edge-case
     scenario added to the section's chain. Gate F (Coverage critic) is the
     correct section-level gate for those gaps; raising them as A-STRUCT failures
     against this single migrated scenario penalises faithful migration of an
     original that simply does not exercise those properties.

  Reduction accepted if the chain YAML's bug_focused_candidates list contains
  github-3221 and github-3245 entries with sub_features_covered including the
  property bundle, AND the migration report's Decisions section cites the
  preservation-of-original constraint and the Gate-F-deferral rationale. Otherwise
  the verdict reverts to FAIL on A-STRUCT-01/02/05/06.
