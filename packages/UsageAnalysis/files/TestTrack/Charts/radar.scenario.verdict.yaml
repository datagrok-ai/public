scope_reduction_proposal: |
  Accept this artifact as a smoke-only single-scenario migration with
  three architectural waivers, all grounded in real architectural /
  migration / lattice-rule dependencies declared in the file's body
  and migration report:

  1. Waive A-STRUCT-02 (no edge/perf scenario) for this file.
     [carries forward from v1 verdict] The file is pinned to
     `pyramid_layer: ui-smoke` per `scenario-chains/charts.yaml`
     rev 1 ("Rule 1 — single viewer create + configure smoke;
     shortest qualifying scenario by step count"). Edge/perf
     scenarios for radar belong on sibling specs or section-level
     coverage, not on the smoke anchor file.

  2. Waive A-STRUCT-05 (>=70% atlas coverage) for this file.
     [carries forward from v1 verdict] A single migrated radar
     viewer scenario cannot cover 70% of the section-wide
     `charts.*` atlas (which spans chord, globe, group-analysis,
     multiplot, radar, sankey, sunburst, surface-plot, timelines,
     tree, word-cloud — 11 viewer families). Section-level
     coverage is the responsibility of Gate F coverage-critic
     across all migrated files in `charts/`.

  3. NEW (cycle charts-remediate-2026-05-09): Apply A-MERIT-02
     SCOPE_REDUCTION for Step 13 ("Check all properties — broad
     sweep"). The original scenario's broad-sweep instruction is
     preserved representatively rather than enumeratively:
     (a) Step 3 categories check (Data/Selection/Value/Style/Legend
         enumeration via Context Panel categories) is the
         broad-sweep anchor;
     (b) Steps 9-12 cover the four explicit Main Things the
         original calls out as MUST be reflected on the viewer
         (table switch, multi-row selection, Values count, Style
         colors);
     (c) Specific per-property toggles for the remaining 6
         atlas-listed `charts.radar.*` properties (title,
         min-percentile, max-percentile, show-tooltip,
         show-min-max, legend-visibility) deferred to
         property-grid widget specs at the A1 boundary
         (property-grid mechanics are not Charts atlas surface).
     Cited dependency: Lattice Rule 13 — A1 architectural boundary
     between Charts viewer atlas (in scope) and property-grid
     widget mechanics (out of scope, deferred to the property-grid
     section's own specs). Not a Lattice-Rule-13 unprompted
     deferral: the SR cites a concrete prerequisite (property-grid
     widget specs in a different section own per-property toggle
     coverage) and a real architectural boundary.

  All three waivers reference real chain-level / migration-architecture
  / lattice-rule dependencies. Step 13 ("Check all properties — broad
