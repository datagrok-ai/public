scope_reduction_proposal: |
  Two reductions required, both citing real atlas-level / chain-level
  dependencies (not effort).

  REDUCTION 1 — A-STRUCT-02 (no edge / perf scenario):
    File-level frontmatter declares `coverage_type: regression` for all
    three sub-scenarios. Scenario 3 ("Delete of non-existent id") IS a
    negative-path contract test and would naturally fit
    `coverage_type: edge`, but the scenario file uses file-level
    frontmatter rather than per-scenario heading markers, so all
    three sub-scenarios share the single `regression` value.
    Real dependency: the chain rev 3 `output_plan.lifecycle-api.md`
    declares `target_layer: api-contract, strategy: simple` with no
    per-scenario coverage_type subdivision. The migration report
    explicitly preserves the prior cycle's file-level
    `coverage_type: regression` (Unresolved ambiguities, paragraph 1).
    Proposed reduction: accept file-level `regression` for
    api-contract scenarios where no edge/perf sub-scenario was
    designed in chain output_plan, OR amend the scenario to mark
    Scenario 3 with a per-scenario `coverage_type: edge` heading
    marker (orchestrator's call). The latter is a small-touch change
    and is the recommended fix on round 2 if Gate A is re-invoked.

  REDUCTION 2 — A-STRUCT-05 (coverage <70% of atlas sub-features):
    The `projects` atlas (rev 11) contains ~21 REST sub_features
    under `projects.api.*`, plus shell/menu/UI sub_features outside
    REST. This single scenario covers 5 of the REST sub_features
    (save, get-by-id, list, delete, count) = ~24% of the REST
    surface, ~5% of the entire atlas. The remaining REST sub_features
    are NOT listed in atlas `manual_only` (rev 11 `manual_only`
    block carries only drag-drop / move sub_features per the
    migration report).
    Real dependency: section-level coverage is owned by Gate F
    (coverage critic) with 5 dedicated keys including
    F-PROACTIVE-COVERAGE-01. Single api-contract scenarios in a
    multi-layer chain cannot, by construction, cover 70% of an
    atlas whose other 95% is owned by sibling playwright /
    uitests-package scenarios in the same section.
    The migration report `## Unresolved ambiguities` paragraph 4
    already enumerates the uncovered REST sub_features
    (`projects.api.search`, `search-namespace`, `recent`, `tags`,
    `entity-paths`, `get-entity-project`, `guest-session-token`,
    plus deferred files.* / relations.* / namespaces.*) and flags
    them for `proactive_lifecycle_specs` follow-up.
    Proposed reduction: A-STRUCT-05 is satisfied at the SECTION level
    by Gate F; this scenario is acceptable as the api-contract
    pioneer. Add the uncovered REST sub_features to chain rev 4
    `proactive_api_specs[]` (NEW schema candidate per Stage-2a
    report — orchestrator's instruction). Candidate spec filenames
    already named in the report: `projects-api-search-spec.ts`,
    `projects-api-recent-spec.ts`, `projects-api-tags-spec.ts`,
    `projects-api-guest-session-token-spec.ts`. Suggested addition:
    also `projects-api-entity-paths-spec.ts` and
    `projects-api-get-entity-project-spec.ts` for the two
    additionally-flagged sub_features.

  All other A-* checks PASS (mechanical, structural, content,
  bug-library, merit). Frontmatter parses cleanly; all 4 required
  fields present; target_layer and coverage_type values are valid
  enum members; 3 numbered scenarios all have steps; setup is
  factored into `## Setup`; sub-feature density is 4 per scenario
  (well above the 2 threshold); no placeholders; bug-library
  triage is documented.
