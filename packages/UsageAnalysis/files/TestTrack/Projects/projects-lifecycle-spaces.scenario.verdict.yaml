scope_reduction_proposal: |
  Two reductions required, both citing real atlas-level / chain-level
  dependencies (not effort). Same shape as the previously-passed
  lifecycle-api.scenario.verdict.yaml SCOPE_REDUCTION (A-STRUCT-02 +
  A-STRUCT-05) — proactive-lifecycle scenarios share the structural
  shape: a single full-flow scenario with file-level
  `coverage_type: regression` against atlas where the realized cell
  is `coverage_type: edge`, and per-scenario sub-feature reach much
  smaller than the atlas REST surface.

  REDUCTION 1 — A-STRUCT-02 (no edge / perf scenario):
    File-level frontmatter declares `coverage_type: regression` and
    the file contains a single `### Main flow` sub-scenario, which
    inherits that same value. The realized atlas cell however is the
    `share-spaces-datasync` edge_case (atlas line 882-902,
    `source_bug: GROK-18345`, `coverage_type: edge`) — the GROK-18345
    triple cross-feature interaction (share + Spaces/namespaces +
    datasync). Semantically this IS a negative-path / edge-case full
    bug-reproduction scenario.
    Real dependency: chain rev 4 `output_plan.projects-lifecycle-spaces.md`
    classification is `medium` with `proactive_lifecycle_specs[3]`
    realization (chain YAML lines 628-655). Chain output_plan declares
    pyramid_layer=`proactive-lifecycle` rather than the file-level
    test-kind axis; the chain does NOT subdivide this single-scenario
    file by per-scenario coverage_type.
    Proposed reduction: accept file-level `regression` for
    proactive-lifecycle scenarios that realize a single atlas
    edge_case, OR (recommended on round 2 if A is re-invoked) amend
    the `### Main flow` heading to carry an inline
    `coverage_type: edge` per-scenario marker reflecting the atlas
    cell's `coverage_type: edge`. The latter is a one-line touch and
    aligns scenario-frontmatter axis with atlas-side `edge_cases[].
    coverage_type` per the C7-followup unified test-kind axis
    (decision-log 2026-04-30).

  REDUCTION 2 — A-STRUCT-05 (coverage <70% of atlas sub-features):
    The `projects` atlas (rev 11) contains ~70 sub_features overall
    (~30 under `projects.api.*`). This single proactive-lifecycle
    scenario covers 8 sub_features (`projects.upload`,
    `projects.api.save`, `projects.api.files.sync`,
    `projects.api.namespaces`, `projects.api.relations.list`,
    `projects.add-relation`, `projects.shell.share-via-context-menu`,
    `projects.api.get-by-id`) = ~11% of the atlas. Remaining sub-
    features are NOT in atlas `manual_only` / `coverage_exceptions`.
    Real dependency: section-level coverage is owned by Gate F
    (coverage critic) and explicitly enumerated in chain rev 4
    `proactive_lifecycle_specs[0..5]` for the spaces / files / query
    / script / db_table / derived source-class spread. By
    construction, a single source-class proactive-lifecycle scenario
    cannot cover 70% of an atlas whose other source-class cells are
    owned by sibling proactive-lifecycle scenarios (`projects-
    lifecycle-files.md`, `-query.md`, `-script.md`, `-db.md`, `-
    derived.md`) plus the broader Wave 2A/2B integration scenarios.
    Proposed reduction: A-STRUCT-05 is satisfied at SECTION level by
    Gate F (F-PROACTIVE-COVERAGE-01 walks chain
    `proactive_lifecycle_specs[].spec_target` against the section's
    TestTrack directory). This scenario is acceptable as the
    proactive_lifecycle_specs[3] (spaces × {rename_external_dep,
    share_with_recipient_open}) realization.

  All other A-* checks PASS. Mechanical: frontmatter parses, all 4
  required fields present (`feature: projects`,
  `sub_features_covered:` with 8 entries, `target_layer: playwright`,
  `coverage_type: regression`); both target_layer and coverage_type
  values are valid enum members. Note: `pyramid_layer:
  proactive-lifecycle` is NOT a Gate A mechanical-check field — Gate
  A only validates the 4 required fields per A-STRUCT-MECH-01 and
  the target_layer / coverage_type enums per A-STRUCT-MECH-05/06; the
  new enum value `proactive-lifecycle` lives on `pyramid_layer`
  (chain-level field per Q3.2 / D4 extension) and does not trip Gate
  A. Body has `## Setup` (factored), `## Scenarios` with `### Main
  flow` sub-heading carrying 6 numbered steps; sub-feature density
  for the single scenario is 8 (well above 2 threshold; smoke
  exemption not invoked); A-STRUCT-01 satisfied (Main flow weaves
  ≥3 sub_features through every step). A-CONT-01 PASS — real names
  used (`demog.csv`, `System:DemoFiles`, `Browse > Spaces`,
  `lifecycle-spaces-${Date.now()}`, `test-projects-demo-spaces-*`);
  the `<RECIPIENT_USERNAME_TBD>` placeholder is explicitly tied to a
  documented Helper 3 prerequisite
  (`helpers.playwright.session.logoutAndLoginAs`, NOT YET
  REGISTERED), satisfying the parametric-with-real-dependency carve-
  out. A-BUG-01 PASS — atlas `known_issues` for projects uses
  `test_coverage: { exists: false, paths: [] }` schema (NOT
  `test_coverage: needed`), so the rule returns PASS-by-vacuity;
  additionally GROK-18345 is captured in the scenario's
  `related_bugs: [GROK-18345]` frontmatter satisfying the strict
  form. Merit checks PASS — all deferrals (Helper 3 / SPGIs Space
  precondition / recipient-Space access) cite real prerequisites,
  not effort.

  GROK-18345 full reproduction: Step 3 of Main flow walks save
  (Step 2 with Data Sync ON) + sync + share via
  `grok.dapi.permissions.grant` + recipient-open under different
  user context (deferred via Helper 3 logoutAndLoginAs). This
  matches the atlas edge_case `share-spaces-datasync` description
  ("ownership transfer + datasync under different user context +
  binary dataframe resolution"). The triple cross-feature
  interaction is preserved; only the recipient-side assertion is
  Helper-3-deferred (concrete dependency, A-MERIT-02-compliant).

  Spaces prelude/postlude: Setup point 6 documents the JS API
  prelude (`grok.dapi.spaces.createRoot`, `spaceClient.addEntity`)
  and point 7 documents the postlude (`grok.dapi.spaces.delete`)
  per `sa-2026-05-03-spaces-inline-prelude-pattern` (decision-log
  2026-05-03). Step 4 uses `grok.dapi.spaces.save` for the rename
  op. Pattern correctly applied; matches `complex.md` Setup point
  4 reference.
