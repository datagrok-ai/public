    PASS: all 18 paths preserved at .md level) and the C7 atlas-backfill pattern
    where matrix interactions[] entries are coverage_type=regression.

  Reduction applied: accept coverage_type=regression on this file; rely on the
  section-level Gate F coverage critic to verify edge/perf coverage exists across
  sibling scenarios in the section directory.
