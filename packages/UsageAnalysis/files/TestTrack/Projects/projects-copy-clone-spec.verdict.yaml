scope_reduction_proposal: |
  Heavy SR (one of the heaviest in the batch). Cited rationale (spec header
  lines 9-22) is technically valid but the resulting coverage is significantly
  below the migrated scenario's intent.

  Cited rationale: Save Copy mode UI selectors (Link / Clone / PersonalView) are
  NOT documented in grok-browser/references; per E-SEL-01/02 a UI-driven path
  would require invented selectors. Deferred to a future
  helpers.playwright.projects.saveCopy({mode}) registry addition. Validated
  against projects.md:71-79 — Copy with link / Clone semantics are documented
  but the specific dialog mode-selector UI is not.

  Coverage gap analysis vs migrated scenario:
  | Migrated step | Spec coverage |
  |---|---|
  | Step 1 (Browse > Dashboards preview thumbnails verify) | NOT covered |
  | Step 2 (Share each project → recipients on Sharing tab) | NOT covered |
  | Step 3 (Open each, verify load) | partial (Setup only opens self-built one) |
  | Step 4a (Re-save overwrite) | covered (4a softStep) |
  | Step 4b (Save Copy with Link) + GROK-19750 invariant | NOT covered |
  | Step 4c (Save Copy with Clone) | NOT covered |
  | Step 4d (Save Personal View Customizations) | NOT covered |
  | Step 5 (Re-share variants → recipient open) | NOT covered |

  GROK-19750 mandatory regression assertion (sub-flow 4b step 7): spec lines
  103-115 self-describe as "simplified version" and explicitly note "full
  GROK-19750 invariant requires the SCOPE_REDUCTION-deferred helper". The
  regression assertion is NOT actually exercised — the spec asserts only
  basic project reload, not the Save-Copy-with-Link → original-viewers-intact
  invariant. Per scenario Notes lines 142-151 the GROK-19750 assertion is
  declared "MUST add an explicit assertion ... mandatory ... not a candidate"
  — this is unmet.

  Frontmatter sub_features_covered claims:
  - projects.shell.share-via-context-menu — NOT exercised (no Step 2/5)
  - projects.add-relation — NOT exercised (no Save Copy with Link)
  - projects.add-link — NOT exercised (no Save Copy with Link)
  Recommend trimming these from sub_features_covered until the helper exists,
  OR proceed with helper implementation and full re-run.

  Recommendation (BLOCKING for full PASS):
  (a) Register helpers.playwright.projects.saveCopy({mode}) per the SR
      rationale, then re-run Migrator → Test Designer → Automator to expand
      coverage to all four sub-flows + GROK-19750 invariant.
  (b) Until then, trim sub_features_covered frontmatter to honest list:
      [projects.api.save, projects.shell.open] only.
  (c) Treat current spec as smoke-equivalent of upload-project + opening, not
      as projects-copy-clone coverage.
