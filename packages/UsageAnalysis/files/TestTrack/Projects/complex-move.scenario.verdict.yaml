scope_reduction_proposal: |
  Accept the migrated scenario file with the following architectural
  reductions, both grounded in `scenario-chains/projects.yaml` rev 4
  (Phase A — Wave 2B decomposition of complex.md Step 10) and atlas
  `manual_only` reclassification per decision-log
  `b2-2026-05-03-drag-drop-ui-only-reclassification` (2026-05-03) —
  real chain-architecture and UI-automation dependencies, not effort.

  1. **A-STRUCT-02 reduction (edge/perf coverage at file scope):**
     This file is a single-scenario, source-agnostic decomposition cell
     per chain rev 4 `dependency_graph.complex-move.md`. It exercises
     the JS API contract for `grok.dapi.projects.move(...)` across two
     namespace transitions (default → file-share → Space) — a
     regression-coverage path classified `coverage_type: regression`.
     Edge/perf coverage at section level is owned by complex.md
     (multi-source edge), complex-integration.md (multi-source
     co-existence), and atlas `edge_cases[]` family. Section-level
     edge/perf enforcement is the Gate F responsibility, not Gate A
     per-file. Acceptable as `coverage_type: regression` for this
     single-scenario decomposed chain cell.

  2. **A-STRUCT-05 reduction (coverage ≥70% of atlas sub-features at
     file scope):** atlas rev 11 declares ~70 projects.* sub-features;
     this file covers 4 directly relevant to namespace-aware move
     (projects.api.save, projects.api.namespaces, projects.move.move-
     entity, projects.move.commit). Per chain rev 4, the section
     partitions coverage across ~14 scenarios; complex-move.md owns
     the move-namespace JS API contract cell exclusively. Per-file
     ≥70% atlas coverage is impossible by chain architecture; section-
     aggregate is enforced by F-UI-COVERAGE-01 / F-BUG-COVERAGE-01 /
     F-PROACTIVE-COVERAGE-01 at section-complete. The remainder of
     atlas projects.* sub-features either live in atlas `manual_only`
     (lines 698-731, including drag-drop and entity-move UI sub-
     features per b2-2026-05-03 reclassification) or are owned by
     sibling chain cells.

  Both reductions cite real architectural dependencies (chain rev 4
  Phase-A decomposition + atlas rev 11 manual_only reclassification).
  The migrated body is structurally and content-wise sound — all
  mechanical checks pass; A-CONT-01 (no placeholder-style
  hallucinations — `<test-user-namespace>` and `<id>` are parametric
  JS-API runtime resolutions documented inline with
  `grok.dapi.namespaces` resolver call) passes; A-BUG-01 vacuously
  passes (no atlas `known_issues` entry affects projects.move.*
  sub-features); A-STRUCT-06 density passes (4 sub-features / 1
  scenario = 4.0 average ≥ 2). No reduction is needed at the body
  level — only the file-scope structural rules A-STRUCT-02 and
  A-STRUCT-05 are reduced to "section-aggregate enforcement" per
  chain architecture, mirroring the pattern accepted for sibling
  `projects-copy-clone.scenario.verdict.yaml`.
