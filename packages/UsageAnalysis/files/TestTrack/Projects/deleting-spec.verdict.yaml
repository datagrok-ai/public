scope_reduction_proposal: |
  Lightest SR in batch (essentially PASS-equivalent for delete-flow coverage).

  SR rationale (cited in spec header lines 6-14):
  (1) Right-click "Delete project" + DELETE confirmation button substituted with
      grok.dapi.projects.delete (JS API). Justified per projects.md:178 (DELETE
      confirmation has no name= attribute) and projects.md:181-184 (JS API is
      the documented preferred default). The substitution preserves
      projects.api.delete coverage cleanly.
  (2) Chain-produced ~26-30 projects (per scenario Setup point 1) → 2
      self-built dummy projects for standalone Validator-run independence.
      Documented in spec header lines 12-14. Terminal-cleanup contract testing
      is a chain-orchestration concern, properly handled by the orchestrator's
      end_to_end_fixtures strategy at chain runtime, not by the per-spec smoke.

  Coverage gap analysis (full vs spec):
  | Migrated step | Spec coverage |
  |---|---|
  | Step 1 (Browse > Dashboards locate project) | substituted (dapi.filter) |
  | Step 2 (Right-click → Delete project) | substituted (dapi.projects.delete) |
  | Step 3 (DELETE confirmation in dialog) | substituted (no dialog in JS API path) |
  | Step 4 (Verify removal — Browse + JS API) | covered (JS API only) |

  Frontmatter sub_features_covered honesty check:
  | Claimed | Actually exercised? |
  |---|---|
  | projects.view.browse | NO (no Browse navigation; dapi.filter used directly) |
  | projects.api.search | PARTIAL (dapi.filter is search-equivalent functionally) |
  | projects.api.delete | YES (via dapi.projects.delete) |
  | projects.view.single | NO (no Context Panel single-project interaction) |

  Recommendation:
  (a) Trim sub_features_covered to honest list [projects.api.search,
      projects.api.delete] OR add minimal Browse navigation step (page.goto
      /projects + .grok-gallery-grid waitFor) to genuinely exercise
      projects.view.browse.
  (b) JS API delete substitution is well-rationalized — accept and retain.
