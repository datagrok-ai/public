scope_reduction_proposal: |
  Accept the new Phase A scenario file with the following architectural
  reductions, both grounded in Plan Wave 2B partitioning (lines 166-167)
  and atlas rev 11 multi-source / chain decomposition strategy. These
  cite real chain-architecture dependencies, not effort.

  1. **A-STRUCT-02 reduction (edge/perf coverage at file scope):**
     This file is intentionally a single-scenario, source-agnostic
     decomposition cell per Wave 2B (decomposition of complex.md Steps
     5-6 — Save Copy without Sync → reopen → re-save with Sync ON). The
     scenario walks a regression round-trip — semantically a lifecycle
     verification test, classified `coverage_type: regression` because
     the unified test-kind enum reserves `edge` for atlas-level
     edge_cases (not lifecycle-decomposition cells). Edge-case coverage
     for the projects section is owned by complex.md (multi-bug edge
     surface) and the atlas `edge_cases[]` family (9 entries: 6
     regression + 3 edge). Section-level edge/perf coverage is enforced
     by Gate F at section-complete, not Gate A per-file. Acceptable as
     `coverage_type: regression` for this single-scenario decomposed
     cell.

  2. **A-STRUCT-05 reduction (coverage ≥70% of atlas sub-features at
     file scope):** atlas rev 11 declares ~70 projects.* sub-features
     across 10 source classes; this file covers 3 directly relevant to
     the Save-Copy lifecycle (projects.api.save, projects.api.files.sync,
     projects.add-relation). Per Wave 2B chain partitioning, the
     section's scenarios partition coverage across decomposition cells:
     complex-save-copy.md owns the Save Copy → reopen → re-save Sync
     round-trip; sibling decomposition cells own other lifecycle slices
     (projects-copy-clone.md owns GROK-19750 Save-Copy-Link invariant;
     projects-lifecycle-{db,derived,files,query,script,spaces}.md own
     source-class lifecycle matrices; projects-ui-smoke.md owns UI
     surfaces). Per-file ≥70% atlas coverage is impossible by chain
     architecture; section-level aggregate coverage is enforced by
     Gate F via F-UI-COVERAGE-01 / F-BUG-COVERAGE-01 / F-PROACTIVE-
     COVERAGE-01 at section-complete. Remainder of atlas projects.*
     either lives in atlas `manual_only` (lines 698-731) or is owned
     by sibling chain cells.

  Both reductions cite real architectural dependencies (Plan Wave 2B
  decomposition; atlas rev 11 partitioning; chain rev 4 sibling-cell
  ownership). All mechanical checks pass; A-CONT-01 (no placeholders)
  passes (template-style `<root>_NoSync` / `<root>_Sync` are bash-style
  derived names from the explicit `save-copy-${Date.now()}` root, not
  unresolved placeholders); A-STRUCT-01 just meets the ≥3 sub-features
  threshold (3 sub-features in interaction); A-STRUCT-06 density passes
  (3.0 ≥ 2); A-BUG-01 PASS-by-vacuity for this file (Notes explicitly
  document that GROK-19750 is owned by projects-copy-clone.md per Plan
  reduction strategy; section-aggregate bug coverage enforced by Gate F).
  No body-level reduction needed — only file-scope structural rules
  A-STRUCT-02 and A-STRUCT-05 reduced to "section-aggregate enforcement"
  per chain architecture.

