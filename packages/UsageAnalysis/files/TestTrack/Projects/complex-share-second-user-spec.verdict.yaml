scope_reduction_proposal: |
  Pattern-2 slice satellite of complex.md (parent decomposed in Wave 2B; spec
  authored Wave 1b 2026-04-30 per decision-log
  `wave-1b-complex-split-b70-followup`). Slice scope: complex.md Step 12
  (configure project sharing for second user at View-and-Use AND Full grant
  levels) + Step 13 (recipient-side log in + open). Targets GROK-18345
  partial regression invariant.

  Documented within-slice scope reductions (anchored at spec header lines
  29-54):

  1. **Step 13 deferred** (spec lines 36-43, 190-194) — recipient-side
     log-in + open shared project requires
     `helpers.playwright.session.logoutAndLoginAs`. Per Wave 1b prompt step 6
     autonomous decision the sub-spec scope was reduced rather than inlining
     a minimal re-auth implementation. **STATUS UPDATE 2026-05-06**:
     Helper-3 IS registered as of 2026-05-04 per helpers-candidates.yaml
     line 315 (`status: registered`, `promoted_to_registry:
     helpers/session.ts#logoutAndLoginAs`); file exists on disk at
     `public/packages/UsageAnalysis/files/TestTrack/helpers/session.ts`;
     Decision D.2 2026-05-06 confirmed registration; chain rev 5 line 1521
     explicitly notes "helper now registered as of Decision D.2 2026-05-06".
     Spec header line 12 + 38-39 ("NOT yet registered") is now stale. The
     within-slice Step 13 deferral is therefore CLOSABLE — recommend
     follow-up rerun authoring task to extend this spec (or write a sister
     re-auth-focused spec) once spec-modification rerun is queued. Out of
     scope for this verification-only rerun.

  2. **Step 12 right-click Share dialog** replaced with
     `grok.dapi.permissions.grant` JS API (spec lines 44-48 + line 7) per
     projects.md:28 (preferred default) + projects.md:242 (context menu
     items have no `name=` attributes). RELAXED layer compliance per
     Decision 2.7 E-LAYER-COMPLIANCE-01 (bug-focused pyramid).

  3. **GROK-18345 PARTIAL repro** (spec lines 49-52) — full reproduction
     requires Spaces dataset + datasync + recipient open (cross-three-
     systems). This spec exercises the share-grant slice + cross-user
     project visibility via permissions.list; full repro of the
     "recipient-cannot-open" invariant is acknowledged out of scope and
     covered (non-orphan) by `projects-grok-18345-spec.ts` cross-cutting
     candidate (chain rev 5 lines 1422-1426) and by
     `projects-lifecycle-spaces.md` proactive-lifecycle scenario (chain
     rev 5 lines 558-573, full repro of GROK-18345).

  4. **Defensive skip-with-note pattern on FK violation** (spec lines 52-54
     + lines 142-148, 179-186) — on dev qa-pw user lookup may fail with FK
     violation on permissions table; defensive try/catch absorbs the
     failure and logs warning. Acceptable per Edit 10 G3 acceptable-SR
     pattern (env-pending defensive skip).

  All four reductions are documented within slice + map to documented
  policy patterns (Decision 2.7 RELAXED layer; Edit 10 G3 defensive-skip;
  pattern-2 within-slice deferral). GROK-18345 invariant in this spec is
  the share-grant + recipient-listed-in-permissions discriminator;
  cross-feature (Spaces + datasync) discrimination is owned by
  `projects-lifecycle-spaces.md` per chain rev 5 §output_plan.

