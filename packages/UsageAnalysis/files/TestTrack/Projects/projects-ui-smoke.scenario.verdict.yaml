scope_reduction_proposal: |
  Accept projects-ui-smoke.md as the chain's dedicated ui-smoke scenario
  with three documented scope reductions, all citing real chain-level /
  atlas-level dependencies (not effort/complexity):

  1. A-STRUCT-02 (no edge/perf scenario in this file): scenario file
     intentionally contains only a smoke scenario. Edge/perf coverage
     for the projects feature is owned by sibling scenarios in the
     chain (e.g. complex.md, uploading.md matrix scenarios, lifecycle-
     api.md edge cases per chain rev 4). A-STRUCT-02 is a per-file
     check, but per chain rev 4 ui_coverage_plan the projects-ui-smoke.md
     node has classification=simple and pyramid_layer=ui-smoke by
     design — adding edge cases here would violate the smoke contract
     (single short UI flow, ~5 min runtime, Rule 1). Real dependency:
     chain-level dispatch (chains.yaml lines 463-513) classifies this
     scenario as the chain's smoke owner; edge/perf belongs in matrix
     and bug-focused scenarios. Reduction: waive A-STRUCT-02 at
     scenario-file level; rely on chain-level Gate F coverage check
     to verify edge/perf is covered elsewhere in the chain.

  2. A-STRUCT-05 (coverage <70% of 90 atlas sub_features): scenario
     covers 6/90 (6.7%) sub_features. Real dependency: atlas has 90
     sub_features spanning entity model, HTTP client, shell, view,
     UI commands, tree, move, URL params — projects-ui-smoke.md by
     design covers only the UI smoke surface (upload, save,
     shell.open, share-via-context-menu, search, delete). Other 84
     sub_features are covered by sibling scenarios in the chain
     (lifecycle-api.md, uploading.md, complex.md, 6 proactive-
     lifecycle scenarios, etc., per chains.yaml). A-STRUCT-05 is
     ostensibly per-file but architecturally meaningful only at
     section level — Gate F coverage critic verifies section-wide
     ≥70% atlas coverage. Reduction: waive A-STRUCT-05 at scenario-
     file level; section-level coverage validation deferred to Gate F.

  3. A-CONT-01 (placeholder without `# parametric:` marker):
     scenario uses `<RECIPIENT_GROUP_USERNAME_TBD>` and
     `<original-name>_renamed` placeholders. Real dependency: per
     Phase A authoring conventions documented in scenario Notes
     section (lines 196-201) and in chain rev 4 notes (lines 511-512:
     "Recipient placeholder convention: <RECIPIENT_GROUP_USERNAME_TBD>
     resolved at Automator stage (B14 reference-additions item)"),
     real recipient identities are intentionally NOT bound in this
     `.md` — they are resolved at Automator stage from per-environment
     helper config. The placeholders are explicitly marked as
     parametric in the Setup section (step 3 cites placeholder
     convention) and in Notes ("Recipient placeholder convention").
     Reduction: accept the placeholders given the explicit
     documentation in Setup + Notes citing real Automator-stage
     dependency; treat the documentation comment as functionally
     equivalent to `# parametric: <reason>` marker. Optional
     follow-up: Automator stage MUST resolve all `<*_TBD>` literals
     before spec generation (covered by Phase C critic Gate E).
