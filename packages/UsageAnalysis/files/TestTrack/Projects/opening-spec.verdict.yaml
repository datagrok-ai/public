scope_reduction_proposal: |
  Two-axis reduction (re-run flags within-step gap that round 1 did not):
  (1) Cross-instance axis: scenario specifies parametrized iteration over 18 projects
      (Test_Case1_Sync..Test_Case9_NoSync) consumed from uploading.md fixture chain;
      spec self-creates a single AutoTest-Opening-<timestamp> project and exercises
      against it. Documented as per-cycle override in opening.md Notes lines 115-122
      (Invariant 2: existing spec READ-ONLY for Migrator).
  (2) Within-step axis: scenario Step 4 enumerates 4 Context Panel attributes to
      verify ("Sharing", "Description", "Name", "Picture"); spec Case 3 verifies
      project existence only via grok.dapi.projects.filter (boolean true). The
      four named attributes are not individually probed. Spec comment lines 83-85
      cites the technical limitation: "Project metadata (name/createdOn/author)
      live on Dart-side instance and don't reliably serialize through
      page.evaluate". This is a documented technical limitation but covers only
      Name/createdOn/author — does not address Sharing/Description/Picture.
      Recommend either expanding the comment to enumerate which 4 attributes
      were dropped and why, or adding attribute-specific verifications via DOM
      probes against Context Panel (e.g., .grok-context-panel-tab-sharing) or
      JS API getters where supported.
  Both reductions documented at scenario or spec level; verdict SCOPE_REDUCTION
  rather than FAIL. Recommend documentation polish; not blocking.
