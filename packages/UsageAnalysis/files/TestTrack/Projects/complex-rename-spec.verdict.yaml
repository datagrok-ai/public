scope_reduction_proposal: |
  Slice covers complex.md Step 7 (table rename inside project) + Step 8
  (re-save with Data Sync ON; UI Save-Copy reduced to JS-API
  projects.save under the same id) + Step 11 (reopen-verify of the
  GROK-19212 invariant). Within-slice reductions, all documented in spec
  header (lines 32-47):

    1. Step 9 entity-rename sub-bullets (Project / Query / Script
       rename) reduced to: table-rename inside project only (covers
       GROK-19212 directly). Project-entity rename was attempted in
       Wave 1b round 1 but failed to propagate on dev (3/3 runs — JS
       API setter propagation issue or dapi cache invalidation;
       flagged for separate investigation per spec header lines 41-46).
       Query and Script renames require Samples-namespace edit
       permissions for the qa-pw account — environment dependency, not
       test effort. github-3550 sister-bug semantic is partially
       exercised through the table-rename → reopen reference
       resolution code-path (same code-path the bug originally surfaced
       on for queries).

    2. Step 11 verification narrowed to: project opens, tables
       re-materialize with rowCount > 0, no resolution error. Data
       Sync refresh verification (force-refresh after server-side
       data change) is NOT explicitly probed — would require source-
       data mutation; deferred to custom-creation-scripts-spec.ts.

  Chain-side anchoring: chain rev 5 records this spec as a bug-focused
  slice satellite of complex.md (realized_as[] line 1183 + Decision 2.6
  pattern 2 entry under bug_focused_candidates[] lines 1497-1507).
  Parent .md complex.md frontmatter related_bugs[] (line 25) explicitly
  lists GROK-19212. All three Decision 2.6 pattern 2 conditions hold.

