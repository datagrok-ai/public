scope_reduction_proposal: |
  Pattern-2 slice satellite of complex.md (parent decomposed in Wave 2B; spec
  authored Wave 1b 2026-04-30 per decision-log `wave-1b-complex-split-b70-followup`).
  Slice scope explicitly covers complex.md Step 1 multi-source open + Join sub-bullet
  + Step 2 Save with Data Sync ON; targets GROK-19103 invariant ("Join result lands
  in active project, not stray").

  Documented within-slice scope reductions (anchored at spec lines 17-28):

  1. Sources are file-based (System:DemoFiles/demog.csv used twice with distinct
     names) instead of DB query result + DB table per the scenario sub-bullet.
     Rationale (spec lines 19-24): the GROK-19103 invariant ("join lands in active
     project, not stray") is independent of source type — the bug surfaces from
     the joinTables → save flow regardless of where source tables originate. File
     sources are env-resilient (no Postgres dependency).

  2. Pivot / Aggregate / Clone-via-script sub-bullets of Step 1 are NOT covered
     here — those belong to a future cross-feature scenario about derived-table
     types. Only the Join sub-bullet that reproduces GROK-19103 is in scope per
     pattern 2 (bug-focused slice; pivot/aggregate/clone are not part of the
     GROK-19103 invariant).

  Both reductions are env/scope-resilience choices that do not reduce GROK-19103
  invariant coverage. Within the slice as defined, all 3 slice steps have
  softStep counterparts and verifications; the GROK-19103 invariant assertion
  (`afterCount - baselineCount === 1`) is the bug's discriminator.

