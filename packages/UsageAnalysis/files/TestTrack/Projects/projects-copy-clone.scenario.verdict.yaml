scope_reduction_proposal: |
  Accept the migrated scenario file with the following architectural
  reductions, both grounded in `scenario-chains/projects.yaml` rev 3 and
  bug-library/projects.yaml rev 2 — real chain-architecture dependencies,
  not effort.

  1. **A-STRUCT-02 reduction (edge/perf coverage at file scope):**
     This file is intentionally a single-scenario, bug-focused chain cell
     per chain rev 3 `output_plan.projects-copy-clone.md.strategy=chained_tests`
     and `dependency_graph.projects-copy-clone.md.pyramid_layer=bug-focused`.
     The scenario walks GROK-19750's explicit reproduction path and asserts
     the regression-coverage invariant — semantically a negative-path /
     edge-behavior test, but classified `coverage_type: regression` because
     the unified test-kind enum reserves `edge` for atlas-level edge_cases
     not bug-reproductions (per atlas-side `interactions[].coverage_type`
     vs `edge_cases[].coverage_type` semantics; bug-focused regressions
     map to `regression` in the enum). Edge-case coverage for the projects
     section is owned by complex.md (multi-bug edge surface) and the
     atlas `edge_cases[]` family. Section-level edge/perf coverage is
     enforced by Gate F at section-complete, not Gate A per-file.
     Acceptable as `coverage_type: regression` for this single-scenario
     bug-focused file.

  2. **A-STRUCT-05 reduction (coverage ≥70% of atlas sub-features at
     file scope):** atlas rev 11 declares ~70 projects.* sub-features
     across 10 source classes; this file covers 7 directly relevant to
     the Save-Copy-Link/Clone/Customizations + Share + Open lifecycle.
     Per chain rev 3, the section's 10 scenarios partition coverage:
     upload-project.md owns smoke + save baseline; uploading.md the
     18-source matrix; share-project.md the JS-API share path;
     opening.md the open lifecycle; project-url.md the URL-params
     cell; complex.md the rename/derive/spaces multi-bug edges;
     deleting.md the terminal cleanup; lifecycle-api.md the api-contract
     round-trip; this file owns the bug-focused Save-Copy + GROK-19750
     cell. Per-file ≥70% atlas coverage is impossible by chain
     architecture; section-level aggregate coverage is enforced by
     Gate F via F-UI-COVERAGE-01 / F-BUG-COVERAGE-01 / F-PROACTIVE-
     COVERAGE-01 at section-complete, not Gate A per-file. The
     remainder of atlas projects.* sub-features either live in atlas
     `manual_only` (lines 698+) or are owned by sibling chain cells.

  Both reductions cite real architectural dependencies (chain rev 3
  output_plan + dependency_graph; atlas rev 11 multi-source partitioning).
  The migrated body itself is structurally and content-wise sound —
  all mechanical checks pass; A-CONT-01 (no placeholders) passes; A-BUG-01
  satisfied via `related_bugs: [GROK-19750, GROK-19103, GROK-19403]`
  citation per migration-prompt template; A-STRUCT-06 density passes
  (7 sub-features in 1 scenario ≥ 2). No reduction is needed at the
  body level — only the file-scope structural rules A-STRUCT-02 and
  A-STRUCT-05 are reduced to "section-aggregate enforcement" per chain
  architecture.
