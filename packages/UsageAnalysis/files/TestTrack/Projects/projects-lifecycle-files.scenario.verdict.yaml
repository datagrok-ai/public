scope_reduction_proposal: |
  Two reductions required, both citing real chain-level / Gate-F
  section-level dependencies (not effort). Pattern matches Phase A
  precedent in lifecycle-api.scenario.verdict.yaml (same cycle).

  REDUCTION 1 — A-STRUCT-02 (no edge / perf scenario in file):
    File-level frontmatter declares `coverage_type: regression`. The
    file is a single-scenario proactive-lifecycle artifact realizing
    chain rev 4 `proactive_lifecycle_specs[0]`
    (source_class=files × dep_lifecycle_op=share_with_recipient_open).
    By chain construction this proactive cell is a regression-grade
    happy-path lifecycle, not an edge or perf cell — the chain
    schema does not subdivide proactive_lifecycle_specs into edge /
    perf flavors at this stage. Step 4 ("rename external dep N/A
    for files") is a negative-source-class cell but is intentionally
    a no-op per the cell definition, not a sub-scenario.
    Real dependency: chain rev 4 `proactive_lifecycle_specs[0]`
    declares `coverage_type: regression` with no edge sibling.
    Proposed reduction: accept file-level `regression` for
    proactive-lifecycle scenarios where the chain's
    proactive_lifecycle_specs entry does not declare an edge / perf
    sibling cell. Section-level edge / perf coverage is owned by
    bug-focused scenarios and atlas-driven edge_cases scenarios in
    the same section (Gate F section-level review).

  REDUCTION 2 — A-STRUCT-05 (coverage <70% of atlas sub-features):
    The `projects` atlas (rev 11) contains ~70 sub_features across
    entity / api / shell / view / ui / move / url-params families.
    This single proactive-lifecycle scenario covers 5 sub_features
    (~7% of the atlas). The remaining sub_features are NOT all
    listed in atlas `manual_only` and are by design owned by sibling
    scenarios in the section (lifecycle-api, projects-ui-smoke,
    complex-*, deleting, opening, share-project, project-url, etc.).
    Real dependency: section-level coverage is owned by Gate F
    (coverage critic) with 5 dedicated keys including
    F-PROACTIVE-COVERAGE-01 / F-UI-COVERAGE-01. A single
    proactive-lifecycle scenario in a multi-scenario chain cannot,
    by construction, cover 70% of the atlas; the section's coverage
    invariant lives at Gate F, not Gate A.
    Proposed reduction: A-STRUCT-05 is satisfied at the SECTION
    level by Gate F; this scenario is acceptable as the
    files-source proactive-lifecycle realization of chain rev 4
    proactive_lifecycle_specs[0]. UI surfaces explicitly delegated
    to projects-ui-smoke.md per `ui_coverage_delegated_to`.

  All other A-* checks PASS. Special note on the new
  `pyramid_layer: proactive-lifecycle` enum value:
  scenario-mode.md does NOT enforce a pyramid_layer enum at
  Gate A (the field is not referenced in any A-STRUCT-MECH-* or
  A-* content check). The new value is therefore transparent to
  Gate A — no failure_key applies, no FAIL is raised. (Per Q3.2,
  this is the intended safety property: chain analyzer / Gate F
  schema additions must not retroactively trip Gate A on
  scenarios that legitimately use the extension.)
