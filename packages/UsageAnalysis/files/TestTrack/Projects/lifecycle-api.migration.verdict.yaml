scope_reduction_proposal: |
  Atlas-driven variant of D-STRUCT-MECH-03 / D-STRUCT-MECH-05 acceptance.

  This scenario carries `produced_from: atlas-driven` (correctly retained
  across re-migration — the primary chain-analyzer test property the
  orchestrator instructed Gate D to validate). The Block-6 schema text
  for D-STRUCT-MECH-03 prescribes `produced_from=migrated` literally,
  and D-STRUCT-MECH-05 expects `original_path` to point at a pre-migration
  TestTrack-original `.md`. Both checks pre-date atlas-driven origin
  becoming a first-class produced_from value (Stage-1 reconciliation /
  chain analyzer rev 3) and have no atlas-driven variant published yet.

  Real dependency: failure-keys-vocabulary.md has no
  `D-STRUCT-MECH-03-atlas-driven` / `D-STRUCT-MECH-05-atlas-driven` keys,
  and the orchestrator explicitly designates this scenario as the
  validation case for atlas-driven retention. Mechanically rewriting
  `produced_from` to `migrated` would itself be a regression in the
  two-mode logic (and the orchestrator's special-case note flags
  exactly that as the failure mode to detect).

  Proposed reduction (acceptable for this cycle, advisory for vocabulary):
  1. Treat `produced_from: atlas-driven` as a valid alternative to
     `produced_from: migrated` for D-STRUCT-MECH-03; retain the other
     8 required fields exactly. (All 8 are present and well-formed in
     the file under review.)
  2. Treat `original_path` self-reference (or any path that resolves
     to a real file in the repo) as satisfying D-STRUCT-MECH-05 for
     atlas-driven origin. The path
     `public/packages/UsageAnalysis/files/TestTrack/Projects/lifecycle-api.md`
     exists; the literal mechanical existence check passes.
  3. Recommend introducing a vocabulary addendum (e.g.
     `D-STRUCT-MECH-03-AD` / `D-STRUCT-MECH-05-AD` or a single
     `D-ATLAS-DRIVEN-01` covering both) so future atlas-driven cycles
     do not require SCOPE_REDUCTION to pass Gate D mechanical checks.

  All content checks (D-STEP-*, D-EDGE-01, D-STRUCT-01/02, D-SAN-*,
  D-MERIT-*, D-UI-DELEGATION-01) PASS on substance: report has all
  required sections, atlas inputs are mapped row-by-row, deferrals
  cite real fixture/helper prerequisites, no UI flow exists to
  delegate, atlas-driven origin is preserved verbatim (no silent
  rewrite to `migrated`).
