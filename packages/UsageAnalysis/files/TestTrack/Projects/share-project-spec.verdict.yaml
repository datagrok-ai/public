scope_reduction_proposal: |
  SR rationale (cited in spec header lines 7-14, validated against scenario .md
  intent and projects.md reference):
  (1) Steps 3-4 (right-click → Share dialog UI → registered user + email invite):
      replaced with grok.dapi.permissions.grant. Justified by projects.md:242
      ("Context menu items have no `name=` attributes — locate by text") making
      UI driving fragile, AND projects.md:28 ("Preferred default: use JS API via
      grok.dapi.projects"). Rationale is technically sound.
  (2) Step 8 (Right-click → Details → Verify all Context Panel tabs render):
      replaced with grok.dapi.projects.filter existence check. Heavier than
      strictly needed — Context Panel tab rendering can be probed via DOM
      selectors (.grok-context-panel-tab) without right-click dispatch.
      Recommend follow-up: add minimal Context Panel tabs presence probe
      (e.g., navigate to /projects, click project tile, count visible tabs).
  (3) Step 5 within-step gap: scenario asks "Verify auto-created user listed
      as recipient in Sharing tab"; spec only verifies grant call returned ok,
      not the recipient listing. Recommend adding permissions.list (or equivalent)
      query against the project to assert the recipient appears in its share
      relations.
  (4) Cross-feature scope: scenario Notes lines 62-69 acknowledge the actual
      Share operation is a permissions/sharing system concern, not a projects
      feature concern. The migrated frontmatter sub_features_covered (browse,
      search, single) reflects projects-side touch points only. SR is consistent
      with that scoping.
  Both registered-user and email-invite branches use defensive skip-with-note
  patterns (lines 94-96, 116-118) to handle environments where API signatures
  are not supported. Acceptable env-resilience but recommend logging skip events
  to the orchestrator for visibility (currently console.warn only — not piped
  to validator output).
