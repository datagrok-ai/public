scope_reduction_proposal: |
  Two-axis reduction (re-run flags within-step path substitution that was not
  explicitly documented):
  (1) Cross-variant axis: scenario lists 4 variants (original / copy-with-link /
      copy-with-clone / save-personal-view-customizations); spec exercises 1
      variant (self-built original). Documented in spec header (lines 7-14):
      "URL-apply behavior is uniform across variant modes". This rationale is
      cited from scenario Notes lines 91-97 ("URL deep-link is generic ... 4-path
      matrix exercises that the URL-apply behavior is uniform"). Acceptable.
  (2) Within-step axis (NOT explicitly documented in spec header):
      Scenario step 4-5 specifies "Open a new tab in the browser and paste/
      navigate to the copied URL ... project corresponding to <variant> opens —
      its tables, viewers, and view layout render in the new tab". This tests
      URL routing / deep-link cold-load (the projects.url-params.apply +
      projects.shell.open path).
      Spec uses grok.dapi.projects.filter().first().open() (line 102-105) — a
      same-session JS API roundtrip. JS API open() invokes projects.shell.open
      directly, bypassing the URL handler / url-params.apply chain. So
      sub_features_covered claims projects.url-params.apply / build-share-link
      coverage in frontmatter, but the spec does not exercise those code paths.
      Recommend either:
      (a) Replace p.open() with page.goto(<project-url>) — actually exercise
          the URL-apply path. Project URL convention per projects.md:91 is
          shown in Context Panel > Links. The frontmatter claim of
          url-params.build-share-link / url-params.apply coverage would then be
          honest.
      (b) Update spec header to explicitly document the path substitution
          ("p.open() substitutes for URL navigation due to <reason>") AND
          remove projects.url-params.* from sub_features_covered (since they
          are not exercised).
  This is the most significant SR finding across the 9 specs to date — the
  frontmatter coverage claim does not match the actually-exercised path.
