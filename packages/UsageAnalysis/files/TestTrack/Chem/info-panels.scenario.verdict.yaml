scope_reduction_proposal: |
  **A-STRUCT-02 carryforward (chain-level edge/perf coverage).**

  Defer A-STRUCT-02 evaluation on `info-panels.md` to chain-level
  satisfaction. The scenario itself is a multi-format regression walk
  across the Chem Context Panel surface — neither an edge probe nor a
  perf test. Forcing `coverage_type: edge` on the file (or inventing a
  synthetic Phase C edge scenario) would mis-classify the regression
  intent and risks D-SAN-02 (silent addition of content not present in
  the original).

  **Cited real dependency (structural, not effort).** A-STRUCT-02 is a
  section-level invariant per scenario-mode.md lines 65-72. The
  satisfaction path is wired in `scenario-chains/chem.yaml` rev 2
  `bug_focused_candidates[]` (10 entries: GROK-12758, GROK-14028,
  GROK-17595, GROK-17621, GROK-18407, GROK-17964, github-3004,
  github-2942, GROK-19624, GROK-16870). Each will carry `coverage_type:
  edge` when authored (bug-focused specs are by-construction
  edge/negative-path probes).

  **Precedent.** decision-log.yaml lines 8528-8530 records the canonical
  pattern: "radar.md: SCOPE_REDUCTION (3 waivers — A-STRUCT-02 +
  A-STRUCT-05 carryforward + A-MERIT-02 step 13 new)". This proposal
  applies the identical carryforward shape.

  **Production pattern.** Charts section illustrates the section-level
  satisfaction shape — 5 `*-bug.md` files all carrying `coverage_type:
  edge` while the 4 non-bug-focused files carry smoke / regression
  (per `grep -rE "coverage_type:" public/packages/UsageAnalysis/files/
  TestTrack/Charts/*.md` 2026-05-11 inventory).

  **Verification gate downstream.** Gate F (coverage critic, section-
  complete) re-verifies A-STRUCT-02 at section-complete via
  F-BUG-COVERAGE-01 against the 10 `bug_focused_candidates[]`. Future
  migrate cycles that author those 10 bug-focused specs lock in the
  section-level edge/perf satisfaction.

  **Recorded in:** migration report `## Opt-outs (SCOPE_REDUCTION
  proposals)` section, entry SR-01 (lines 202-246).
