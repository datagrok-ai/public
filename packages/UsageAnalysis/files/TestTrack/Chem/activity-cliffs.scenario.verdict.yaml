scope_reduction_proposal: |
  SR-01 (A-STRUCT-02 carryforward, accepted per chain rev 2 precedent —
  decision-log radar.md 2026-05-07; same-cycle siblings calculate.md,
  r-group-analysis.md, elemental-analysis.md, sketcher.md,
  Advanced/scaffold-tree-functions.md).

  activity-cliffs.md is a single-scenario file with coverage_type:
  regression (multi-format × multi-interaction happy-path walk across
  Activity Cliffs viewer + cliffs grid + property panel; pyramid_layer:
  integration). It therefore mechanically fails A-STRUCT-02 in
  isolation (no in-file scenario carries coverage_type: edge or perf).

  Real section-level dependency: A-STRUCT-02 is a section-wide
  structural invariant, not per-scenario. Forcing coverage_type: edge
  would mis-classify (scenario walks the happy path, no failure-mode
  invariant or threshold being asserted — row-count cap 10k and
  long-running-confirm 5000/2000 sit below dataset volumes; zero-cliff
  threshold not exercised). Section-level satisfaction routes
  elsewhere:
    (a) scenario-chains/chem.yaml rev 2 `bug_focused_candidates[]`
        enumerates 10 chem-bug-focused specs (none directly intersects
        activity-cliffs.* sub_features, but GROK-18407 chemical-space
        empty-input dialog invariant is a sister analyze-dialog
        failure-mode pattern; each candidate naturally carries
        coverage_type: edge once authored);
    (b) same-cycle sibling r-group-analysis.md carries coverage_type:
        edge organically (per its Gate A verdict);
    (c) the Activity Cliffs row-count cap (10,000) and long-running
        confirm thresholds are atlas-curator candidates for a future
        dedicated edge/perf spec, out of scope here.

  Verdict on A-STRUCT-02 deferred to chain-level / section-complete
  evaluation (Gate F). Accept SR.

  All other Gate A checks (mechanical + A-STRUCT-01/03/04/05/06,
  A-CONT-01, A-BUG-01, A-MERIT-01/02) PASS independently.
