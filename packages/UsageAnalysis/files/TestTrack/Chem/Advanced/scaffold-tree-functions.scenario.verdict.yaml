scope_reduction_proposal: |
  **A-STRUCT-02 carryforward (chain-level edge/perf coverage).**

  Defer A-STRUCT-02 evaluation on `Advanced/scaffold-tree-functions.md` to
  chain-level / section-complete review (Gate F). Migration report's
  `## Opt-outs (SCOPE_REDUCTION proposals)` section, entry SR-01
  (scaffold-tree-functions-migration-report.md lines 272-299), explicitly
  proposes this carryforward citing:

  1. **Real structural dependency (not effort):** A-STRUCT-02 is a
     section-level invariant — "at least one scenario in the section
     is edge/perf". The chain (`scenario-chains/chem.yaml` rev 2) owns
     section-level coverage_type distribution via
     `bug_focused_candidates[]` (10 entries), each of which naturally
     carries `coverage_type: edge` once authored (sister-pattern to
     charts radar-save-reopen-bug.md / sunburst-date-column-bug.md /
     tree-rowsource-onclick-state-bug.md / etc.).

  2. **Forcing coverage_type=edge on this file would mis-classify.**
     `Advanced/scaffold-tree-functions.md` is the section's UI smoke
     (`pyramid_layer: ui-smoke`, `ui_coverage_plan.smoke_scenario` per
     chain), realizing atlas critical path
     `chem.cp.scaffold-tree-add-filter` (p0) end-to-end. It is a
     canonical viewer create + configure walk on `smiles-50.csv`, no
     bug-repro path, no parameter matrix, no perf threshold —
     coverage_type=smoke is the only correct classification.

  3. **Established precedent.** Decision-log line 8528-8530 records the
     radar.md 2026-05-07 verdict:
       "radar.md: SCOPE_REDUCTION (3 waivers — A-STRUCT-02 +
        A-STRUCT-05 carryforward + A-MERIT-02 step 13 new)"
     — canonical A-STRUCT-02 carryforward pattern. info-panels.md (this
     same migration cycle, this same Critic A pass, 2026-05-11) also
     resolved A-STRUCT-02 via the same SR-01 carryforward proposal and
     received `SCOPE_REDUCTION` verdict per
     info-panels.scenario.verdict.yaml.
     `Advanced/scaffold-tree-functions.md` applies the identical
     carryforward shape.

  **Resolution path:** Gate F (coverage critic, section-complete)
  re-verifies section-level A-STRUCT-02 satisfaction once the 10
  `bug_focused_candidates[]` (chem-grok-12758-spec.ts,
  chem-grok-17595-spec.ts, chem-github-3004-spec.ts, etc.) are
  authored and carry `coverage_type: edge`. Section-complete
  re-evaluation locks A-STRUCT-02 satisfaction for the chem section
  as a whole.

  **Scope of waiver:** A-STRUCT-02 verdict on this file is deferred to
  chain-level evaluation. All other checks evaluated on merit and
  pass.

