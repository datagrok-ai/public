scope_reduction_proposal: |
  Accept SR-01 (A-STRUCT-02 carryforward to chain-level evaluation) as
  cited in structure-filter-migration-report.md § Opt-outs.

  A-STRUCT-02 (at least one scenario with coverage_type: edge|perf) is
  a section-level structural invariant. `Advanced/structure-filter.md`
  is a multi-invariant substructure-filter cycle walk across five
  sub-scenarios — coverage_type: regression is the natural fit per
  chain rev 2 (pyramid_layer: integration, classification: medium,
  multi-invariant walk; precedent siblings similarity-search.md /
  info-panels.md / calculate.md all carry regression). Forcing
  coverage_type: edge on this scenario would mis-classify (asserts
  happy-path cycle transitions across 5 independent invariants, not
  a specific failure-mode invariant — would violate D-SAN-02).

  Resolution path (mirrors radar.md 2026-05-07 origin precedent at
  decision-log:8528-8530 AND info-panels.md / calculate.md /
  similarity-search.md 2026-05-11 carryforward precedents in this
  same migration cycle): A-STRUCT-02 will be satisfied chain-wide by
  the 10 bug_focused_candidates[] already emitted under
  scenario-chains/chem.yaml rev 2 (each chem-bug-focused spec
  naturally carries coverage_type: edge — sister to charts
  radar-save-reopen-bug.md / sunburst-date-column-bug.md). GROK-14028
  (chem-grok-14028-spec.ts) is among the 10 candidates and will
  organically extend edge coverage for the substructure-filter
  cleanup invariant adjacent to this scenario's Block 1. Additionally
  r-group-analysis.md (same-cycle, same section, coverage_type: edge)
  already organically satisfies the section-level invariant.

  Why this is a real dependency, not effort: the per-scenario
  edge|perf marker cannot be invented mid-migration without violating
  D-SAN-02 (no silent additions). The chain-wide satisfaction path is
  already wired (10 candidate specs + r-group-analysis.md organic
  edge). Advanced/structure-filter.md must not block the migrate
  cycle on a structural property that is the chain's responsibility,
  not the per-scenario responsibility.

  A-STRUCT-02 verdict on Advanced/structure-filter.md is therefore
  deferred to chain-level evaluation (Gate F section-complete).
