final_run_summary: |
  PASS on 2026-05-12T07:50:00Z, dev.datagrok.ai, qa-pw user, Chem v1.17.6.
  Test runtime: 1.3 minutes (180s budget). Single PASS, clean run.
  Pattern that worked (Round 5):
    1. Split first softStep into smaller evaluates with awaits between,
       so Playwright can process state during Chem WASM compilation
       (long page.evaluate chains hang the test event loop in cold
       sessions otherwise — same blocker as Rounds 1-4).
    2. 30s waitForTimeout AFTER addTableView (NOT before — Chem
       autostart fires as side-effect of semType=Molecule detection on
       a Molecule column).
    3. Expand all .d4-accordion-pane elements before reading
       .d4-link-action entries — in fresh Playwright sessions panes
       default to collapsed; MCP warm sessions have them pre-expanded.
       Action labels render only inside expanded panes.
  Spec body is now end-to-end-validated as regression-lock on the
  fixed GROK-17964 surface.
scope_reduction_proposal: |
  env-pending defensive skip: spec body marked test.fixme() with logged
  warning citing missing env requirement (Chem package cold-start in fresh
  Playwright session on dev.datagrok.ai). Same blocker class as chem-grok-
