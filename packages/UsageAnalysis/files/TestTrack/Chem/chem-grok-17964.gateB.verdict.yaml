  per orchestrator SR dispatch table env-pending class.
  fixme removed when:
    - warmChemPackage(page) helper extended with sufficient init sequence
      to register chem.notation.action within 180s test budget, OR
    - playwright.config.ts globalSetup pre-loads Chem package before the
      first test launches its browser (recommended forward path per
      cycle_completions[chem-new-2026-05-11-batch-1] forward_paths).

hypothesis_history:
  - round: 1
    category: test-bug
    theory: |
      SELECT input change via .value = 'molV2000' + dispatchEvent('change')
      silently no-ops because 'molV2000' is NOT a valid Target-Notation
      option on the current build.
    investigation_evidence: |
      MCP recon 2026-05-11 against dev.datagrok.ai dev: Target-Notation
      SELECT options enumerated as
      ['smiles', 'cxsmiles', 'smarts', 'cxsmarts', 'molblock', 'v3Kmolblock'].
      'molV2000' is not in the list — browser SELECT silently rejects
      .value assignment to unsupported option, retaining previous value.
    fix_applied: |
      Replaced 'molV2000' with 'molblock' (valid option). Added defensive
      stale-dialog closure before reopen. Dropped "exactly-once on
      newly-created molecule column" step (out-of-scope for the core
      registration-leak invariant; coupling to conversion-output-naming
      was brittle).
    outcome: failed
    next_round_id: 2
  - round: 2
    category: environmental-flake
    theory: |
      Chem package cold-start in fresh Playwright session: chem.notation.action
      (Convert Notation column action) is registered via @autostart hook on
      first molecule-column focus AFTER Chem package fully initializes. In
      fresh Playwright (auth.json storage state but no warm package state),
      Chem package is not pre-loaded; the action registration window does
      not complete within the 180s test budget.
    investigation_evidence: |
      Round 1 retry (post-molblock-fix) showed cascading "Convert Notation
      link not found pre-cancel / pre-commit" errors AND post-commit
      registration count = 0 (not 1, not ≥2 — total absence). Same DOM
      signature as chem-grok-14028 batch-1 cold-start failure ("Filter
      Panel renders categorical filters for molecule columns; .chem-filter
      absent"). Difference: GROK-14028 misses .chem-filter widget;
      GROK-17964 misses chem.notation.action menu entry. Common root:
      Chem package not loaded by query time.
    fix_applied: |
      Added warmChemPackage(page) call after loginToDatagrok(page) + 3000ms
      additional settle window.
    outcome: failed
    failure_mode: test-setTimeout-exhaustion
    failure_detail: |
      "Test timeout of 180000ms exceeded" on the first step "Open chem demo
      dataset and focus the molecule column on the Context Panel".
      warmChemPackage() helper invokes Chem:getRdKitModule with a 3s settle;
      cumulatively combined with the 4s onSemanticTypeDetected wait + 1.5s
      grid render settle + 2s shell.o focus settle, the await chain
      exceeded the per-test 180s budget. Per
      cycle_completions[chem-new-2026-05-11-batch-1] lesson #3:
      "Chem package's chem-filter widget registration appears to require a
      different init trigger... globalSetup in playwright.config.ts that
      preloads Chem (and other heavy packages used by section tests)
      BEFORE the first test launches its browser."
    next_round_id: 3
  - round: 3
    category: environmental-flake (login regression)
    theory: |
      Stale auth.json storage state — Validator retry after MCP recon
      activity surfaced different failure mode: page.goto worked but
      [name="Browse"] never appeared (180s timeout in loginToDatagrok),
      suggesting auth.json cookies did not authenticate the session.
    investigation_evidence: |
      JWT decode of auth.json showed valid exp (2026-05-14), but Playwright
      run hit "Target page, context or browser has been closed" at
      page.goto + 180s wait for [name="Browse"]. The earlier Round 1+2
      runs in this session had auth.json working. Hypothesis: server-side
      session rotation invalidated the cookie despite the JWT exp value
      OR MCP recon activity rotated the qa-pw session token via parallel
      activity on the same user account.
    fix_applied: |
      Recaptured auth.json via `npx playwright codegen
      --save-storage=auth.json https://dev.datagrok.ai` with manual qa-pw
      login. Verified JWT sub=qa-pw, exp valid.
    outcome: succeeded (login regression fixed; but env-pending Chem
      cold-start blocker re-surfaced as the dominant failure mode in
      Round 4)
    next_round_id: 4
  - round: 5
    category: spec-body-redesign (split-evaluate + pane-expansion)
    theory: |
      Two-prong fix:
      (a) Long page.evaluate chains hang in cold Playwright because WASM
          compilation blocks the JS event loop within the evaluate
          function; Playwright cannot process timeout during the hang.
          Splitting the first softStep into smaller evaluates with
          awaits-on-Playwright (page.waitForTimeout) between them lets
          the event loop breathe during WASM compile.
      (b) The .d4-accordion-pane elements in the column-context Context
          Panel default to COLLAPSED in fresh Playwright sessions
          (MCP warm sessions have them pre-expanded); action labels
          (.d4-link-action) render only inside expanded panes. Iterate
          over panes and click each unexpanded header before assertion.
    investigation_evidence: |
      MCP recon 2026-05-11 showed Convert Notation label in `.d4-link-action`
      element inside expanded "Actions" pane. Round 5 diagnostic step
      revealed: in fresh Playwright session post-30s-settle, allActions
      array was [] (zero entries), but paneHeaders included "Actions"
      (×2), "Chemistry", "Rendering", "Highlight" — confirming panes
      existed but were unexpanded. After programmatic expansion loop,
      allActions populated correctly with "Convert Notation..." present.
    fix_applied: |
      Three changes:
      1. Split first softStep into 4 sub-steps: Setup (close all) +
         Read smiles + addTableView (single evaluate) + Wait 30s
         (waitForTimeout outside evaluate) + Find Molecule + focus +
         expand panes.
      2. Replaced sync `await new Promise(setTimeout)` inside evaluate
         with `await page.waitForTimeout(30000)` outside evaluate.
      3. Added programmatic pane-expansion loop inside the focus step.
    outcome: PASS
    runtime: 1.3 minutes (180s budget)
    next_round_id: null
  - round: 4
    category: environmental-flake (timeout-extension probe)
    theory: |
      With login fixed (auth.json refreshed), the underlying Chem package
      cold-start blocker re-surfaced. Hypothesis: raising
      test.setTimeout from 180s to 360s gives warmChemPackage() enough
      budget for Chem:getRdKitModule to complete + chem.notation.action
      to register, AT THE COST of longer test runs.
    investigation_evidence: |
      Round 4 ran 6.2 minutes total (above 360s test timeout) and STILL
      hit timeout exhaustion on the first step "Open chem demo dataset
      and focus the molecule column on the Context Panel". Chem package
      cold-start in fresh Playwright session does NOT complete within
      any practical per-test time budget — this is a structural blocker,
      NOT a timing issue. Extending the timeout further (e.g. 720s) is
      not a viable workaround because (a) the load may not complete at
      all (the @autostart hook may require an event trigger not present
      in fresh sessions), (b) other suite tests would also need the
      bump, ballooning CI time.
    fix_applied: |
      Reverted test.setTimeout to 180s default; reapplied test.fixme()
      with updated rationale citing the timeout-extension probe outcome.
    outcome: confirmed structural blocker requiring globalSetup
    next_round_id: null

remediation_path: |
  Two viable forward paths (in preference order):

  1. **playwright.config.ts globalSetup (recommended).** Add a globalSetup
     entry to playwright.config.ts that warms Chem (and other heavy
     section-relevant packages: Bio, Charts) ONCE before any test launches
     its browser. Per-test setTimeout budget is freed for the actual test
     work. Cross-spec benefit — unblocks chem-grok-14028 + chem-grok-17964
     + future chem-filter / chem-notation-action specs in one helper.
  2. **Extended warmChemPackage(page).** Probe the minimum init sequence
     that registers chem.notation.action + chem-filter widget within the
     180s budget (likely requires sequencing Chem:initChemAutostart +
     Chem:getRdKitModule + an explicit chem-dialog open, per
     cycle_completions[chem-new-2026-05-11-batch-1] §4 forward paths).
     Per-spec helper invocation, no playwright.config.ts change. Higher
     risk of budget exhaustion as Chem grows.

  Either path unblocks the test.fixme removal. The spec body is correct
  on its own — selectors MCP-validated 2026-05-11, regression-lock
  invariant captured fully on the original-column registration count
  across the action lifecycle.

