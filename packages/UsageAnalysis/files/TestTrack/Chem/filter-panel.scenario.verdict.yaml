  bug_focused_candidates[], NOT by this scenario; the
  MAX_SUBSTRUCTURE_SEARCH_ROW_COUNT row-count bound per atlas
  chem.search.substructure is not exercised — SPGI.csv sits below
  threshold). Section-level satisfaction routes elsewhere:
    (a) scenario-chains/chem.yaml rev 2 `bug_focused_candidates[]`
        enumerates 10 chem-bug-focused specs; chem-grok-14028-spec.ts
        directly targets the filter-sketcher state-cleanup invariant
        on this exact scenario (Step 2 span on filter-panel.md per
        chain rev 2) and naturally carries coverage_type: edge once
        authored — strongest possible chain-level carrier, and
        notably the bug IS cited in this scenario's `related_bugs`
        frontmatter (GROK-14028) per directly-overlapping affected
        sub_features (chem.search.substructure.filter + chem.sketcher
        intersect 3 of this scenario's 6 sub_features_covered). The
        non-empty related_bugs strengthens — does not weaken — the
        SR-01 argument: it concretely names the chain-level carrier
        that owns the edge invariant this scenario intentionally
        does NOT exercise, satisfying D-MERIT-01 / A-MERIT-01 real-
        dependency citation at maximum specificity. The
        related_bugs entry is bug-AWARENESS (defense-in-depth
        coverage owned elsewhere), NOT a claim that this scenario
        carries edge coverage itself — A-STRUCT-02 reading is
        unchanged structurally (still file-internal edge/perf
        absent; SR carryforward still required);
    (b) same-cycle sibling r-group-analysis.md carries coverage_type:
        edge organically (per its Gate A verdict);
    (c) row-count / dataset-volume thresholds for substructure search
        documented in atlas chem.search.substructure
        (MAX_SUBSTRUCTURE_SEARCH_ROW_COUNT) but intentionally out of
        scope for this regression walk — SPGI.csv sits below the
        bound; perf invariant carryforward not applicable here.

  Verdict on A-STRUCT-02 deferred to chain-level / section-complete
  evaluation (Gate F). Accept SR.

  All other Gate A checks (mechanical + A-STRUCT-01/03/04/05/06,
  A-CONT-01, A-BUG-01, A-MERIT-01/02) PASS independently.
