        enumerates 10 chem-bug-focused specs; chem-grok-18407-spec.ts
        directly intersects chemical-space.* sub_features (spans Step 3
        and Step 5 of this scenario) and naturally carries
        coverage_type: edge once authored — strongest possible
        chain-level carrier for this specific scenario;
    (b) same-cycle sibling r-group-analysis.md carries coverage_type:
        edge organically (per its Gate A verdict);
    (c) row-count / dataset-volume thresholds for Chemical Space not
        documented in atlas (unlike Activity Cliffs); no out-of-scope
        perf invariant available to carry here.

  Verdict on A-STRUCT-02 deferred to chain-level / section-complete
  evaluation (Gate F). Accept SR.

  All other Gate A checks (mechanical + A-STRUCT-01/03/04/05/06,
  A-CONT-01, A-BUG-01, A-MERIT-01/02) PASS independently.
