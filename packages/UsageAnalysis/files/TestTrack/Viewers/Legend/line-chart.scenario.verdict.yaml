scope_reduction_proposal: |
  Apply three coordinated reductions, all rooted in the Legend section's
  chain-coordinated section-split design (chain rev 1) and the
  established sibling-scenario precedent set by filtering.md Scenario 9
  (filtering.scenario.verdict.yaml, accepted SR for per-heading
  coverage_type:edge marker).

  REDUCTION 1 — A-STRUCT-01 (sub-feature interaction count).
  Strict rule: at least one scenario combines 3+ atlas sub-features.
  Line-chart.md declares only 2 sub_features_covered (legend.column,
  legend.refresh.on-data-change). Reduction: accept this 2-sub-feature
  scope because the chain explicitly delegates standard legend UI
  (visibility / position / color picker / save-dialog) to
  visibility-and-positioning.md (chain ui_coverage_delegated_to:
  visibility-and-positioning.md; sibling smoke owns 12 sub_features per
  ui_coverage_plan.smoke_covers). The chain rev 1 classifies this
  scenario as Rule 4 integration scoped to line-chart-specialty flows
  (Split + Multi Axis + Y-column replacement) — three line-chart-only
  surfaces that intersect only legend.column and
  legend.refresh.on-data-change in the atlas. Real technical dependency:
  the atlas legend feature is cross-cutting (23 sub_features mapped to
  the LegendMixin); line-chart specialty cannot organically exercise
  3+ atlas sub-features without duplicating sibling scenarios' coverage.

  REDUCTION 2 — A-STRUCT-02 (edge / perf coverage_type required).
  Strict rule: at least one scenario has coverage_type: edge or perf.
  Line-chart.md frontmatter is coverage_type: regression with no
  per-scenario marker. Reduction: add per-scenario [coverage_type: edge]
  heading marker to Scenarios 3 and 4 — both are layout/project
  persistence cycles that map directly to atlas edge_case GROK-17278
  ("legend customization persistence across sessions; not included in
  serialized layout or project state"). Implementation matches
  filtering.md Scenario 9 precedent exactly:
    "### 3. Layout and project persistence — Split + Multi Axis +
     per-line legends [coverage_type: edge]"
    "### 4. Multi-Y configuration ... [coverage_type: edge]"
  Real atlas-level dependency: atlas edge_cases lists GROK-17278 as
  persistence-of-legend-customization edge_case; both scenarios test the
  fix path (round-trip survival of Split / Multi Axis / per-line legend
  state through layout-save→reapply and project-save→close→reopen).

  REDUCTION 3 — A-STRUCT-05 (≥70% sub-feature coverage) and A-STRUCT-06
  (avg ≥2 sub-features per scenario; 2/4 = 0.5 violates).
  Strict rules apply per-file. Reduction: under the chain-coordinated
  section-split convention (chain rev 1, 6 scenarios collectively
  responsible for the 23-sub_feature legend atlas), per-file 70% does
  not apply — coverage is computed at the section level via Gate F.
  Density rule similarly relaxed: line-chart.md is the specialty file
  for Line chart-specific Split/Multi Axis/Y-replacement flows, and
  these surfaces map to only 2 atlas sub-features. Real chain-level
  dependency: chain rev 1 explicitly designs line-chart.md as a
  delegated specialty (ui_coverage_responsibility:
  line-chart-split-legend, line-chart-multi-axis-per-line-legend,
  line-chart-y-columns-replacement; ui_coverage_delegated_to:
  visibility-and-positioning.md). Forcing additional sub-features into
  line-chart.md would duplicate sibling coverage and weaken the
  section-split design.

  Together: accept the file as currently written, plus add
  [coverage_type: edge] markers to Scenarios 3 and 4 headings (only
  textual change required). Bug-coverage (A-BUG-01), content-realness
  (A-CONT-01), structure-mechanical, density-via-chain, merit checks
  all pass under this reduction.
