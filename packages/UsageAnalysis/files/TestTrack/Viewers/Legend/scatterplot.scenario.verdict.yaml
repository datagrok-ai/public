scope_reduction_proposal: |
  A-STRUCT-02 is satisfiable but currently fails: the file-level
  frontmatter declares `coverage_type: regression` and no `### N.`
  scenario heading carries a `[coverage_type: edge]` marker, so
  no scenario in this file qualifies as edge/perf per A-STRUCT-02
  (only scenario-side `edge` or `perf` counts; severity-axis
  `priority: p1` does NOT satisfy the rule).

  However, Scenarios 1, 3, and 5 substantively exercise atlas
  edge_cases for cross-cutting bugs:
    - Scenario 1 (color picker + persistence cycle through layout
      and project round-trip) — atlas edge_cases for GROK-17438
      (color-change → legend hide on shared-legend viewers),
      github-3132 (sequential color changes resetting), and
      GROK-17278 (legend customization persistence across layout
      and project save/reopen).
    - Scenario 3 (in-viewer filter persistence across multiple
      scatterplots through layout round-trip) — atlas edge_case
      for GROK-17222 (legend update under in-viewer filter
      trigger source).
    - Scenario 5 (grid color-coding linear↔categorical with
      layout + project persistence) — atlas edge_case for
      GROK-17278 in the linear-vs-categorical color schema
      branch.

  Two acceptable reductions, both already established in this
  same chain (sibling precedents preserved):

  Option A (file-level, mirrors color-consistency.md): change
  frontmatter `coverage_type: regression` → `coverage_type: edge`.
  Rationale: 3 of 5 scenarios are persistence-cycle edge cases
  tied to atlas edge_cases; the remaining 2 (Scenarios 2 and 4)
  are also boundary behaviors (derived nullable color columns;
  Filter Panel + click-to-filter composition).

  Option B (per-scenario markers, mirrors filtering.md Section
  9): add `[coverage_type: edge]` to the headings of Scenarios
  1, 3, and 5; leave Scenarios 2 and 4 as the file-level
  `regression`. This better preserves the test-kind distinction
  for the 2 non-persistence scenarios.

  Option B is preferred: it matches filtering.md's pattern
  (Section 9 "[coverage_type: edge]") and accurately labels
  Scenarios 2 and 4 as regression while Scenarios 1, 3, 5 carry
  the edge marker tied to atlas edge_cases for
  GROK-17438 / github-3132 / GROK-17278 / GROK-17222.

  Real dependency cited: atlas edge_cases (4 of the 5 cross-
  cutting bugs in `related_bugs` map to atlas edge_cases entries
  whose `description` text explicitly calls out persistence-cycle
  and filter-source-matrix invariants); chain YAML
  `bug_focused_candidates` blocks for GROK-17438, GROK-17278,
  GROK-17222, github-3132 list scatterplot.md sections 1, 3, 5
  among their `spans`. Without the marker, A-STRUCT-02 has
  nothing to anchor on for an edge classification, but the
  scenarios' content is already edge-shaped.
