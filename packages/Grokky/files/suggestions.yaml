powerSearch:
  Function chaining:
    - prompt: ADME properties for aspirin
    - prompt: Gasteiger for CHEMBL1234
    - prompt: Gasteiger for Apremilast
    - label: Convert SMILES to HELM
      prompt: Convert C[C@H](N)C(=O)N(C)CC(=O)N[C@@H](Cc1ccc(N)cc1)C(=O)O to HELM
    - prompt: 'Convert to SMILES: GATTACA'

  Database queries:
    - prompt: ADCs with IC50 above 400
    - prompt: ADCs with caspase activity > 8
    - prompt: Shigella bioactivity
    - prompt: PK for LEVOFLOXACIN
    - prompt: CHO assay data

  Documentation:
    - label: UMAP on sequences — parameters
      prompt: How to perform UMAP on sequences and what parameters are available to tune?
    - prompt: How to use lasso selection on a scatter plot?

  Code generation:
    - label: 'JS: interactive sketcher with molecule properties'
      prompt: 'JS: Add a view with the sketcher on the left, and the molecule properties on the right. As user sketches the molecule, the right part should update interactively'
    - label: 'Python: render Gasteiger partial charges'
      prompt: 'Python: write a function that accepts a molecule and renders Gasteiger partial charges as a result'

context:
  - scope: column
    key: molecule
    match: { semType: Molecule }
    label: Molecule column
    icon: atom
    suggestions:
      - { label: Show me the chemical space, prompt: Show me the chemical space }
      - { label: Calculate Lipinski descriptors, prompt: Calculate Lipinski descriptors }

  - scope: viewer
    key: scatter
    match: { type: Scatter plot }
    label: Scatter plot you're viewing
    icon: chart-line
    suggestions:
      - { label: Zoom in, add regression line, prompt: zoom in, add a regression line }
      - { label: Color points by age, prompt: color points by age }

  - scope: view
    key: view
    match: { type: TableView }
    label: This view
    icon: table
    suggestions:
      - { label: Add a histogram, prompt: add a histogram }
      - { label: Close the scatter plot, prompt: close the scatter plot }
      - label: Scatter plot of height vs weight with regression
        prompt: Add a scatter plot, show height vs weight, show regression line, zoom in, color by age
      - label: Distribution of activities per compound class
        prompt: Show me the distribution of activities per compound class

  - scope: global
    key: anywhere
    label: Anywhere
    icon: globe
    suggestions:
      - { label: Switch to demog, prompt: switch to demog }
      - { label: Show recent projects, prompt: show recent projects }
