name: myenv
channels:
  - conda-forge
dependencies:
  - python=3.11
  - rdkit
  - joblib
  - numpy<2.0.0
  - pandas
  - scikit-learn
  - scipy
  - boto3
  - urllib3>=2.7
  - idna>=3.15
  - pillow>=12.2
  - pyarrow>=23.0.1
  - setuptools>=78.1.1
  - wheel>=0.46.2
  - jaraco.context>=6.1
  - brotli>=1.2
  - mkl
  - pip
  # torch 2.6 (CVE-2025-32434) has no conda cu118 build: the pytorch channel stops at 2.5 and
  # conda-forge dropped cu118, so install the cu118 wheels + chemprop from PyPI instead.
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu118
      - torch==2.6.0+cu118
      - torchvision==0.21.0+cu118
      - torchaudio==2.6.0+cu118
      - chemprop==2.0.4
      - datagrok-celery-task==0.1.8
      - celery
